name: 3. Compile Kernel BOS 13.0 + ReSukiSU + SUSFS

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: 'BOS kernel branch'
        required: true
        default: 'android-13'
        type: string
      RESUKISU_BRANCH:
        description: 'ReSukiSU branch'
        required: true
        default: 'main'
        type: string
      SUSFS_BRANCH:
        description: 'SUSFS branch (kernel-4.9)'
        required: true
        default: 'kernel-4.9'
        type: string
      DEFCONFIG:
        description: 'Defconfig file name'
        required: true
        default: 'my_defconfig'
        type: string
      DEVICE_CODENAME:
        description: 'Device codename (e.g. dipper, polaris, beryllium)'
        required: true
        default: 'dipper'
        type: string
      ENABLE_SUSFS:
        description: 'Enable SUSFS integration'
        required: true
        default: true
        type: boolean
      ENABLE_MANUAL_HOOKS:
        description: 'Apply manual hooks for ReSukiSU'
        required: true
        default: true
        type: boolean
      ANYKERNEL3_URL:
        description: 'AnyKernel3 repo URL (for flashable zip)'
        required: false
        default: 'https://github.com/osm0sis/AnyKernel3'
        type: string

env:
  KERNEL_SOURCE: https://github.com/baikalos/android_kernel_xiaomi_sdm845
  KERNEL_BRANCH: ${{ inputs.KERNEL_BRANCH }}
  RESUKISU_SOURCE: https://github.com/ReSukiSU/ReSukiSU
  RESUKISU_BRANCH: ${{ inputs.RESUKISU_BRANCH }}
  SUSFS_SOURCE: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: ${{ inputs.SUSFS_BRANCH }}
  SUSFS_PATCH_URL: https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch
  DEFCONFIG: ${{ inputs.DEFCONFIG }}
  DEVICE_CODENAME: ${{ inputs.DEVICE_CODENAME }}
  ARCH: arm64
  SUBARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-
  CROSS_COMPILE_ARM32: arm-linux-gnueabi-
  # Clang
  CLANG_VERSION: r416183b1
  CLANG_URL: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r416183b1.tar.gz
  # GCC (fallback / supplementary)
  GCC_64_URL: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/android-13.0.0_r0.17.tar.gz
  GCC_32_URL: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/android-13.0.0_r0.17.tar.gz

jobs:
  compile-kernel:
    name: Compile BOS + ReSukiSU + SUSFS
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      # ============================================================
      # STEP 1: Install dependencies
      # ============================================================
      - name: Install build dependencies
        run: |
          echo "============================================"
          echo " Installing build dependencies"
          echo "============================================"
          sudo apt-get update -y
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libelf-dev cpio
          echo "Dependencies installed successfully"

      # ============================================================
      # STEP 2: Setup ccache
      # ============================================================
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 4G
          key: bos-resukisu-susfs-${{ inputs.DEVICE_CODENAME }}

      # ============================================================
      # STEP 3: Checkout this repo (for defconfig etc.)
      # ============================================================
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          path: compiler-nub

      # ============================================================
      # STEP 4: Clone BOS kernel source
      # ============================================================
      - name: Clone BOS kernel source
        run: |
          echo "============================================"
          echo " Cloning BOS kernel source"
          echo " Branch: ${{ env.KERNEL_BRANCH }}"
          echo "============================================"
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} \
            kernel_source
          cd kernel_source
          echo "Kernel source cloned successfully"
          echo "KERNEL_VERSION=$(make kernelversion 2>/dev/null || echo 'unknown')" >> $GITHUB_ENV
          echo "Kernel version: $(make kernelversion 2>/dev/null || echo 'unknown')"

      # ============================================================
      # STEP 5: Setup Clang toolchain
      # ============================================================
      - name: Setup Clang toolchain
        run: |
          echo "============================================"
          echo " Setting up Clang toolchain"
          echo "============================================"
          mkdir -p toolchain/clang
          # Try primary clang source
          if ! curl -LSs "${{ env.CLANG_URL }}" | tar -xzf - -C toolchain/clang 2>/dev/null; then
            echo "Primary clang download failed, trying alternative..."
            # Alternative: use proton-clang or aosp clang
            git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain/clang || {
              echo "Alternative clang also failed, using system clang"
              sudo apt-get install -y clang lld llvm
              ln -sf /usr/bin toolchain/clang/bin
            }
          fi
          echo "Clang toolchain ready"
          ls toolchain/clang/bin/ | head -20 || true

      # ============================================================
      # STEP 6: Setup GCC toolchains (aarch64 + arm32)
      # ============================================================
      - name: Setup GCC toolchains
        run: |
          echo "============================================"
          echo " Setting up GCC toolchains"
          echo "============================================"
          # GCC 64-bit
          mkdir -p toolchain/gcc64
          if ! curl -LSs "${{ env.GCC_64_URL }}" | tar -xzf - -C toolchain/gcc64 2>/dev/null; then
            echo "GCC64 download from AOSP failed, will use system gcc"
          fi

          # GCC 32-bit
          mkdir -p toolchain/gcc32
          if ! curl -LSs "${{ env.GCC_32_URL }}" | tar -xzf - -C toolchain/gcc32 2>/dev/null; then
            echo "GCC32 download from AOSP failed, will use system gcc"
          fi

          echo "GCC toolchains ready"

      # ============================================================
      # STEP 7: Integrate ReSukiSU into kernel source
      # ============================================================
      - name: Integrate ReSukiSU
        run: |
          echo "============================================"
          echo " Integrating ReSukiSU into kernel"
          echo "============================================"
          cd kernel_source

          # Clone ReSukiSU
          echo "[1/5] Cloning ReSukiSU..."
          git clone --depth=1 -b ${{ env.RESUKISU_BRANCH }} \
            ${{ env.RESUKISU_SOURCE }} \
            ReSukiSU

          # Check if setup.sh exists and run it
          if [ -f "ReSukiSU/kernel/setup.sh" ]; then
            echo "[2/5] Running ReSukiSU setup.sh..."
            # The setup.sh typically needs to be run from kernel root
            # and it expects the ReSukiSU directory structure
            cd ReSukiSU/kernel
            bash setup.sh ../../ || {
              echo "setup.sh with path arg failed, trying alternative method..."
              cd ../../
              # Alternative: run from kernel root
              bash ReSukiSU/kernel/setup.sh . || true
            }
            cd ../../ 2>/dev/null || cd kernel_source
          elif [ -f "ReSukiSU/setup.sh" ]; then
            echo "[2/5] Running ReSukiSU setup.sh (root level)..."
            bash ReSukiSU/setup.sh || {
              echo "Root setup.sh failed, trying with kernel path..."
              bash ReSukiSU/setup.sh . || true
            }
          else
            echo "[2/5] No setup.sh found, performing manual integration..."

            # Manual integration following:
            # https://resukisu.github.io/guide/manual-integrate.html

            # Copy KernelSU driver directory
            if [ -d "ReSukiSU/kernel" ]; then
              echo "  Copying KernelSU kernel driver..."
              mkdir -p drivers/kernelsu
              cp -r ReSukiSU/kernel/* drivers/kernelsu/ 2>/dev/null || \
              cp -r ReSukiSU/kernel/. drivers/kernelsu/ 2>/dev/null || true
            elif [ -d "ReSukiSU/drivers" ]; then
              echo "  Copying from ReSukiSU/drivers..."
              cp -r ReSukiSU/drivers/kernelsu drivers/ 2>/dev/null || true
            fi
          fi

          echo "[3/5] Verifying ReSukiSU integration..."
          # Check if KernelSU driver exists
          if [ -d "drivers/kernelsu" ]; then
            echo "  ✓ drivers/kernelsu directory exists"
            ls drivers/kernelsu/ | head -10
          else
            echo "  ✗ drivers/kernelsu NOT found"
            echo "  Searching for KernelSU files..."
            find . -name "kernelsu" -type d 2>/dev/null | head -5
            find . -name "ksu.h" -o -name "core.c" 2>/dev/null | grep -i ksu | head -10
          fi

          # Ensure Makefile and Kconfig entries exist
          echo "[4/5] Patching drivers/Makefile and Kconfig..."

          # Add to drivers/Makefile if not already present
          if ! grep -q "kernelsu" drivers/Makefile 2>/dev/null; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            echo "  ✓ Added kernelsu to drivers/Makefile"
          else
            echo "  ✓ kernelsu already in drivers/Makefile"
          fi

          # Add to drivers/Kconfig if not already present
          if ! grep -q "kernelsu" drivers/Kconfig 2>/dev/null; then
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig || \
            echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
            echo "  ✓ Added kernelsu to drivers/Kconfig"
          else
            echo "  ✓ kernelsu already in drivers/Kconfig"
          fi

          echo "[5/5] ReSukiSU integration completed"

      # ============================================================
      # STEP 8: Apply manual hooks for ReSukiSU
      # ============================================================
      - name: Apply manual hooks (ReSukiSU)
        if: ${{ inputs.ENABLE_MANUAL_HOOKS }}
        run: |
          echo "============================================"
          echo " Applying manual hooks for ReSukiSU"
          echo " Ref: https://resukisu.github.io/guide/manual-integrate.html"
          echo "============================================"
          cd kernel_source

          # -------------------------------------------------------
          # Hook 1: fs/exec.c - hook execve syscall
          # -------------------------------------------------------
          echo "[Hook 1] Patching fs/exec.c..."
          if [ -f "fs/exec.c" ]; then
            # Add include
            if ! grep -q "ksu.h" fs/exec.c; then
              sed -i '/#include <linux\/fs.h>/a #include <linux/ksu.h>' fs/exec.c 2>/dev/null || \
              sed -i '1a #include <linux/ksu.h>' fs/exec.c
              echo "  ✓ Added #include <linux/ksu.h> to fs/exec.c"
            fi

            # Hook in do_execveat_common or __do_execve_file or do_execve
            # The exact function name varies by kernel version
            # For 4.9: typically do_execveat_common
            if grep -q "do_execveat_common" fs/exec.c; then
              HOOK_FUNC="do_execveat_common"
            elif grep -q "__do_execve_file" fs/exec.c; then
              HOOK_FUNC="__do_execve_file"
            elif grep -q "do_execve(" fs/exec.c; then
              HOOK_FUNC="do_execve"
            else
              HOOK_FUNC=""
              echo "  ⚠ Could not find execve function to hook"
            fi

            if [ -n "$HOOK_FUNC" ]; then
              # Find the return point in the function and add hook before it
              # We need to add: ksu_handle_execveat(&fd, &filename_ptr, &argv, &envp, &flags);
              # This is tricky to do with sed, so we use a patch approach
              if ! grep -q "ksu_handle_execveat" fs/exec.c; then
                # Create a targeted patch
                cat > /tmp/exec_hook.patch << 'EXECPATCH'
--- a/fs/exec.c
+++ b/fs/exec.c
@@ -0,0 +1 @@
+/* ReSukiSU exec hook - applied via workflow */
EXECPATCH
                # Instead of fragile sed, use python for more reliable patching
                python3 << 'PYEOF'
import re

with open("fs/exec.c", "r") as f:
    content = f.read()

# Add include if not present
if "#include <linux/ksu.h>" not in content:
    content = content.replace(
        "#include <linux/fs.h>",
        "#include <linux/fs.h>\n#include <linux/ksu.h>",
        1
    )

# Find do_execveat_common (kernel 4.9 typical)
# We need to add the hook call after the function's opening brace region
# Look for the function and add after variable declarations

# Pattern for kernel 4.9: static int do_execveat_common(int fd, struct filename *filename, ...
# We add the hook after the opening logic

hook_call = '\n\t/* ReSukiSU hook */\n\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\n'

# Try to find do_execveat_common
func_patterns = [
    r'(static\s+int\s+do_execveat_common\s*\([^)]*\)\s*\{[^}]*?)(retval\s*=)',
    r'(static\s+int\s+__do_execve_file\s*\([^)]*\)\s*\{[^}]*?)(retval\s*=)',
]

patched = False
for pattern in func_patterns:
    match = re.search(pattern, content, re.DOTALL)
    if match and "ksu_handle_execveat" not in content:
        # Insert before first retval assignment
        insert_pos = match.start(2)
        content = content[:insert_pos] + hook_call + content[insert_pos:]
        patched = True
        print(f"  ✓ Hooked execve via pattern match")
        break

if not patched:
    # Fallback: find the function and add after first '{' + some lines
    for func_name in ['do_execveat_common', '__do_execve_file', 'do_execve']:
        idx = content.find(f'static int {func_name}(')
        if idx == -1:
            idx = content.find(f'int {func_name}(')
        if idx != -1 and "ksu_handle_execveat" not in content:
            # Find the opening brace
            brace_idx = content.find('{', idx)
            if brace_idx != -1:
                # Find end of first line after brace
                newline_idx = content.find('\n', brace_idx)
                if newline_idx != -1:
                    content = content[:newline_idx+1] + hook_call + content[newline_idx+1:]
                    patched = True
                    print(f"  ✓ Hooked {func_name} (fallback method)")
                    break

if not patched:
    print("  ⚠ Could not auto-patch execve hook. Manual patch may be needed.")

with open("fs/exec.c", "w") as f:
    f.write(content)
PYEOF
                echo "  exec.c patching attempted"
              else
                echo "  ✓ ksu_handle_execveat already present in exec.c"
              fi
            fi
          else
            echo "  ⚠ fs/exec.c not found!"
          fi

          # -------------------------------------------------------
          # Hook 2: fs/open.c - hook faccessat
          # -------------------------------------------------------
          echo "[Hook 2] Patching fs/open.c..."
          if [ -f "fs/open.c" ]; then
            python3 << 'PYEOF'
with open("fs/open.c", "r") as f:
    content = f.read()

# Add include
if "#include <linux/ksu.h>" not in content:
    content = content.replace(
        "#include <linux/fs.h>",
        "#include <linux/fs.h>\n#include <linux/ksu.h>",
        1
    )

# Hook do_faccessat
hook_call = '\n\t/* ReSukiSU hook */\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n'

if "ksu_handle_faccessat" not in content:
    # Find do_faccessat function
    import re
    for func_name in ['do_faccessat', 'sys_faccessat']:
        pattern = f'(long {func_name}\\s*\\([^)]*\\)\\s*\\{{)'
        match = re.search(pattern, content, re.DOTALL)
        if match:
            insert_pos = match.end()
            content = content[:insert_pos] + hook_call + content[insert_pos:]
            print(f"  ✓ Hooked {func_name} in open.c")
            break
    else:
        print("  ⚠ Could not find faccessat function to hook")

with open("fs/open.c", "w") as f:
    f.write(content)
PYEOF
          fi

          # -------------------------------------------------------
          # Hook 3: fs/read_write.c - hook vfs_read
          # -------------------------------------------------------
          echo "[Hook 3] Patching fs/read_write.c..."
          if [ -f "fs/read_write.c" ]; then
            python3 << 'PYEOF'
with open("fs/read_write.c", "r") as f:
    content = f.read()

if "#include <linux/ksu.h>" not in content:
    content = content.replace(
        "#include <linux/fs.h>",
        "#include <linux/fs.h>\n#include <linux/ksu.h>",
        1
    )

hook_call = '\n\t/* ReSukiSU hook */\n\tksu_handle_vfs_read(&file, &buf, &count, &pos);\n'

if "ksu_handle_vfs_read" not in content:
    import re
    match = re.search(r'(ssize_t\s+vfs_read\s*\([^)]*\)\s*\{)', content, re.DOTALL)
    if match:
        insert_pos = match.end()
        content = content[:insert_pos] + hook_call + content[insert_pos:]
        print("  ✓ Hooked vfs_read in read_write.c")
    else:
        print("  ⚠ Could not find vfs_read function")

with open("fs/read_write.c", "w") as f:
    f.write(content)
PYEOF
          fi

          # -------------------------------------------------------
          # Hook 4: fs/stat.c - hook stat (vfs_statx / vfs_fstatat)
          # -------------------------------------------------------
          echo "[Hook 4] Patching fs/stat.c..."
          if [ -f "fs/stat.c" ]; then
            python3 << 'PYEOF'
with open("fs/stat.c", "r") as f:
    content = f.read()

if "#include <linux/ksu.h>" not in content:
    content = content.replace(
        "#include <linux/fs.h>",
        "#include <linux/fs.h>\n#include <linux/ksu.h>",
        1
    )

hook_call = '\n\t/* ReSukiSU hook */\n\tksu_handle_stat(&dfd, &filename, &flags);\n'

if "ksu_handle_stat" not in content:
    import re
    # kernel 4.9 uses vfs_fstatat or vfs_statx
    for func_name in ['vfs_statx', 'vfs_fstatat', 'SYSC_newfstatat']:
        pattern = f'(int {func_name}\\s*\\([^)]*\\)\\s*\\{{)'
        match = re.search(pattern, content, re.DOTALL)
        if not match:
            pattern = f'({func_name}\\s*\\([^)]*\\)\\s*\\{{)'
            match = re.search(pattern, content, re.DOTALL)
        if match:
            insert_pos = match.end()
            content = content[:insert_pos] + hook_call + content[insert_pos:]
            print(f"  ✓ Hooked {func_name} in stat.c")
            break
    else:
        print("  ⚠ Could not find stat function to hook")

with open("fs/stat.c", "w") as f:
    f.write(content)
PYEOF
          fi

          # -------------------------------------------------------
          # Hook 5: drivers/input/input.c - hook input event (safety net)
          # -------------------------------------------------------
          echo "[Hook 5] Patching drivers/input/input.c..."
          if [ -f "drivers/input/input.c" ]; then
            python3 << 'PYEOF'
with open("drivers/input/input.c", "r") as f:
    content = f.read()

if "#include <linux/ksu.h>" not in content:
    # Add after last #include
    import re
    last_include = list(re.finditer(r'#include\s+[<"].*[>"]', content))
    if last_include:
        pos = last_include[-1].end()
        content = content[:pos] + '\n#include <linux/ksu.h>' + content[pos:]

hook_call = '\n\t/* ReSukiSU hook */\n\tksu_handle_input_handle_event(&type, &code, &value);\n'

if "ksu_handle_input_handle_event" not in content:
    match = re.search(r'(void\s+input_handle_event\s*\([^)]*\)\s*\{)', content, re.DOTALL)
    if match:
        insert_pos = match.end()
        content = content[:insert_pos] + hook_call + content[insert_pos:]
        print("  ✓ Hooked input_handle_event")
    else:
        print("  ⚠ Could not find input_handle_event function")

with open("drivers/input/input.c", "w") as f:
    f.write(content)
PYEOF
          fi

          echo ""
          echo "Manual hooks application completed"
          echo "Verifying hooks..."
          echo ""
          for f in fs/exec.c fs/open.c fs/read_write.c fs/stat.c drivers/input/input.c; do
            if [ -f "$f" ]; then
              if grep -q "ksu_handle\|ksu.h" "$f"; then
                echo "  ✓ $f - hooked"
              else
                echo "  ✗ $f - NOT hooked (may need manual attention)"
              fi
            fi
          done

      # ============================================================
      # STEP 9: Integrate SUSFS
      # ============================================================
      - name: Integrate SUSFS
        if: ${{ inputs.ENABLE_SUSFS }}
        run: |
          echo "============================================"
          echo " Integrating SUSFS (kernel-4.9)"
          echo "============================================"
          cd kernel_source

          # Clone SUSFS
          echo "[1/6] Cloning SUSFS for kernel 4.9..."
          git clone --depth=1 -b ${{ env.SUSFS_BRANCH }} \
            ${{ env.SUSFS_SOURCE }} \
            susfs4ksu
          echo "  ✓ SUSFS cloned"

          # Copy SUSFS kernel module files
          echo "[2/6] Copying SUSFS kernel module files..."
          if [ -d "susfs4ksu/kernel_patches/fs" ]; then
            cp -r susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
            echo "  ✓ Copied fs patches"
          fi

          if [ -d "susfs4ksu/kernel_patches/include" ]; then
            cp -r susfs4ksu/kernel_patches/include/* include/ 2>/dev/null || true
            echo "  ✓ Copied include patches"
          fi

          # Copy SUSFS source files
          if [ -d "susfs4ksu/kernel_patches" ]; then
            # Some versions have the files directly
            find susfs4ksu/kernel_patches -name "*.c" -exec echo "  Found: {}" \;
            find susfs4ksu/kernel_patches -name "*.h" -exec echo "  Found: {}" \;
          fi

          # If there's a specific susfs directory structure
          if [ -d "susfs4ksu/fs/susfs" ]; then
            mkdir -p fs/susfs
            cp -r susfs4ksu/fs/susfs/* fs/susfs/
            echo "  ✓ Copied fs/susfs"
          fi

          if [ -d "susfs4ksu/include/linux" ]; then
            cp -r susfs4ksu/include/linux/susfs*.h include/linux/ 2>/dev/null || true
            echo "  ✓ Copied SUSFS headers"
          fi

          # Download and apply SUSFS patch
          echo "[3/6] Downloading SUSFS patch for kernel 4.9..."
          curl -LSs -o /tmp/susfs_patch.patch "${{ env.SUSFS_PATCH_URL }}" || {
            echo "  ⚠ Could not download SUSFS patch from primary URL"
          }

          echo "[4/6] Applying SUSFS patch..."
          if [ -f "/tmp/susfs_patch.patch" ] && [ -s "/tmp/susfs_patch.patch" ]; then
            # Try applying the patch
            git apply --check /tmp/susfs_patch.patch 2>/dev/null && {
              git apply /tmp/susfs_patch.patch
              echo "  ✓ SUSFS patch applied successfully (git apply)"
            } || {
              echo "  Trying with patch command..."
              patch -p1 --forward --no-backup-if-mismatch < /tmp/susfs_patch.patch 2>&1 || {
                echo "  ⚠ Patch apply had issues, trying with --fuzz=3..."
                patch -p1 --forward --fuzz=3 --no-backup-if-mismatch < /tmp/susfs_patch.patch 2>&1 || {
                  echo "  ⚠ SUSFS patch could not be fully applied"
                  echo "  Attempting individual hunk application..."
                  patch -p1 --forward --fuzz=3 --no-backup-if-mismatch --force < /tmp/susfs_patch.patch 2>&1 || true
                }
              }
            }
          else
            echo "  ⚠ SUSFS patch file not found or empty, skipping patch step"
          fi

          # Apply SUSFS kernel patches from the cloned repo
          echo "[5/6] Applying SUSFS kernel patches from repo..."
          if [ -d "susfs4ksu/kernel_patches/patches" ]; then
            for patch_file in susfs4ksu/kernel_patches/patches/*.patch; do
              if [ -f "$patch_file" ]; then
                echo "  Applying: $(basename $patch_file)"
                git apply --check "$patch_file" 2>/dev/null && {
                  git apply "$patch_file"
                  echo "    ✓ Applied"
                } || {
                  patch -p1 --forward --fuzz=3 --no-backup-if-mismatch < "$patch_file" 2>&1 || {
                    echo "    ⚠ Failed to apply $(basename $patch_file)"
                  }
                }
              fi
            done
          fi

          # Enable SUSFS in KernelSU Kconfig
          echo "[6/6] Enabling SUSFS config options..."
          # Add SUSFS config to defconfig later (in defconfig step)

          echo ""
          echo "SUSFS integration completed"
          echo "SUSFS files check:"
          find . -name "*susfs*" -not -path "./susfs4ksu/*" 2>/dev/null | head -20

      # ============================================================
      # STEP 10: Copy and prepare defconfig
      # ============================================================
      - name: Prepare defconfig
        run: |
          echo "============================================"
          echo " Preparing defconfig"
          echo "============================================"
          cd kernel_source

          # Copy custom defconfig from extracted-config
          DEFCONFIG_DIR="arch/${{ env.ARCH }}/configs"
          mkdir -p ${DEFCONFIG_DIR}

          if [ -f "../compiler-nub/extracted-config/my_defconfig.txt" ]; then
            cp ../compiler-nub/extracted-config/my_defconfig.txt \
               ${DEFCONFIG_DIR}/${{ env.DEFCONFIG }}_defconfig
            echo "  ✓ Copied custom defconfig from extracted-config"
          elif [ -f "../compiler-nub/extracted-config/my_defconfig" ]; then
            cp ../compiler-nub/extracted-config/my_defconfig \
               ${DEFCONFIG_DIR}/${{ env.DEFCONFIG }}_defconfig
            echo "  ✓ Copied custom defconfig"
          fi

          DEFCONFIG_FILE="${DEFCONFIG_DIR}/${{ env.DEFCONFIG }}_defconfig"

          # If defconfig doesn't exist yet, try device-specific ones
          if [ ! -f "$DEFCONFIG_FILE" ]; then
            echo "  Custom defconfig not found, looking for device defconfig..."
            # Try common BOS/Xiaomi SDM845 defconfigs
            for dc in \
              "${{ env.DEVICE_CODENAME }}_defconfig" \
              "vendor/${{ env.DEVICE_CODENAME }}_defconfig" \
              "sdm845-perf_defconfig" \
              "polaris_defconfig" \
              "dipper_defconfig" \
              "beryllium_defconfig"; do
              if [ -f "${DEFCONFIG_DIR}/${dc}" ]; then
                DEFCONFIG_FILE="${DEFCONFIG_DIR}/${dc}"
                echo "  ✓ Found device defconfig: ${dc}"
                break
              fi
            done
          fi

          echo ""
          echo "  Using defconfig: ${DEFCONFIG_FILE}"

          # Enable KSU (ReSukiSU) in defconfig
          echo "" >> ${DEFCONFIG_FILE}
          echo "# ReSukiSU" >> ${DEFCONFIG_FILE}
          echo "CONFIG_KSU=y" >> ${DEFCONFIG_FILE}
          echo "  ✓ Added CONFIG_KSU=y"

          # Enable SUSFS if requested
          if [ "${{ inputs.ENABLE_SUSFS }}" = "true" ]; then
            echo "" >> ${DEFCONFIG_FILE}
            echo "# SUSFS" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS=y" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ${DEFCONFIG_FILE}
            echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> ${DEFCONFIG_FILE}
            echo "  ✓ Added SUSFS config options"
          fi

          # Ensure critical configs
          echo "" >> ${DEFCONFIG_FILE}
          echo "# Ensure overlayfs" >> ${DEFCONFIG_FILE}
          echo "CONFIG_OVERLAY_FS=y" >> ${DEFCONFIG_FILE}

          echo ""
          echo "Final defconfig KSU/SUSFS entries:"
          grep -i "ksu\|susfs\|kernelsu" ${DEFCONFIG_FILE} || echo "  (none found)"

          # Store defconfig name for build step
          DEFCONFIG_NAME=$(basename ${DEFCONFIG_FILE})
          echo "DEFCONFIG_NAME=${DEFCONFIG_NAME}" >> $GITHUB_ENV
          echo "  DEFCONFIG_NAME=${DEFCONFIG_NAME}"

      # ============================================================
      # STEP 11: Build kernel
      # ============================================================
      - name: Build kernel
        run: |
          echo "============================================"
          echo " Building kernel"
          echo " Defconfig: ${{ env.DEFCONFIG_NAME }}"
          echo "============================================"
          cd kernel_source

          # Setup PATH for toolchains
          CLANG_PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin"
          GCC64_PATH="${GITHUB_WORKSPACE}/toolchain/gcc64/bin"
          GCC32_PATH="${GITHUB_WORKSPACE}/toolchain/gcc32/bin"

          export PATH="${CLANG_PATH}:${GCC64_PATH}:${GCC32_PATH}:${PATH}"

          # Detect available compiler
          if command -v clang &>/dev/null && clang --version 2>/dev/null | head -1; then
            echo "Using Clang compiler"
            USE_CLANG=true
          else
            echo "Clang not available, using GCC"
            USE_CLANG=false
          fi

          # Common make arguments
          MAKE_ARGS=(
            ARCH=${{ env.ARCH }}
            SUBARCH=${{ env.SUBARCH }}
            O=out
          )

          if [ "$USE_CLANG" = true ]; then
            MAKE_ARGS+=(
              CC="ccache clang"
              CLANG_TRIPLE=aarch64-linux-gnu-
              CROSS_COMPILE=${{ env.CROSS_COMPILE }}
              CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}
            )
          else
            MAKE_ARGS+=(
              CC="ccache ${{ env.CROSS_COMPILE }}gcc"
              CROSS_COMPILE=${{ env.CROSS_COMPILE }}
              CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}
            )
          fi

          echo ""
          echo "Make arguments: ${MAKE_ARGS[@]}"
          echo ""

          # Step 1: Generate .config from defconfig
          echo ">>> make ${DEFCONFIG_NAME}..."
          make "${MAKE_ARGS[@]}" ${{ env.DEFCONFIG_NAME }} 2>&1 | tail -20

          if [ ! -f "out/.config" ]; then
            echo "ERROR: defconfig failed to generate .config"
            echo "Available defconfigs:"
            ls arch/${{ env.ARCH }}/configs/ | head -20
            exit 1
          fi

          # Verify KSU is enabled
          echo ""
          echo "Config check:"
          grep -i "CONFIG_KSU" out/.config || echo "  ⚠ CONFIG_KSU not found in .config"
          grep -i "CONFIG_KSU_SUSFS" out/.config || echo "  ⚠ CONFIG_KSU_SUSFS not found in .config"
          echo ""

          # Step 2: Build kernel
          echo ">>> Building kernel (this may take 30-90 minutes)..."
          BUILD_START=$(date +%s)

          make "${MAKE_ARGS[@]}" -j$(nproc --all) 2>&1 | tee build.log | tail -100

          BUILD_END=$(date +%s)
          BUILD_TIME=$((BUILD_END - BUILD_START))
          echo ""
          echo "Build completed in $((BUILD_TIME / 60)) minutes $((BUILD_TIME % 60)) seconds"

          # Check if build succeeded
          KERNEL_IMAGE=""
          for img in out/arch/${{ env.ARCH }}/boot/Image.gz-dtb \
                     out/arch/${{ env.ARCH }}/boot/Image.gz \
                     out/arch/${{ env.ARCH }}/boot/Image \
                     out/arch/${{ env.ARCH }}/boot/Image-dtb; do
            if [ -f "$img" ]; then
              KERNEL_IMAGE="$img"
              break
            fi
          done

          if [ -n "$KERNEL_IMAGE" ]; then
            echo ""
            echo "============================================"
            echo " ✓ BUILD SUCCESSFUL"
            echo " Kernel image: ${KERNEL_IMAGE}"
            echo " Size: $(du -h ${KERNEL_IMAGE} | cut -f1)"
            echo "============================================"
            echo "KERNEL_IMAGE=${KERNEL_IMAGE}" >> $GITHUB_ENV
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo ""
            echo "============================================"
            echo " ✗ BUILD FAILED"
            echo " No kernel image found"
            echo "============================================"
            echo ""
            echo "Last 50 lines of build log:"
            tail -50 build.log
            echo ""
            echo "Errors:"
            grep -i "error:" build.log | tail -20
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            exit 1
          fi

      # ============================================================
      # STEP 12: Check for DTB/DTBO
      # ============================================================
      - name: Collect DTB/DTBO
        if: env.BUILD_SUCCESS == 'true'
        run: |
          echo "============================================"
          echo " Collecting DTB/DTBO files"
          echo "============================================"
          cd kernel_source

          mkdir -p out/dtbs

          # Find and collect DTB files
          DTB_COUNT=0
          find out/arch/${{ env.ARCH }}/boot/dts -name "*.dtb" 2>/dev/null | while read dtb; do
            cp "$dtb" out/dtbs/
            DTB_COUNT=$((DTB_COUNT + 1))
          done

          # Check for DTBO
          if [ -f "out/arch/${{ env.ARCH }}/boot/dtbo.img" ]; then
            cp out/arch/${{ env.ARCH }}/boot/dtbo.img out/dtbs/
            echo "  ✓ Found dtbo.img"
          fi

          echo "  DTB files collected: $(ls out/dtbs/*.dtb 2>/dev/null | wc -l)"
          ls -la out/dtbs/ 2>/dev/null || echo "  No DTB/DTBO files found"

      # ============================================================
      # STEP 13: Create flashable zip with AnyKernel3
      # ============================================================
      - name: Create flashable zip (AnyKernel3)
        if: env.BUILD_SUCCESS == 'true'
        run: |
          echo "============================================"
          echo " Creating flashable zip"
          echo "============================================"

          # Clone AnyKernel3
          git clone --depth=1 ${{ inputs.ANYKERNEL3_URL }} AnyKernel3

          cd AnyKernel3

          # Clean up example files
          rm -rf .git README.md modules patch ramdisk
          mkdir -p modules

          # Copy kernel image
          cp ../kernel_source/${{ env.KERNEL_IMAGE }} .
          echo "  ✓ Copied kernel image"

          # Copy DTB if exists
          if ls ../kernel_source/out/dtbs/*.dtb 1>/dev/null 2>&1; then
            cp ../kernel_source/out/dtbs/*.dtb .
            echo "  ✓ Copied DTB files"
          fi

          if [ -f "../kernel_source/out/dtbs/dtbo.img" ]; then
            cp ../kernel_source/out/dtbs/dtbo.img .
            echo "  ✓ Copied dtbo.img"
          fi

          # Create anykernel.sh configuration
          cat > anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers

          properties() { '
          kernel.string=BOS + ReSukiSU + SUSFS Kernel
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=DEVICE_PLACEHOLDER
          supported.versions=13
          '; }

          # Shell variables
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;

          . tools/ak3-core.sh;

          set_perm_recursive 0 0 755 644 $ramdisk/*;

          dump_boot;
          write_boot;
AKEOF
          # Replace device placeholder
          sed -i "s/DEVICE_PLACEHOLDER/${{ env.DEVICE_CODENAME }}/" anykernel.sh

          # Create the zip
          DATE=$(date +%Y%m%d-%H%M)
          ZIP_NAME="BOS-ReSukiSU-SUSFS-${{ env.DEVICE_CODENAME }}-${DATE}.zip"
          zip -r9 "../${ZIP_NAME}" * -x .git/\* README.md

          echo ""
          echo "  ✓ Created: ${ZIP_NAME}"
          echo "  Size: $(du -h ../${ZIP_NAME} | cut -f1)"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      # ============================================================
      # STEP 14: Upload kernel image artifact
      # ============================================================
      - name: Upload kernel image
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-resukisu-susfs-${{ inputs.DEVICE_CODENAME }}
          path: |
            kernel_source/${{ env.KERNEL_IMAGE }}
            kernel_source/out/dtbs/*
          retention-days: 30

      # ============================================================
      # STEP 15: Upload flashable zip artifact
      # ============================================================
      - name: Upload flashable zip
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flashable-zip-resukisu-susfs-${{ inputs.DEVICE_CODENAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      # ============================================================
      # STEP 16: Upload build log
      # ============================================================
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-resukisu-susfs
          path: kernel_source/build.log
          retention-days: 7

      # ============================================================
      # STEP 17: Build summary
      # ============================================================
      - name: Build summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║         BUILD SUMMARY                        ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║ Base Kernel  : BOS 13.0 (sdm845)       ║"
          echo "║ Root Solution: ReSukiSU + SUSFS              ║"
          echo "║ Device       : ${{ inputs.DEVICE_CODENAME }}              ║"
          echo "║ SUSFS Enabled: ${{ inputs.ENABLE_SUSFS }}              ║"
          echo "║ Manual Hooks : ${{ inputs.ENABLE_MANUAL_HOOKS }}              ║"
          echo "║ Build Status : ${{ env.BUILD_SUCCESS || 'FAILED' }}              ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""

          if [ "${{ env.BUILD_SUCCESS }}" = "true" ]; then
            echo "✓ Kernel compiled successfully!"
            echo "✓ Flashable zip: ${{ env.ZIP_NAME }}"
            echo ""
            echo "Download artifacts from the Actions tab."
          else
            echo "✗ Build failed. Check build log artifact for details."
            echo ""
            echo "Common issues:"
            echo "  1. Hook parameter mismatch - check ReSukiSU API"
            echo "  2. SUSFS patch conflicts with kernel 4.9"
            echo "  3. Missing CONFIG options in defconfig"
            echo "  4. Toolchain incompatibility"
          fi
