name: 11. Compile Kernel MIUI 12 v9.5 - LD wrapper fix

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'miui12-beryllium-ksunext-susfs'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: 'dipper-q-oss'
      defconfig:
        description: 'defconfig path'
        required: true
        default: 'beryllium_user_defconfig'
      use_extracted_config:
        description: 'Pakai extracted config? (true/false)'
        required: true
        default: 'true'
      ksu_tag:
        description: 'KernelSU-Next tag'
        required: false
        default: 'v3.2.0'
      enable_susfs:
        description: 'Apply SUSFS patch? (true/false)'
        required: true
        default: 'true'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.9'
      susfs_patch_url:
        description: 'SUSFS patch URL'
        required: true
        default: 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch'
      clang_url:
        description: 'Clang prebuilt (primary, fallback ke Proton)'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

jobs:
  test-build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-22.04
    env:
      KBUILD_BUILD_USER: "Nerf."
      KBUILD_BUILD_HOST: "OldlineSSS"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Input
        run: |
          echo "kernel_source: ${{ github.event.inputs.kernel_source }}"
          echo "kernel_branch: ${{ github.event.inputs.kernel_branch }}"
          echo "defconfig: ${{ github.event.inputs.defconfig }}"
          echo "use_extracted_config: ${{ github.event.inputs.use_extracted_config }}"
          echo "ksu_tag: ${{ github.event.inputs.ksu_tag }}"
          echo "enable_susfs: ${{ github.event.inputs.enable_susfs }}"
          echo ""
          echo "== Runner OS =="
          cat /etc/os-release | head -3

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev python3 python-is-python3 patch jq

      # ============================================================
      # AS WRAPPER: fix -EL assembler error
      # ============================================================
      - name: Install AS wrapper (fix -EL assembler error)
        run: |
          echo "== Backup /usr/bin/as =="
          sudo cp /usr/bin/as /usr/bin/as.orig
          
          sudo tee /usr/bin/as-wrapper > /dev/null << 'WRAPPER'
          #!/bin/bash
          # Wrapper: detect ARM flag → delegate ke cross-assembler
          for arg in "$@"; do
            case "$arg" in
              -EL|-EB|-mabi=lp64|-mgeneral-regs-only|-mfpu=*|-march=armv*|-mcpu=cortex-*)
                exec /usr/bin/aarch64-linux-gnu-as "$@"
                ;;
            esac
          done
          exec /usr/bin/as.orig "$@"
          WRAPPER
          
          sudo chmod +x /usr/bin/as-wrapper
          sudo ln -sf /usr/bin/as-wrapper /usr/bin/as
          
          ls -la /usr/bin/as /usr/bin/as.orig /usr/bin/as-wrapper

      # ============================================================
      # LD WRAPPER: fix aarch64linux emulation error (VDSO linking)
      # ============================================================
      # Kernel VDSO linker panggil `ld` dengan emulation aarch64linux
      # /usr/bin/ld native x86_64 tidak support aarch64
      # Wrapper: detect emulation ARM → delegate ke cross-linker
      # ============================================================
      - name: Install LD wrapper (fix aarch64linux emulation)
        run: |
          echo "== Backup /usr/bin/ld =="
          sudo cp /usr/bin/ld /usr/bin/ld.orig
          
          sudo tee /usr/bin/ld-wrapper > /dev/null << 'WRAPPER'
          #!/bin/bash
          # Wrapper: detect ARM linker emulation → delegate ke cross-linker
          # 
          # Trigger flags:
          #   -m aarch64linux   → emulation ARM64 little-endian
          #   -m aarch64linuxb  → emulation ARM64 big-endian
          #   aarch64linux      → alone (some kernel Makefiles pass this way)
          #   -EL, -EB          → endianness flags
          
          # Check if any argument is ARM64 emulation related
          PREV=""
          for arg in "$@"; do
            case "$arg" in
              aarch64linux|aarch64linuxb|armelf*)
                exec /usr/bin/aarch64-linux-gnu-ld "$@"
                ;;
              -EL|-EB)
                exec /usr/bin/aarch64-linux-gnu-ld "$@"
                ;;
            esac
            # Handle "-m aarch64linux" (with space)
            if [ "$PREV" = "-m" ]; then
              case "$arg" in
                aarch64linux*|armelf*)
                  exec /usr/bin/aarch64-linux-gnu-ld "$@"
                  ;;
              esac
            fi
            PREV="$arg"
          done
          # Default: pakai native x86_64 ld
          exec /usr/bin/ld.orig "$@"
          WRAPPER
          
          sudo chmod +x /usr/bin/ld-wrapper
          sudo ln -sf /usr/bin/ld-wrapper /usr/bin/ld
          
          ls -la /usr/bin/ld /usr/bin/ld.orig /usr/bin/ld-wrapper

      - name: Setup Clang Cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-v9.5-${{ github.event.inputs.clang_url }}

      - name: Setup Clang (fallback ke Proton)
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          CLANG_OK=0
          CLANG_SOURCE=""
          
          echo "== [1/3] Coba URL primary =="
          PRIMARY_URL="${{ github.event.inputs.clang_url }}"
          if curl -L --fail --max-time 60 -o /tmp/clang.tar.gz "$PRIMARY_URL" 2>&1; then
            FILE_SIZE=$(stat -c%s /tmp/clang.tar.gz)
            echo "Downloaded: $FILE_SIZE bytes"
            if [ "$FILE_SIZE" -gt 10000000 ]; then
              if tar -xzf /tmp/clang.tar.gz -C ~/clang-ext 2>&1; then
                CLANG_OK=1
                CLANG_SOURCE="AOSP r487747c (primary)"
              else
                rm -rf ~/clang-ext/*
              fi
            fi
          fi
          rm -f /tmp/clang.tar.gz
          
          if [ "$CLANG_OK" -ne 1 ]; then
            echo "== [2/3] Coba AOSP main branch =="
            ALT_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz"
            if curl -L --fail --max-time 60 -o /tmp/clang.tar.gz "$ALT_URL" 2>&1; then
              FILE_SIZE=$(stat -c%s /tmp/clang.tar.gz)
              if [ "$FILE_SIZE" -gt 10000000 ]; then
                if tar -xzf /tmp/clang.tar.gz -C ~/clang-ext 2>&1; then
                  CLANG_OK=1
                  CLANG_SOURCE="AOSP r487747c (main)"
                else
                  rm -rf ~/clang-ext/*
                fi
              fi
            fi
            rm -f /tmp/clang.tar.gz
          fi
          
          if [ "$CLANG_OK" -ne 1 ]; then
            echo "== [3/3] Fallback ke Proton Clang =="
            PROTON_URL="https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz"
            if curl -L --fail --max-time 180 -o /tmp/clang.tar.gz "$PROTON_URL" 2>&1; then
              FILE_SIZE=$(stat -c%s /tmp/clang.tar.gz)
              if [ "$FILE_SIZE" -gt 10000000 ]; then
                if tar -xzf /tmp/clang.tar.gz -C ~/clang-ext --strip-components=1 2>&1; then
                  CLANG_OK=1
                  CLANG_SOURCE="Proton Clang"
                else
                  rm -rf ~/clang-ext/*
                fi
              fi
            fi
            rm -f /tmp/clang.tar.gz
            
            if [ "$CLANG_OK" -ne 1 ]; then
              rm -rf ~/clang-ext
              if git clone --depth=1 https://github.com/kdrag0n/proton-clang.git ~/clang-ext 2>&1; then
                CLANG_OK=1
                CLANG_SOURCE="Proton Clang (git)"
              fi
            fi
          fi
          
          [ "$CLANG_OK" -eq 1 ] || { echo "[FATAL] Semua Clang gagal"; exit 1; }
          
          echo "[OK] Clang setup: $CLANG_SOURCE"
          ~/clang-ext/bin/clang --version | head -3

      - name: Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: Clone MIUI 12 kernel source
        run: |
          git clone --depth=1 \
            "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" \
            kernel-src
          cd kernel-src
          git log -1 --oneline

      - name: Setup KernelSU-Next
        run: |
          cd kernel-src
          curl -LSs "https://raw.githubusercontent.com/ThRE-Team/KernelSU-Next/main/kernel/setup.sh" | bash -s "${{ github.event.inputs.ksu_tag }}"
          ls -la drivers/kernelsu || echo "MISSING!"

      - name: Clone SUSFS & apply patch
        if: github.event.inputs.enable_susfs == 'true'
        run: |
          cd kernel-src
          set -e
          git clone --depth=1 -b "${{ github.event.inputs.susfs_branch }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git .susfs4ksu
          curl -LSsf "${{ github.event.inputs.susfs_patch_url }}" -o /tmp/susfs.patch
          set +e
          patch -p1 --fuzz=3 --no-backup-if-mismatch --force < /tmp/susfs.patch 2>&1 | tee /tmp/susfs.log
          set -e
          echo "Succeed: $(grep -c 'succeeded' /tmp/susfs.log)"
          echo "FAILED : $(grep -c 'FAILED' /tmp/susfs.log)"
          find . -name "*.rej" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true
          find . -name "*.orig" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true
          if [ ! -f fs/sus_su.c ] && [ -f .susfs4ksu/kernel_patches/fs/sus_su.c ]; then
            cp .susfs4ksu/kernel_patches/fs/sus_su.c fs/sus_su.c
          fi

      - name: Manual fix SUSFS hunks
        if: github.event.inputs.enable_susfs == 'true'
        run: |
          cd kernel-src
          if [ -f fs/proc_namespace.c ] && ! grep -q "susfs_def.h" fs/proc_namespace.c; then
            sed -i '/#include "proc\/internal.h"/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/proc_namespace.c
          fi
          if [ -f fs/stat.c ] && ! grep -q "int err = inode->i_op->getattr" fs/stat.c; then
            python3 << 'PYEOF'
          import re
          from pathlib import Path
          p = Path("fs/stat.c")
          text = p.read_text()
          pattern = re.compile(
              r'(\tif\s*\(inode->i_op->getattr\)\s*\n)'
              r'(\t\treturn inode->i_op->getattr\(path->mnt,\s*path->dentry,\s*stat\);)',
              re.MULTILINE
          )
          replacement = (r'\1'
              '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n\t{\n'
              '\t\tint err = inode->i_op->getattr(path->mnt, path->dentry, stat);\n'
              '\t\tif (!err)\n'
              '\t\t\tsusfs_sus_kstat_spoof_generic_fillattr(inode, stat);\n'
              '\t\treturn err;\n\t}\n#else\n' r'\2' '\n#endif')
          new_text, n = pattern.subn(replacement, text)
          if n > 0: p.write_text(new_text)
          PYEOF
          fi
          python3 << 'PYEOF'
          from pathlib import Path
          for filepath in ["fs/open.c", "fs/stat.c", "fs/proc_namespace.c", "fs/proc/task_mmu.c", "fs/proc/cmdline.c"]:
              p = Path(filepath)
              if not p.exists(): continue
              lines = p.read_text().split('\n')
              has_susfs = any('linux/susfs.h' in l for l in lines)
              has_susfs_def = any('linux/susfs_def.h' in l for l in lines)
              if has_susfs and has_susfs_def: continue
              insert_idx = -1
              for i, line in enumerate(lines):
                  if line.strip().startswith('#include'):
                      insert_idx = i; break
              if insert_idx == -1: continue
              new_includes = []
              if not has_susfs: new_includes.append('#include <linux/susfs.h>')
              if not has_susfs_def: new_includes.append('#include <linux/susfs_def.h>')
              lines[insert_idx:insert_idx] = new_includes
              p.write_text('\n'.join(lines))
          PYEOF
          if [ -f fs/proc_namespace.c ] && ! grep -q "extern bool susfs_is_current_ksu_domain" fs/proc_namespace.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/proc_namespace.c")
          lines = p.read_text().split('\n')
          new_lines = []
          inserted = False
          for line in lines:
              new_lines.append(line)
              if not inserted and '#include "internal.h"' in line:
                  new_lines.extend(['', '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT',
                      'extern bool susfs_is_current_ksu_domain(void);',
                      'extern bool susfs_hide_sus_mnts_for_non_su_procs;',
                      '#endif', ''])
                  inserted = True
          p.write_text('\n'.join(new_lines))
          PYEOF
          fi
          if [ -f fs/stat.c ] && ! grep -q "extern void susfs_sus_kstat_spoof_generic_fillattr" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          last_include = -1
          for i, line in enumerate(lines):
              if line.strip().startswith('#include'): last_include = i
          if last_include >= 0:
              lines[last_include+1:last_include+1] = ['', '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT',
                  'extern void susfs_sus_kstat_spoof_generic_fillattr(struct inode *inode, struct kstat *stat);',
                  '#endif', '']
              p.write_text('\n'.join(lines))
          PYEOF
          fi
          if [ -f fs/stat.c ] && grep -q "^EXPORT_SYMBOL(vfs_getattr_nosec);$" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          new_lines = []
          i = 0
          removed = False
          while i < len(lines):
              line = lines[i]
              new_lines.append(line)
              if (not removed and line.strip() == 'EXPORT_SYMBOL(vfs_getattr_nosec);' and i + 3 < len(lines)):
                  if (lines[i+1].strip() == '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT'
                      and 'susfs_sus_kstat_spoof_generic_fillattr' in lines[i+2].strip()
                      and lines[i+3].strip() == '#endif'):
                      i += 4; removed = True; continue
              i += 1
          if removed: p.write_text('\n'.join(new_lines))
          PYEOF
          fi

      - name: Fix MIUI kernel compat
        run: |
          cd kernel-src
          DTC_MAKEFILE="scripts/dtc/Makefile"
          if [ -f "$DTC_MAKEFILE" ] && ! grep -q "fcommon" "$DTC_MAKEFILE"; then
            sed -i '1i HOSTCFLAGS_dtc.o += -fcommon\nHOSTCFLAGS_dtc-lexer.lex.o += -fcommon\nHOSTCFLAGS_dtc-parser.tab.o += -fcommon\n' "$DTC_MAKEFILE"
          fi
          MAKEFILE="Makefile"
          if ! grep -q "^prepare-compiler-check-skip:" "$MAKEFILE"; then
            if grep -q "prepare-compiler-check" "$MAKEFILE"; then
              sed -i 's|prepare-compiler-check|prepare-compiler-check-skip|g' "$MAKEFILE"
              echo "" >> "$MAKEFILE"
              echo "prepare-compiler-check-skip:" >> "$MAKEFILE"
              printf "\t@echo 'Skipping compiler check'\n" >> "$MAKEFILE"
            fi
          fi

      - name: Prepare defconfig
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ ! -f "$DEFCONFIG_PATH" ]; then
            find arch/arm64/configs -iname "*beryllium*"
            exit 1
          fi

          if [ "${{ github.event.inputs.use_extracted_config }}" = "true" ]; then
            EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/miui_defconfig.txt"
            if [ -f "$EXTRACTED_CFG" ]; then
              echo "[INFO] Pakai extracted: $EXTRACTED_CFG"
              cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
            fi
          fi

          sed -i 's|^# CONFIG_UTS_NS is not set|CONFIG_UTS_NS=y|' "$DEFCONFIG_PATH"
          sed -i 's|^# CONFIG_USER_NS is not set|CONFIG_USER_NS=y|' "$DEFCONFIG_PATH"
          sed -i 's|^# CONFIG_PID_NS is not set|CONFIG_PID_NS=y|' "$DEFCONFIG_PATH"
          sed -i '/^CONFIG_CC_STACKPROTECTOR_STRONG=y/d' "$DEFCONFIG_PATH"
          sed -i 's|^# CONFIG_CC_STACKPROTECTOR_REGULAR is not set|CONFIG_CC_STACKPROTECTOR_REGULAR=y|' "$DEFCONFIG_PATH"
          sed -i '/^CONFIG_KSU/d;/^# CONFIG_KSU is not set/d;/SUSFS/d' "$DEFCONFIG_PATH"

          {
            echo ""
            echo "CONFIG_UTS_NS=y"
            echo "CONFIG_USER_NS=y"
            echo "CONFIG_PID_NS=y"
            echo "# CONFIG_CC_STACKPROTECTOR_STRONG is not set"
            echo "CONFIG_CC_STACKPROTECTOR_REGULAR=y"
            echo "CONFIG_KSU=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo "CONFIG_KSU_KPROBE_HOOKS=y"
          } >> "$DEFCONFIG_PATH"

          if [ "${{ github.event.inputs.enable_susfs }}" = "true" ]; then
            {
              echo "CONFIG_KSU_SUSFS=y"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
              echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
            } >> "$DEFCONFIG_PATH"
          fi

          grep -E "CONFIG_KSU|SUSFS|UTS_NS|USER_NS|PID_NS|STACKPROTECTOR|LOCALVERSION" "$DEFCONFIG_PATH" | sort

      - name: Patch arch/arm64/Makefile
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"
          [ -f "$MAIN_MK" ] || exit 1
          sed -i -E 's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' "$MAIN_MK" 2>/dev/null || true

      - name: Skip broken DTBs
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          [ -f "$DTS_MK" ] || exit 0
          for dtb in sdm845-v2-qvr-evt.dtb sdm845-v2-qvr-dvt.dtb sdm845-interposer-sdm670-mtp.dtb sdm845-interposer-sdm670-cdp.dtb; do
            sed -i "/$dtb/d" "$DTS_MK" 2>/dev/null || true
          done

      # ============================================================
      # COMPILE: rename Proton binaries yang konflik, pakai wrapper
      # ============================================================
      # PENTING:
      # - Rename `as`, `ld`, `ar`, dll dari Proton (kalau ada) supaya
      #   sistem tools (dengan wrapper) yang dipakai
      # - JANGAN rename `ld.lld` (dibutuhkan untuk link kernel ARM64)
      # - PATH sistem duluan biar wrapper kepanggil
      # ============================================================
      - name: Compile Kernel
        run: |
          cd kernel-src
          OUT_DIR="out"
          
          export PATH="/usr/bin:/bin:$HOME/clang-ext/bin"
          
          echo "== Rename Proton binaries yang konflik dengan sistem =="
          # HANYA rename yang konflik (as, ld biasa, ar, dll)
          # JANGAN rename ld.lld! (dipakai untuk link kernel ARM64)
          for bin in as ld ar nm objcopy objdump strip readelf; do
            if [ -f "$HOME/clang-ext/bin/$bin" ]; then
              mv "$HOME/clang-ext/bin/$bin" "$HOME/clang-ext/bin/$bin.proton" 2>/dev/null && \
                echo "  Moved: $bin → $bin.proton"
            fi
          done
          
          echo ""
          echo "== Verify ld.lld STILL AVAILABLE =="
          if [ ! -f "$HOME/clang-ext/bin/ld.lld" ]; then
            echo "[FATAL] ld.lld hilang! Kernel ARM64 tidak bisa di-link"
            ls -la "$HOME/clang-ext/bin/" | head -20
            exit 1
          fi
          ls -la "$HOME/clang-ext/bin/ld.lld"
          
          echo ""
          echo "== Verify wrappers aktif =="
          echo "as → $(readlink -f $(which as))"
          echo "ld → $(readlink -f $(which ld))"
          echo "gcc → $(readlink -f $(which gcc))"
          echo "clang → $(readlink -f $(which clang))"
          
          echo ""
          echo "== Clang version =="
          clang --version | head -3
          
          echo ""
          echo "== Host toolchain =="
          gcc --version | head -1
          ld --version | head -1

          CLANG_PATH="$HOME/clang-ext/bin"

          MAKE_ARGS=(
            O=$OUT_DIR
            ARCH=arm64
            CC=${CLANG_PATH}/clang
            LD=${CLANG_PATH}/ld.lld
            AR=${CLANG_PATH}/llvm-ar
            NM=${CLANG_PATH}/llvm-nm
            OBJCOPY=${CLANG_PATH}/llvm-objcopy
            OBJDUMP=${CLANG_PATH}/llvm-objdump
            STRIP=${CLANG_PATH}/llvm-strip
            READELF=${CLANG_PATH}/llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
            HOSTCC=/usr/bin/gcc
            HOSTCXX=/usr/bin/g++
            HOSTLD=/usr/bin/ld
            HOSTAR=/usr/bin/ar
            HOSTCFLAGS="-fcommon"
            KCFLAGS="-Wno-error"
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          for cfg in CONFIG_KSU CONFIG_KSU_KPROBE_HOOKS CONFIG_UTS_NS CONFIG_PID_NS CONFIG_USER_NS; do
            grep "^${cfg}=" $OUT_DIR/.config || echo "${cfg}=NOT SET"
          done

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          BUILD_OK=0
          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"
            BUILD_OK=1
          elif [ -f "$OUT_DIR/arch/arm64/boot/Image" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image"
            BUILD_OK=1
          fi
          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -eq 1 ] || exit 1

      # ============================================================
      # CLEANUP: restore /usr/bin/as dan /usr/bin/ld
      # ============================================================
      - name: Restore /usr/bin/as
        if: always()
        run: |
          if [ -f /usr/bin/as.orig ]; then
            sudo mv /usr/bin/as.orig /usr/bin/as
            sudo rm -f /usr/bin/as-wrapper
            echo "[OK] Restored /usr/bin/as"
          fi

      - name: Restore /usr/bin/ld
        if: always()
        run: |
          if [ -f /usr/bin/ld.orig ]; then
            sudo mv /usr/bin/ld.orig /usr/bin/ld
            sudo rm -f /usr/bin/ld-wrapper
            echo "[OK] Restored /usr/bin/ld"
          fi

      - name: Capture metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          KSU_COMMIT=$(cd KernelSU-Next 2>/dev/null && git rev-parse --short HEAD || echo "unknown")
          SUSFS_COMMIT=$(cd .susfs4ksu 2>/dev/null && git rev-parse --short HEAD || echo "unknown")
          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "$(date -u '+%Y-%m-%d %H:%M UTC')",
            "target_rom": "MIUI 12 Stock",
            "runner": "ubuntu-22.04",
            "kernel": {
              "source": "${{ github.event.inputs.kernel_source }}",
              "branch": "${{ github.event.inputs.kernel_branch }}",
              "commit": "${KERNEL_COMMIT}",
              "version": "$(cat out/include/config/kernel.release)"
            },
            "kernelsu_next": {
              "tag": "${{ github.event.inputs.ksu_tag }}",
              "commit": "${KSU_COMMIT}"
            },
            "susfs": {
              "enabled": "${{ github.event.inputs.enable_susfs }}",
              "commit": "${SUSFS_COMMIT}"
            }
          }
          JSONEOF
          cat ../build-metadata.json | jq .

      - name: Upload metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          if-no-files-found: ignore
