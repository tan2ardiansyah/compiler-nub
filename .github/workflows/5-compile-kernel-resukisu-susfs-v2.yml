name: 5. Compile Kernel v2 - BOS Beryllium + ReSukiSU + SUSFS (fixed)

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'bos-beryllium-resukisu-susfs-v2'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/baikalos/android_kernel_xiaomi_sdm845.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '13.0'
      defconfig:
        description: 'defconfig path'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      use_extracted_config:
        description: 'Pakai extracted config?'
        required: true
        default: 'true'
      resukisu_repo:
        description: 'ReSukiSU repo URL'
        required: true
        default: 'https://github.com/ReSukiSU/ReSukiSU'
      resukisu_branch:
        description: 'ReSukiSU branch/tag/commit'
        required: true
        default: 'main'
      susfs_repo:
        description: 'SUSFS repo URL'
        required: true
        default: 'https://gitlab.com/simonpunk/susfs4ksu.git'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.9'
      susfs_patch_url:
        description: 'SUSFS patch URL'
        required: true
        default: 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

env:
  KBUILD_BUILD_USER: "tan2ardiansyah"
  KBUILD_BUILD_HOST: "ghactions"
  ARCH: arm64

jobs:
  build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: 1. Checkout repo
        uses: actions/checkout@v4

      - name: 2. Show build inputs
        run: |
          echo "========================================"
          echo "  BUILD v2 - FIXED KSU INIT FLOW"
          echo "========================================"
          echo "Zip name       : ${{ github.event.inputs.zip_name }}"
          echo "Kernel branch  : ${{ github.event.inputs.kernel_branch }}"
          echo "ReSukiSU       : ${{ github.event.inputs.resukisu_branch }}"
          echo "SUSFS branch   : ${{ github.event.inputs.susfs_branch }}"
          echo "========================================"

      - name: 3. Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget python3 python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev patch jq

      - name: 4. Setup Clang cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: 5. Download Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: 6. Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: 7. Clone BaikalOS kernel source
        run: |
          git clone --depth=1 \
            "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" \
            kernel-src

      - name: 8. Setup ReSukiSU (biarkan setup.sh handle semua)
        run: |
          cd kernel-src
          RAW_BASE="$(echo "${{ github.event.inputs.resukisu_repo }}" | sed 's|github.com|raw.githubusercontent.com|')"
          SETUP_OK=0

          echo "[1/2] Trying curl setup.sh..."
          if curl -LSsf "${RAW_BASE}/${{ github.event.inputs.resukisu_branch }}/kernel/setup.sh" \
              | bash -s "${{ github.event.inputs.resukisu_branch }}"; then
            SETUP_OK=1
          fi

          if [ "$SETUP_OK" -ne 1 ]; then
            echo "[2/2] Fallback: clone repo lokal..."
            git clone --depth=1 -b "${{ github.event.inputs.resukisu_branch }}" \
              "${{ github.event.inputs.resukisu_repo }}" .resukisu-src
            [ -f .resukisu-src/kernel/setup.sh ] && \
              bash .resukisu-src/kernel/setup.sh "${{ github.event.inputs.resukisu_branch }}" && SETUP_OK=1
          fi

          [ "$SETUP_OK" -eq 1 ] || { echo "GAGAL setup ReSukiSU"; exit 1; }

          # Clone juga sebagai reference untuk baca signature hook
          if [ ! -d .resukisu-src ]; then
            git clone --depth=1 -b "${{ github.event.inputs.resukisu_branch }}" \
              "${{ github.event.inputs.resukisu_repo }}" .resukisu-src
          fi

          echo ""
          echo "== Verifikasi struktur =="
          ls -la drivers/kernelsu 2>/dev/null | head -5

      # ============================================================
      # KUNCI FIX #1: Fix struct user_arg_ptr conflict yang BENAR
      # ============================================================
      # setup.sh sudah inject #include <linux/ksud.h> ke fs/exec.c
      # ksud.h punya definisi struct user_arg_ptr
      # fs/exec.c juga punya definisi sendiri → conflict
      #
      # SOLUSI BENAR: hapus definisi LOKAL di fs/exec.c
      # SOLUSI SALAH (v1): hapus include ksud.h ← ini yang bikin gagal!
      # ============================================================
      - name: 9. Fix fs/exec.c - hapus definisi user_arg_ptr LOKAL (bukan hapus ksud.h)
        run: |
          cd kernel-src

          if [ ! -f fs/exec.c ]; then exit 0; fi

          echo "== State awal fs/exec.c =="
          grep -n "linux/ksud.h\|user_arg_ptr {\|ksu_handle_execveat" fs/exec.c | head -10

          # HAPUS definisi struct user_arg_ptr LOKAL (nested #ifdef aware)
          python3 << 'PYEOF'
          from pathlib import Path

          p = Path("fs/exec.c")
          lines = p.read_text().split('\n')
          new_lines = []
          i = 0
          removed = False

          while i < len(lines):
              line = lines[i]
              # Cari 'struct user_arg_ptr {' sebagai definisi (bukan pemakaian)
              if not removed and line.strip().startswith('struct user_arg_ptr {'):
                  # Balance-brace matching
                  brace_count = 0
                  j = i
                  while j < len(lines):
                      brace_count += lines[j].count('{')
                      brace_count -= lines[j].count('}')
                      if brace_count == 0 and '};' in lines[j]:
                          break
                      j += 1
                  # Replace lines i..j
                  new_lines.append('/* struct user_arg_ptr definition moved to linux/ksud.h */')
                  print(f"[OK] Removed struct user_arg_ptr lines {i+1}..{j+1}")
                  i = j + 1
                  removed = True
                  continue
              new_lines.append(line)
              i += 1

          if not removed:
              print("[SKIP] struct user_arg_ptr not found (maybe not injected)")

          p.write_text('\n'.join(new_lines))
          PYEOF

          echo ""
          echo "== State setelah fix =="
          grep -n "linux/ksud.h\|user_arg_ptr {\|ksu_handle_execveat" fs/exec.c | head -10

      # ============================================================
      # KUNCI FIX #2: Extract signature hook dari source ReSukiSU
      # ============================================================
      # Alih-alih bikin ksu_hook.h manual dengan void *,
      # kita GREP signature asli dari source ReSukiSU
      # ============================================================
      - name: 10. Extract hook signatures dari source ReSukiSU
        run: |
          cd kernel-src

          echo "== Cari file yang implement ksu_handle_* =="
          KSU_DIR=""
          for d in KernelSU KernelSU-Next ReSukiSU; do
            if [ -d "$d" ]; then
              KSU_DIR="$d"
              break
            fi
          done

          echo "KSU_DIR: $KSU_DIR"

          # Grep semua deklarasi ksu_handle_*
          echo ""
          echo "== Signature ksu_handle_* di $KSU_DIR =="
          grep -rn "int ksu_handle_" "$KSU_DIR/kernel/" 2>/dev/null | head -20

          echo ""
          echo "== Signature di include/linux/ =="
          grep -rn "int ksu_handle_" include/linux/ 2>/dev/null | head -20

          # Generate ksu_hook.h dari signature yang di-extract
          python3 << 'PYEOF'
          import re
          import subprocess
          from pathlib import Path

          # Cari semua file .c dan .h di KernelSU source
          ksu_dirs = ['KernelSU', 'KernelSU-Next', 'ReSukiSU']
          ksu_dir = None
          for d in ksu_dirs:
              if Path(d).exists():
                  ksu_dir = d
                  break

          if not ksu_dir:
              print("[FAIL] KSU source dir not found")
              exit(1)

          # Extract signature ksu_handle_* dari source
          signatures = {}
          for pattern in ['*.c', '*.h']:
              for f in Path(ksu_dir).rglob(pattern):
                  try:
                      text = f.read_text(errors='replace')
                  except:
                      continue

                  # Match: int ksu_handle_XXX(...);  atau  int ksu_handle_XXX(...)
                  for m in re.finditer(
                      r'\bint\s+(ksu_handle_\w+)\s*\(([^)]*)\)\s*[;{]',
                      text, re.MULTILINE
                  ):
                      name = m.group(1)
                      params = m.group(2).strip()
                      # Skip forward declaration jika sudah ada implementasi
                      if name not in signatures or '{' in text[m.end()-1:m.end()]:
                          signatures[name] = params

          print(f"Extracted {len(signatures)} hook signatures:")
          for name, params in sorted(signatures.items()):
              print(f"  {name}({params})")

          # Generate ksu_hook.h dari signature asli
          header = ['/* Auto-generated ksu_hook.h dari source ReSukiSU asli */']
          header.append('#ifndef __KSU_HOOK_H')
          header.append('#define __KSU_HOOK_H')
          header.append('')
          header.append('#include <linux/types.h>')
          header.append('#include <linux/uidgid.h>')
          header.append('#include <linux/fs.h>')
          header.append('')
          header.append('struct file;')
          header.append('struct filename;')
          header.append('struct user_arg_ptr;')
          header.append('')

          for name, params in sorted(signatures.items()):
              header.append(f'extern int {name}({params});')

          header.append('')
          header.append('#endif')

          Path('include/linux/ksu_hook.h').write_text('\n'.join(header))
          print("")
          print("[OK] Generated ksu_hook.h dari signature asli")
          print("")
          print(Path('include/linux/ksu_hook.h').read_text())
          PYEOF

      # ============================================================
      # SUSFS Integration (sama seperti v1, sudah proven working)
      # ============================================================
      - name: 11. Clone SUSFS & apply patch
        run: |
          cd kernel-src
          set -e

          git clone --depth=1 -b "${{ github.event.inputs.susfs_branch }}" \
            "${{ github.event.inputs.susfs_repo }}" .susfs4ksu

          curl -LSsf "${{ github.event.inputs.susfs_patch_url }}" -o /tmp/susfs.patch

          set +e
          patch -p1 --fuzz=3 --no-backup-if-mismatch --force < /tmp/susfs.patch 2>&1 | tee /tmp/susfs.log
          set -e

          echo "Succeed: $(grep -c 'succeeded' /tmp/susfs.log)"
          echo "FAILED : $(grep -c 'FAILED' /tmp/susfs.log)"

          find . -name "*.rej" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true
          find . -name "*.orig" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true

          if [ ! -f fs/sus_su.c ] && [ -f .susfs4ksu/kernel_patches/fs/sus_su.c ]; then
            cp .susfs4ksu/kernel_patches/fs/sus_su.c fs/sus_su.c
          fi

      - name: 12. Manual fix untuk 3 hunk gagal + declarations
        run: |
          cd kernel-src

          # Fix 1: fs/proc_namespace.c includes
          if [ -f fs/proc_namespace.c ] && ! grep -q "susfs_def.h" fs/proc_namespace.c; then
            sed -i '/#include "proc\/internal.h"/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/proc_namespace.c
          fi

          # Fix 2: fs/stat.c wrap getattr
          if [ -f fs/stat.c ] && ! grep -q "int err = inode->i_op->getattr" fs/stat.c; then
            python3 << 'PYEOF'
          import re
          from pathlib import Path
          p = Path("fs/stat.c")
          text = p.read_text()
          pattern = re.compile(
              r'(\tif\s*\(inode->i_op->getattr\)\s*\n)'
              r'(\t\treturn inode->i_op->getattr\(path->mnt,\s*path->dentry,\s*stat\);)',
              re.MULTILINE
          )
          replacement = (
              r'\1'
              '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n'
              '\t{\n'
              '\t\tint err = inode->i_op->getattr(path->mnt, path->dentry, stat);\n'
              '\t\tif (!err)\n'
              '\t\t\tsusfs_sus_kstat_spoof_generic_fillattr(inode, stat);\n'
              '\t\treturn err;\n'
              '\t}\n'
              '#else\n'
              r'\2'
              '\n#endif'
          )
          new_text, n = pattern.subn(replacement, text)
          if n > 0:
              p.write_text(new_text)
          PYEOF
          fi

          # Fix 4: Force include susfs.h
          python3 << 'PYEOF'
          from pathlib import Path
          for filepath in ["fs/open.c", "fs/stat.c", "fs/proc_namespace.c", "fs/proc/task_mmu.c", "fs/proc/cmdline.c"]:
              p = Path(filepath)
              if not p.exists():
                  continue
              lines = p.read_text().split('\n')
              has_susfs = any('linux/susfs.h' in l for l in lines)
              has_susfs_def = any('linux/susfs_def.h' in l for l in lines)
              if has_susfs and has_susfs_def:
                  continue
              insert_idx = -1
              for i, line in enumerate(lines):
                  if line.strip().startswith('#include'):
                      insert_idx = i
                      break
              if insert_idx == -1:
                  continue
              new_includes = []
              if not has_susfs:
                  new_includes.append('#include <linux/susfs.h>')
              if not has_susfs_def:
                  new_includes.append('#include <linux/susfs_def.h>')
              lines[insert_idx:insert_idx] = new_includes
              p.write_text('\n'.join(lines))
              print(f"[OK] {filepath}: added includes")
          PYEOF

          # Fix 5: extern declarations di proc_namespace.c
          if [ -f fs/proc_namespace.c ] && ! grep -q "extern bool susfs_is_current_ksu_domain" fs/proc_namespace.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/proc_namespace.c")
          lines = p.read_text().split('\n')
          new_lines = []
          inserted = False
          for line in lines:
              new_lines.append(line)
              if not inserted and '#include "internal.h"' in line:
                  new_lines.extend([
                      '',
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT',
                      'extern bool susfs_is_current_ksu_domain(void);',
                      'extern bool susfs_hide_sus_mnts_for_non_su_procs;',
                      '#endif',
                      '',
                  ])
                  inserted = True
          p.write_text('\n'.join(new_lines))
          PYEOF
          fi

          # Fix 6: forward decl di fs/stat.c
          if [ -f fs/stat.c ] && ! grep -q "extern void susfs_sus_kstat_spoof_generic_fillattr" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          last_include = -1
          for i, line in enumerate(lines):
              if line.strip().startswith('#include'):
                  last_include = i
          if last_include >= 0:
              lines[last_include+1:last_include+1] = [
                  '',
                  '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT',
                  'extern void susfs_sus_kstat_spoof_generic_fillattr(struct inode *inode, struct kstat *stat);',
                  '#endif',
                  '',
              ]
              p.write_text('\n'.join(lines))
          PYEOF
          fi

          # Fix 7: hapus stray call di fs/stat.c
          if [ -f fs/stat.c ] && grep -q "^EXPORT_SYMBOL(vfs_getattr_nosec);$" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          new_lines = []
          i = 0
          removed = False
          while i < len(lines):
              line = lines[i]
              new_lines.append(line)
              if (not removed and line.strip() == 'EXPORT_SYMBOL(vfs_getattr_nosec);' and i + 3 < len(lines)):
                  if (lines[i+1].strip() == '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT'
                      and 'susfs_sus_kstat_spoof_generic_fillattr' in lines[i+2].strip()
                      and lines[i+3].strip() == '#endif'):
                      i += 4
                      removed = True
                      continue
              i += 1
          if removed:
              p.write_text('\n'.join(new_lines))
          PYEOF
          fi

      # ============================================================
      # KUNCI FIX #3: Inject HANYA hook yang wajib (yang missing dari log)
      # ============================================================
      # Dari log v1: yang missing = faccessat, sys_read, setresuid, sys_reboot
      # execveat sudah dihandle setup.sh (via ksud.h)
      # Kita HANYA inject 4 hook wajib ini
      # ============================================================
      - name: 13. Apply HANYA 4 hook wajib (jangan otak-atik yg lain)
        run: |
          cd kernel-src

          inject_hook() {
            local file="$1"
            local func_pat="$2"
            local hook_line="$3"
            [ -f "$file" ] || return 1
            awk -v pat="$func_pat" -v hook="$hook_line" '
              $0 ~ pat { in_func=1 }
              in_func && /^\{/ && !done {
                print
                print "\t/* ReSukiSU hook */"
                print "\t" hook
                done=1
                in_func=0
                next
              }
              { print }
            ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
          }

          add_include() {
            local file="$1"
            [ -f "$file" ] || return
            if ! grep -q "linux/ksu_hook.h" "$file"; then
              sed -i '0,/^#include/s||#include <linux/ksu_hook.h>\n&|' "$file"
            fi
          }

          # 1. faccessat (fs/open.c)
          add_include fs/open.c
          if ! grep -q "ksu_handle_faccessat" fs/open.c; then
            inject_hook fs/open.c "SYSCALL_DEFINE3.faccessat" \
              "ksu_handle_faccessat(&dfd, &filename, &mode, NULL);"
          fi

          # 2. sys_read (fs/read_write.c)
          add_include fs/read_write.c
          if ! grep -q "ksu_handle_sys_read" fs/read_write.c; then
            inject_hook fs/read_write.c "SYSCALL_DEFINE3.read" \
              "ksu_handle_sys_read(&fd, &buf, &count);"
          fi

          # 3. setresuid (kernel/sys.c)
          add_include kernel/sys.c
          if ! grep -q "ksu_handle_setresuid" kernel/sys.c; then
            inject_hook kernel/sys.c "SYSCALL_DEFINE3.setresuid" \
              "ksu_handle_setresuid(&ruid, &euid, &suid);"
          fi

          # 4. sys_reboot (kernel/reboot.c)
          add_include kernel/reboot.c
          if [ -f kernel/reboot.c ] && ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            inject_hook kernel/reboot.c "SYSCALL_DEFINE4.reboot" \
              "ksu_handle_sys_reboot(&magic1, &magic2, &cmd, &arg);"
          fi

          echo ""
          echo "== Verifikasi 4 hook wajib =="
          for f in fs/open.c fs/read_write.c kernel/sys.c kernel/reboot.c; do
            [ -f "$f" ] || continue
            HOOKS=$(grep -o "ksu_handle_[a-z_]*" "$f" 2>/dev/null | sort -u | tr '\n' ' ')
            echo "  $f -> ${HOOKS:-NONE}"
          done

          echo ""
          echo "== Verifikasi execveat (dari setup.sh) =="
          grep -n "ksu_handle_execveat\|ksud" fs/exec.c | head -10

      - name: 14. Prepare defconfig
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ "${{ github.event.inputs.use_extracted_config }}" = "true" ]; then
            EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/my_defconfig.txt"
            [ -f "$EXTRACTED_CFG" ] && cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
          fi

          sed -i '/^CONFIG_KSU/d;/^# CONFIG_KSU is not set/d' "$DEFCONFIG_PATH"
          sed -i '/SUSFS/d' "$DEFCONFIG_PATH"
          sed -i '/^CONFIG_KSU_KPROBE_HOOKS/d' "$DEFCONFIG_PATH"

          {
            echo ""
            echo "CONFIG_KSU=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_TMPFS_XATTR=y"
            echo "CONFIG_TMPFS_POSIX_ACL=y"
          } >> "$DEFCONFIG_PATH"

      - name: 15. Patch arch/arm64/Makefile
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"
          [ -f "$MAIN_MK" ] || exit 1
          sed -i -E 's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' "$MAIN_MK"

      - name: 16. Skip broken DTBs
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          [ -f "$DTS_MK" ] || exit 0
          for dtb in sdm845-v2-qvr-evt.dtb sdm845-v2-qvr-dvt.dtb sdm845-interposer-sdm670-mtp.dtb sdm845-interposer-sdm670-cdp.dtb; do
            sed -i "/$dtb/d" "$DTS_MK"
          done

      - name: 17. Compile Kernel
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR ARCH=arm64 CC=clang LD=ld.lld
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump STRIP=llvm-strip READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1 LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          grep -q '^CONFIG_KSU=y' $OUT_DIR/.config || { echo "CONFIG_KSU tidak aktif"; exit 1; }

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          BUILD_OK=0
          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"; BUILD_OK=1
          elif [ -f "$OUT_DIR/arch/arm64/boot/Image" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image"; BUILD_OK=1
          fi

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -eq 1 ] || exit 1

      - name: 18. Extract versions & metadata
        if: always()
        run: |
          cd kernel-src
          RESUKISU_CODE=$(grep -oP "ReSukiSU version code:\s*\K[0-9]+" build.log | head -1 || echo "unknown")
          RESUKISU_NAME=$(grep -oP "ReSukiSU version name:\s*\K\S+" build.log | head -1 || echo "unknown")
          SUSFS_VER=$(grep -oP "SUSFS_VERSION:\s*\Kv[0-9.]+" build.log | head -1 || echo "unknown")
          echo "RESUKISU_VERSION_CODE=${RESUKISU_CODE}" >> "$GITHUB_ENV"
          echo "RESUKISU_VERSION_NAME=${RESUKISU_NAME}" >> "$GITHUB_ENV"
          echo "SUSFS_VERSION=${SUSFS_VER}" >> "$GITHUB_ENV"

      - name: 19. Capture Build Metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          RESUKISU_COMMIT="unknown"
          [ -d KernelSU ] && RESUKISU_COMMIT=$(cd KernelSU && git rev-parse --short HEAD 2>/dev/null || echo "embedded")
          [ -d .resukisu-src ] && [ "$RESUKISU_COMMIT" = "unknown" ] && \
            RESUKISU_COMMIT=$(cd .resukisu-src && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          SUSFS_COMMIT=$(cd .susfs4ksu && git rev-parse --short HEAD 2>/dev/null || echo "unknown")

          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "$(date -u '+%Y-%m-%d %H:%M UTC')",
            "kernel": {
              "source": "${{ github.event.inputs.kernel_source }}",
              "branch": "${{ github.event.inputs.kernel_branch }}",
              "commit": "${KERNEL_COMMIT}",
              "version": "$(cat out/include/config/kernel.release)",
              "defconfig": "${{ github.event.inputs.defconfig }}"
            },
            "resukisu": {
              "repo": "${{ github.event.inputs.resukisu_repo }}",
              "branch": "${{ github.event.inputs.resukisu_branch }}",
              "commit": "${RESUKISU_COMMIT}",
              "version_code": "${RESUKISU_VERSION_CODE}",
              "version_name": "${RESUKISU_VERSION_NAME}"
            },
            "susfs": {
              "branch": "${{ github.event.inputs.susfs_branch }}",
              "commit": "${SUSFS_COMMIT}",
              "version": "${SUSFS_VERSION}"
            }
          }
          JSONEOF
          cat ../build-metadata.json | jq .

      - name: 20. Upload artifacts
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          retention-days: 30

      - name: 21. Upload metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json
          retention-days: 30

      - name: 22. Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          retention-days: 7
