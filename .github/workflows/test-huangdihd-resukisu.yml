name: TEST2. Compile Kernel - huangdihd ReSukiSU+SUSFS (Percobaan)

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'test-huangdihd-resukisu'
      kernel_source:
        description: 'Kernel Source (sudah include ReSukiSU + SUSFS + AnyKernel3)'
        required: true
        default: 'https://github.com/huangdihd/android_kernel_xiaomi_sdm845_resukisu_susfs.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: 'lineage-22.2'
      defconfig:
        description: 'defconfig path (di kernel source). Sama seperti BaikalOS karena sama-sama fork LineageOS.'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      use_extracted_config:
        description: 'Pakai config hasil extract boot.img BaikalOS asli sebagai basis? (true/false). Percobaan: coba false dulu, karena source ini beda basis (lineage-22.2, bukan 13.0).'
        required: true
        default: 'false'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

jobs:
  test-build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (untuk akses extracted-config/my_defconfig.txt jika dipakai)
        uses: actions/checkout@v4

      - name: Show Input
        run: |
          echo "kernel_source: ${{ github.event.inputs.kernel_source }}"
          echo "kernel_branch: ${{ github.event.inputs.kernel_branch }}"
          echo "defconfig: ${{ github.event.inputs.defconfig }}"
          echo "use_extracted_config: ${{ github.event.inputs.use_extracted_config }}"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev

      - name: Setup Clang Cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: Setup Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source (huangdihd ReSukiSU+SUSFS)
        run: |
          git clone --depth=1 "${{ github.event.inputs.kernel_source }}" -b "${{ github.event.inputs.kernel_branch }}" kernel-src
          echo "== Cek apakah KernelSU/susfs4ksu/AnyKernel3 sudah ada di source (tidak perlu setup.sh terpisah) =="
          cd kernel-src
          ls -la | grep -i "kernelsu\|susfs\|anykernel" || echo "PERINGATAN: Tidak ditemukan folder KernelSU/susfs4ksu/AnyKernel3 di root repo!"

      - name: Cari & Siapkan defconfig
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "[PERINGATAN] defconfig tidak ditemukan di $DEFCONFIG_PATH"
            echo "Mencari kemungkinan path defconfig lain:"
            find arch/arm64/configs -iname "*845*" -o -iname "*beryllium*" -o -iname "*xiaomi*" 2>/dev/null
            echo "Daftar lengkap isi arch/arm64/configs/vendor/xiaomi (jika ada):"
            ls -la arch/arm64/configs/vendor/xiaomi 2>/dev/null || echo "(folder tidak ada)"
            exit 1
          fi

          echo "[OK] defconfig ditemukan di $DEFCONFIG_PATH"

          # Cek apakah defconfig source ini SUDAH punya config KSU/SUSFS bawaan
          echo "== Cek config KSU/SUSFS yang sudah ada di defconfig source =="
          grep -i "CONFIG_KSU\|CONFIG_SUSFS" "$DEFCONFIG_PATH" || echo "[INFO] Belum ada config KSU/SUSFS eksplisit di defconfig, mungkin perlu ditambah manual."

          # Opsional: pakai config hasil extract boot.img BaikalOS asli sebagai basis.
          # PERCOBAAN: source ini beda basis (lineage-22.2) dari BaikalOS (13.0), jadi
          # config extract BaikalOS mungkin TIDAK cocok 100% di sini. Default workflow
          # ini false (pakai defconfig asli source huangdihd apa adanya) untuk percobaan
          # pertama; baru coba true di percobaan berikutnya jika yang pertama gagal/aneh.
          if [ "${{ github.event.inputs.use_extracted_config }}" = "true" ]; then
            EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/my_defconfig.txt"
            if [ -f "$EXTRACTED_CFG" ]; then
              echo "[INFO] Memakai config hasil extract boot.img BaikalOS sebagai basis (menimpa $DEFCONFIG_PATH)."
              cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
              # Tetap pastikan KSU/SUSFS aktif walau pakai basis config BaikalOS
              {
                echo "CONFIG_KSU=y"
                echo "CONFIG_KSU_SUSFS=y"
              } >> "$DEFCONFIG_PATH"
            else
              echo "[PERINGATAN] use_extracted_config=true tapi $EXTRACTED_CFG tidak ditemukan. Lanjut pakai defconfig asli source."
            fi
          else
            echo "[INFO] Memakai defconfig asli dari source huangdihd apa adanya (use_extracted_config=false)."
          fi

      - name: Compile Kernel (test build, tidak untuk flash)
        env:
          KBUILD_BUILD_USER: "tester"
          KBUILD_BUILD_HOST: "ghactions"
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR
            ARCH=arm64
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          echo "== Cek config KSU/SUSFS di .config hasil olddefconfig =="
          grep -i "CONFIG_KSU\|CONFIG_SUSFS" $OUT_DIR/.config || echo "PERINGATAN: Tidak ada config KSU/SUSFS aktif di .config final!"

          # -k (keep going): jangan berhenti total kalau satu target dtb gagal,
          # sama seperti pendekatan kita di workflow BaikalOS (board reference lain
          # yang tidak relevan untuk beryllium kadang corrupt di source SDM845 family).
          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "== Exit code make: $BUILD_EXIT =="
          echo "== Cek apakah Image / Image.gz-dtb berhasil dihasilkan =="
          IMAGE_OK=0
          IMAGE_GZ_DTB_OK=0

          if [ -f "$OUT_DIR/arch/arm64/boot/Image" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image"
            IMAGE_OK=1
          else
            echo "Image TIDAK ADA"
          fi

          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"
            IMAGE_GZ_DTB_OK=1
          else
            echo "Image.gz-dtb TIDAK ADA"
          fi

          BUILD_OK=0
          if [ "$IMAGE_GZ_DTB_OK" -eq 1 ]; then
            echo "[OK] Image.gz-dtb berhasil dihasilkan lengkap."
            BUILD_OK=1
          elif [ "$IMAGE_OK" -eq 1 ]; then
            echo "[SEBAGIAN OK] Image (vmlinux mentah) berhasil, tapi Image.gz-dtb belum ada."
            BUILD_OK=1
          else
            echo "[GAGAL] Baik Image maupun Image.gz-dtb tidak ditemukan. Build benar-benar gagal."
          fi

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          if [ "$BUILD_OK" -ne 1 ]; then
            exit 1
          fi

      - name: Capture Build Metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          KERNEL_VERSION_STRING=$(cat out/include/config/kernel.release 2>/dev/null || echo unknown)
          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "$(date -u '+%Y-%m-%d %H:%M UTC')",
            "kernel_source": "${{ github.event.inputs.kernel_source }}",
            "kernel_branch": "${{ github.event.inputs.kernel_branch }}",
            "kernel_commit": "${KERNEL_COMMIT}",
            "kernel_version_string": "${KERNEL_VERSION_STRING}",
            "defconfig": "${{ github.event.inputs.defconfig }}",
            "use_extracted_config": "${{ github.event.inputs.use_extracted_config }}",
            "zip_name": "${{ github.event.inputs.zip_name }}",
            "note": "Percobaan source huangdihd ReSukiSU+SUSFS, integrasi sudah include di source (bukan KSU-Next manual)"
          }
          JSONEOF
          cat ../build-metadata.json

      - name: Upload Build Metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json
          if-no-files-found: warn

      - name: Upload Build Log (selalu, untuk debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          if-no-files-found: warn

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore

      - name: Upload Image Only
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          if-no-files-found: ignore
