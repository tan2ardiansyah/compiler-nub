name: TEST3. Compile Kernel - BOS Beryllium + ReSukiSU + SUSFS (Percobaan)

# Pola: sama persis dengan workflow 1 (BaikalOS 13.0 sebagai base kernel),
# tapi mengganti integrasi KSU-Next dengan ReSukiSU + SUSFS.
# Referensi proses integrasi:
# - ReSukiSU setup.sh : https://github.com/ReSukiSU/ReSukiSU
# - SUSFS kernel-4.9  : https://gitlab.com/simonpunk/susfs4ksu/-/tree/kernel-4.9
# - Manual hooks      : https://resukisu.github.io/guide/manual-integrate.html

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'test-bos-beryllium-resukisu-susfs'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/baikalos/android_kernel_xiaomi_sdm845.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '13.0'
      defconfig:
        description: 'defconfig path'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      resukisu_ref:
        description: 'ReSukiSU branch/tag (https://github.com/ReSukiSU/ReSukiSU/tags)'
        required: false
        default: 'main'
      susfs_tag:
        description: 'SUSFS tag untuk kernel 4.9 (https://gitlab.com/simonpunk/susfs4ksu/-/tags)'
        required: false
        default: '1.4.2-kernel-4.9'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

jobs:
  test-build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (untuk akses extracted-config/my_defconfig.txt)
        uses: actions/checkout@v4

      - name: Show Input
        run: |
          echo "kernel_source : ${{ github.event.inputs.kernel_source }}"
          echo "kernel_branch : ${{ github.event.inputs.kernel_branch }}"
          echo "defconfig     : ${{ github.event.inputs.defconfig }}"
          echo "resukisu_ref  : ${{ github.event.inputs.resukisu_ref }}"
          echo "susfs_tag     : ${{ github.event.inputs.susfs_tag }}"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget patch \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev

      - name: Setup Clang Cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: Setup Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source (BaikalOS)
        run: |
          git clone --depth=1 "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" kernel-src

      - name: Setup ReSukiSU (via setup.sh resmi)
        run: |
          cd kernel-src
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" \
            | bash -s "${{ github.event.inputs.resukisu_ref }}"

          echo "== Cek symlink/entri ReSukiSU =="
          ls -la drivers/ | grep -i "kernelsu\|resukisu\|ksu" || echo "TIDAK ADA symlink driver!"
          grep -ni "kernelsu\|resukisu\|ksu" drivers/Makefile | head -5 || echo "TIDAK ADA entri Makefile!"
          grep -ni "kernelsu\|resukisu\|ksu" drivers/Kconfig | head -5 || echo "TIDAK ADA entri Kconfig!"

          # Catat nama folder yang dibuat setup.sh (bisa kernelsu atau resukisu)
          KSU_DIR=$(ls -d drivers/kernelsu drivers/resukisu 2>/dev/null | head -1 || \
                    ls -la drivers/ | grep -i "ksu\|kernelsu\|resukisu" | awk '{print $NF}' | head -1)
          echo "KSU_DIR=$KSU_DIR" >> "$GITHUB_ENV"
          echo "Folder driver KSU terdeteksi: $KSU_DIR"

      - name: Clone SUSFS & Apply Patches (kernel-4.9, via JackA1ltman patch)
        run: |
          cd kernel-src

          # Tentukan nama folder KSU root yang dibuat setup.sh (kernelsu atau ReSukiSU)
          if [ -d "KernelSU" ]; then
            KSU_KERNEL_DIR="KernelSU"
          elif [ -d "ReSukiSU" ]; then
            KSU_KERNEL_DIR="ReSukiSU"
          else
            echo "PERINGATAN: Tidak menemukan folder KernelSU atau ReSukiSU di root!"
            ls -la
            exit 1
          fi
          echo "Folder root KSU: $KSU_KERNEL_DIR"

          # Clone susfs4ksu (resmi, untuk patch KSU-side)
          git clone --depth=1 \
            -b "${{ github.event.inputs.susfs_tag }}" \
            "https://gitlab.com/simonpunk/susfs4ksu.git" susfs4ksu-src

          echo "== Struktur susfs4ksu yang di-clone =="
          ls -la susfs4ksu-src/kernel_patches/
          ls -la susfs4ksu-src/kernel_patches/KernelSU/ 2>/dev/null || \
            echo "(tidak ada subfolder KernelSU di patch folder)"

          # Patch 1: enable SUSFS di dalam folder KernelSU/ReSukiSU (patch dari repo SUSFS resmi)
          # Patch ini memodifikasi kode sisi KSU (bukan sisi kernel), sehingga tetap pakai
          # dari repo SUSFS resmi yang paling up-to-date untuk bagian ini.
          PATCH1="susfs4ksu-src/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
          if [ -f "$PATCH1" ]; then
            echo "== Menerapkan Patch 1: 10_enable_susfs_for_ksu.patch ke $KSU_KERNEL_DIR/ =="
            cp "$PATCH1" "$KSU_KERNEL_DIR/"
            cd "$KSU_KERNEL_DIR"
            patch -p1 --forward < 10_enable_susfs_for_ksu.patch \
              && echo "[OK] Patch 1 berhasil." \
              || echo "[PERINGATAN] Patch 1 ada hunk yang gagal (mungkin sudah include). Lanjut."
            cd ..
          else
            echo "[INFO] Patch 1 tidak ditemukan. Kemungkinan ReSukiSU sudah include SUSFS bawaan."
          fi

          # Patch 2: tambahkan SUSFS ke kernel source (kernel-side)
          # KUNCI: pakai patch khusus kernel-4.9 dari JackA1ltman/NonGKI_Kernel_Build_2nd
          # yang sudah disesuaikan untuk kernel 4.9, bukan patch generik dari repo SUSFS resmi.
          # Patch resmi (50_add_susfs_in_kernel-4.9.patch) terbukti gagal apply di percobaan
          # sebelumnya karena perbedaan struktur dengan kernel BaikalOS kita (downstream SDM845).
          PATCH2_URL="https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch"
          echo "== Mengunduh patch susfs_patch_to_4.9.patch dari JackA1ltman =="
          curl -LSs -o susfs_patch_to_4.9.patch "$PATCH2_URL"
          wc -l susfs_patch_to_4.9.patch

          echo "== Menerapkan Patch 2: susfs_patch_to_4.9.patch ke root kernel =="
          patch -p1 --forward < susfs_patch_to_4.9.patch \
            && echo "[OK] Patch 2 berhasil sepenuhnya." \
            || {
              echo "[PERINGATAN] Patch 2 ada hunk yang gagal/reject."
              echo "Cek file .rej untuk detail:"
              find . -name "*.rej" | head -20
            }

          # Verifikasi: cek apakah susfs.h sudah ada (indikator utama patch sukses)
          if [ -f "include/linux/susfs.h" ]; then
            echo "[OK] include/linux/susfs.h ditemukan — patch kernel-side berhasil."
          else
            echo "[PERINGATAN] include/linux/susfs.h TIDAK ditemukan!"
            echo "Patch mungkin tidak berhasil menambahkan file SUSFS ke kernel."
          fi

          # Verifikasi: cek apakah fs/susfs.c ada
          if [ -f "fs/susfs.c" ]; then
            echo "[OK] fs/susfs.c ditemukan."
          else
            echo "[PERINGATAN] fs/susfs.c TIDAK ditemukan!"
          fi

      - name: Siapkan defconfig (config extract BaikalOS + tambahan ReSukiSU+SUSFS)
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "ERROR: defconfig tidak ditemukan di $DEFCONFIG_PATH"
            find arch/arm64/configs -iname "*845*" -o -iname "*beryllium*" -o -iname "*xiaomi*" 2>/dev/null
            exit 1
          fi

          # Pakai config extract boot.img BaikalOS asli sebagai basis
          # (sama persis seperti workflow 1 yang sudah terbukti boot)
          EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/my_defconfig.txt"
          if [ -f "$EXTRACTED_CFG" ]; then
            echo "[INFO] Memakai config hasil extract boot.img BaikalOS sebagai basis."
            cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
          else
            echo "[PERINGATAN] extracted-config/my_defconfig.txt tidak ditemukan. Pakai defconfig asli dari source."
          fi

          # Tambahkan config ReSukiSU + SUSFS
          # Referensi: https://resukisu.github.io/guide/manual-integrate.html
          # dan https://gitlab.com/simonpunk/susfs4ksu
          # CATATAN: CONFIG_KSU_MANUAL_HOOK sengaja TIDAK diset di sini karena
          # ia dan CONFIG_KSU_SUSFS berada dalam satu `choice {}` block di Kconfig ReSukiSU,
          # sehingga menyebabkan "recursive dependency" error jika keduanya diset bersamaan.
          # Biarkan Kconfig memilih hook mode secara otomatis berdasarkan pilihan default-nya.
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KPM=y"
            echo "CONFIG_KALLSYMS=y"
            echo "CONFIG_KALLSYMS_ALL=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
          } >> "$DEFCONFIG_PATH"
          echo "[OK] Defconfig berhasil dipatch dengan opsi ReSukiSU + SUSFS."

      - name: Patch arch/arm64/Makefile (fix clang vdso32 "-EL" assembler error)
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"
          cp "$MAIN_MK" "$MAIN_MK.orig"
          sed -i -E \
            's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' \
            "$MAIN_MK"
          if ! diff -q "$MAIN_MK" "$MAIN_MK.orig" > /dev/null; then
            echo "[OK] Patch CLANG_PREFIX32 berhasil diterapkan."
          else
            echo "[INFO] Pattern CLANG_PREFIX32 tidak ditemukan — kemungkinan source ini sudah punya fix ini bawaan."
          fi
          rm -f "$MAIN_MK.orig"

      - name: Skip DTB yang tidak relevan/rusak (QVR headset, interposer SDM670)
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          if [ ! -f "$DTS_MK" ]; then exit 0; fi
          cp "$DTS_MK" "$DTS_MK.orig"
          for dtb in "sdm845-v2-qvr-evt.dtb" "sdm845-v2-qvr-dvt.dtb" \
                     "sdm845-interposer-sdm670-mtp.dtb" "sdm845-interposer-sdm670-cdp.dtb"; do
            if grep -q "$dtb" "$DTS_MK"; then
              sed -i "/$dtb/d" "$DTS_MK"
              echo "[OK] $dtb dihapus dari daftar build."
            fi
          done
          diff "$DTS_MK.orig" "$DTS_MK" || true
          rm -f "$DTS_MK.orig"

      - name: Compile Kernel
        env:
          KBUILD_BUILD_USER: "tester"
          KBUILD_BUILD_HOST: "ghactions"
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR ARCH=arm64
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump
            STRIP=llvm-strip READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1 LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          echo "== Cek config KSU/SUSFS di .config final =="
          for cfg in CONFIG_KSU CONFIG_KSU_MANUAL_HOOK CONFIG_KSU_SUSFS CONFIG_KPM; do
            grep "^${cfg}=" $OUT_DIR/.config || echo "PERINGATAN: ${cfg} tidak aktif!"
          done

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "== Exit code make: $BUILD_EXIT =="
          IMAGE_OK=0; IMAGE_GZ_DTB_OK=0
          [ -f "$OUT_DIR/arch/arm64/boot/Image" ] && { ls -la "$OUT_DIR/arch/arm64/boot/Image"; IMAGE_OK=1; } || echo "Image TIDAK ADA"
          [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ] && { ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"; IMAGE_GZ_DTB_OK=1; } || echo "Image.gz-dtb TIDAK ADA"

          BUILD_OK=0
          [ "$IMAGE_GZ_DTB_OK" -eq 1 ] && { echo "[OK] Image.gz-dtb berhasil!"; BUILD_OK=1; } || \
          [ "$IMAGE_OK" -eq 1 ] && { echo "[SEBAGIAN OK] Image berhasil, Image.gz-dtb belum ada."; BUILD_OK=1; } || \
          echo "[GAGAL] Build benar-benar gagal."

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -ne 1 ] && exit 1 || true

      - name: Capture Build Metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          KERNEL_VERSION_STRING=$(cat out/include/config/kernel.release 2>/dev/null || echo unknown)
          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "$(date -u '+%Y-%m-%d %H:%M UTC')",
            "kernel_source": "${{ github.event.inputs.kernel_source }}",
            "kernel_branch": "${{ github.event.inputs.kernel_branch }}",
            "kernel_commit": "${KERNEL_COMMIT}",
            "kernel_version_string": "${KERNEL_VERSION_STRING}",
            "resukisu_ref": "${{ github.event.inputs.resukisu_ref }}",
            "susfs_tag": "${{ github.event.inputs.susfs_tag }}",
            "zip_name": "${{ github.event.inputs.zip_name }}"
          }
          JSONEOF
          cat ../build-metadata.json

      - name: Upload Build Metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json
          if-no-files-found: warn

      - name: Upload Build Log (selalu, untuk debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          if-no-files-found: warn

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore

      - name: Upload Image Only
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          if-no-files-found: ignore
