name: 11. Compile Kernel MIUI 12 Stock - Poco F1 + KernelSU-Next + SUSFS

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'miui12-beryllium-ksunext-susfs'
      kernel_source:
        description: 'Kernel Source (MiCode Xiaomi Open Source)'
        required: true
        default: 'https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git'
      kernel_branch:
        description: 'Kernel Branch (MIUI 12 = dipper-q-oss)'
        required: true
        default: 'dipper-q-oss'
      defconfig:
        description: 'defconfig untuk beryllium'
        required: true
        default: 'beryllium_user_defconfig'
      ksu_tag:
        description: 'KernelSU-Next tag/commit'
        required: false
        default: 'v3.2.0'
      ksu_setup_url:
        description: 'KSU-Next setup script URL'
        required: true
        default: 'https://raw.githubusercontent.com/ThRE-Team/KernelSU-Next/main/kernel/setup.sh'
      enable_susfs:
        description: 'Apply SUSFS patch? (true/false)'
        required: true
        default: 'true'
      susfs_repo:
        description: 'SUSFS repo URL'
        required: true
        default: 'https://gitlab.com/simonpunk/susfs4ksu.git'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.9'
      susfs_patch_url:
        description: 'SUSFS patch URL'
        required: true
        default: 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

env:
  KBUILD_BUILD_USER: "Nerf."
  KBUILD_BUILD_HOST: "OldlineSSS"
  ARCH: arm64

jobs:
  build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:

      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Show inputs
        run: |
          echo "========================================"
          echo "  MIUI 12 STOCK + KSU-NEXT + SUSFS"
          echo "========================================"
          echo "Kernel source : ${{ github.event.inputs.kernel_source }}"
          echo "Kernel branch : ${{ github.event.inputs.kernel_branch }}"
          echo "Defconfig     : ${{ github.event.inputs.defconfig }}"
          echo "KSU-Next tag  : ${{ github.event.inputs.ksu_tag }}"
          echo "Enable SUSFS  : ${{ github.event.inputs.enable_susfs }}"
          echo "========================================"

      - name: 3. Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget python3 python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev patch jq

      - name: 4. Setup Clang cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: 5. Download Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: 6. Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: 7. Clone MIUI 12 kernel source
        run: |
          git clone --depth=1 \
            "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" \
            kernel-src

          cd kernel-src
          echo "== Verifikasi branch =="
          git log -1 --oneline
          echo ""
          echo "== Defconfig untuk beryllium =="
          find arch/arm64/configs -iname "*beryllium*"

      # ============================================================
      # STEP 8: Setup KernelSU-Next (SIMPLE, just curl setup.sh)
      # ============================================================
      - name: 8. Setup KernelSU-Next
        run: |
          cd kernel-src

          curl -LSs "${{ github.event.inputs.ksu_setup_url }}" | bash -s "${{ github.event.inputs.ksu_tag }}"

          echo "== Verifikasi KSU-Next integration =="
          ls -la drivers/kernelsu || echo "TIDAK ADA symlink drivers/kernelsu!"
          grep -n "kernelsu" drivers/Makefile || echo "TIDAK ADA entri di drivers/Makefile!"
          grep -n "kernelsu" drivers/Kconfig || echo "TIDAK ADA entri di drivers/Kconfig!"

      # ============================================================
      # STEP 9: SUSFS integration (opsional)
      # ============================================================
      - name: 9. Clone SUSFS & apply patch (kalau enabled)
        if: github.event.inputs.enable_susfs == 'true'
        run: |
          cd kernel-src
          set -e

          git clone --depth=1 -b "${{ github.event.inputs.susfs_branch }}" \
            "${{ github.event.inputs.susfs_repo }}" .susfs4ksu

          curl -LSsf "${{ github.event.inputs.susfs_patch_url }}" -o /tmp/susfs.patch

          set +e
          patch -p1 --fuzz=3 --no-backup-if-mismatch --force < /tmp/susfs.patch 2>&1 | tee /tmp/susfs.log
          set -e

          echo "== Hasil apply patch =="
          echo "Succeed: $(grep -c 'succeeded' /tmp/susfs.log)"
          echo "FAILED : $(grep -c 'FAILED' /tmp/susfs.log)"

          find . -name "*.rej" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true
          find . -name "*.orig" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true

          if [ ! -f fs/sus_su.c ] && [ -f .susfs4ksu/kernel_patches/fs/sus_su.c ]; then
            cp .susfs4ksu/kernel_patches/fs/sus_su.c fs/sus_su.c
          fi

      - name: 10. Manual fix SUSFS hunks (kalau SUSFS enabled)
        if: github.event.inputs.enable_susfs == 'true'
        run: |
          cd kernel-src

          if [ -f fs/proc_namespace.c ] && ! grep -q "susfs_def.h" fs/proc_namespace.c; then
            sed -i '/#include "proc\/internal.h"/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/proc_namespace.c
          fi

          if [ -f fs/stat.c ] && ! grep -q "int err = inode->i_op->getattr" fs/stat.c; then
            python3 << 'PYEOF'
          import re
          from pathlib import Path
          p = Path("fs/stat.c")
          text = p.read_text()
          pattern = re.compile(
              r'(\tif\s*\(inode->i_op->getattr\)\s*\n)'
              r'(\t\treturn inode->i_op->getattr\(path->mnt,\s*path->dentry,\s*stat\);)',
              re.MULTILINE
          )
          replacement = (
              r'\1'
              '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n\t{\n'
              '\t\tint err = inode->i_op->getattr(path->mnt, path->dentry, stat);\n'
              '\t\tif (!err)\n'
              '\t\t\tsusfs_sus_kstat_spoof_generic_fillattr(inode, stat);\n'
              '\t\treturn err;\n\t}\n#else\n' r'\2' '\n#endif'
          )
          new_text, n = pattern.subn(replacement, text)
          if n > 0:
              p.write_text(new_text)
          PYEOF
          fi

          python3 << 'PYEOF'
          from pathlib import Path
          for filepath in ["fs/open.c", "fs/stat.c", "fs/proc_namespace.c", "fs/proc/task_mmu.c", "fs/proc/cmdline.c"]:
              p = Path(filepath)
              if not p.exists(): continue
              lines = p.read_text().split('\n')
              has_susfs = any('linux/susfs.h' in l for l in lines)
              has_susfs_def = any('linux/susfs_def.h' in l for l in lines)
              if has_susfs and has_susfs_def: continue
              insert_idx = -1
              for i, line in enumerate(lines):
                  if line.strip().startswith('#include'):
                      insert_idx = i; break
              if insert_idx == -1: continue
              new_includes = []
              if not has_susfs: new_includes.append('#include <linux/susfs.h>')
              if not has_susfs_def: new_includes.append('#include <linux/susfs_def.h>')
              lines[insert_idx:insert_idx] = new_includes
              p.write_text('\n'.join(lines))
          PYEOF

          if [ -f fs/proc_namespace.c ] && ! grep -q "extern bool susfs_is_current_ksu_domain" fs/proc_namespace.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/proc_namespace.c")
          lines = p.read_text().split('\n')
          new_lines = []
          inserted = False
          for line in lines:
              new_lines.append(line)
              if not inserted and '#include "internal.h"' in line:
                  new_lines.extend(['', '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT',
                      'extern bool susfs_is_current_ksu_domain(void);',
                      'extern bool susfs_hide_sus_mnts_for_non_su_procs;',
                      '#endif', ''])
                  inserted = True
          p.write_text('\n'.join(new_lines))
          PYEOF
          fi

          if [ -f fs/stat.c ] && ! grep -q "extern void susfs_sus_kstat_spoof_generic_fillattr" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          last_include = -1
          for i, line in enumerate(lines):
              if line.strip().startswith('#include'): last_include = i
          if last_include >= 0:
              lines[last_include+1:last_include+1] = ['', '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT',
                  'extern void susfs_sus_kstat_spoof_generic_fillattr(struct inode *inode, struct kstat *stat);',
                  '#endif', '']
              p.write_text('\n'.join(lines))
          PYEOF
          fi

          if [ -f fs/stat.c ] && grep -q "^EXPORT_SYMBOL(vfs_getattr_nosec);$" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          new_lines = []
          i = 0
          removed = False
          while i < len(lines):
              line = lines[i]
              new_lines.append(line)
              if (not removed and line.strip() == 'EXPORT_SYMBOL(vfs_getattr_nosec);' and i + 3 < len(lines)):
                  if (lines[i+1].strip() == '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT'
                      and 'susfs_sus_kstat_spoof_generic_fillattr' in lines[i+2].strip()
                      and lines[i+3].strip() == '#endif'):
                      i += 4; removed = True; continue
              i += 1
          if removed: p.write_text('\n'.join(new_lines))
          PYEOF
          fi

      # ============================================================
      # STEP 11: Prepare defconfig - KSU-Next PAKAI KPROBE HOOKS
      # ============================================================
      # KSU-Next TIDAK butuh manual inject hooks (beda dengan ReSukiSU)
      # Cukup enable CONFIG_KSU_KPROBE_HOOKS=y
      # ============================================================
      - name: 11. Prepare defconfig (KSU-Next kprobe + SUSFS + namespace fix)
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "[FATAL] Defconfig tidak ditemukan"
            find arch/arm64/configs -iname "*beryllium*" -o -iname "*dipper*"
            exit 1
          fi

          # Bersihkan entry lama
          sed -i '/^CONFIG_KSU/d;/^# CONFIG_KSU is not set/d;/SUSFS/d' "$DEFCONFIG_PATH"

          # ENABLE UTS_NS dan PID_NS (MIUI stock disable, KSU butuh)
          sed -i 's|^# CONFIG_UTS_NS is not set|CONFIG_UTS_NS=y|' "$DEFCONFIG_PATH"
          sed -i 's|^# CONFIG_PID_NS is not set|CONFIG_PID_NS=y|' "$DEFCONFIG_PATH"

          # Append config KSU-Next + SUSFS
          {
            echo ""
            echo "# === KernelSU-Next (dokumen resmi non-GKI integration) ==="
            echo "CONFIG_KSU=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo "CONFIG_KSU_KPROBE_HOOKS=y"
            echo ""
            echo "# === Namespace (WAJIB, MIUI stock disable) ==="
            echo "CONFIG_UTS_NS=y"
            echo "CONFIG_PID_NS=y"
          } >> "$DEFCONFIG_PATH"

          if [ "${{ github.event.inputs.enable_susfs }}" = "true" ]; then
            {
              echo ""
              echo "# === SUSFS ==="
              echo "CONFIG_KSU_SUSFS=y"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
              echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
            } >> "$DEFCONFIG_PATH"
          fi

          {
            echo ""
            echo "# === Filesystem ==="
            echo "CONFIG_TMPFS_XATTR=y"
          } >> "$DEFCONFIG_PATH"

          echo "== KSU/SUSFS/Namespace configs =="
          grep -E "CONFIG_KSU|SUSFS|UTS_NS|PID_NS|OVERLAY" "$DEFCONFIG_PATH" | sort

      - name: 12. Patch arch/arm64/Makefile (fix clang vdso32)
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"
          [ -f "$MAIN_MK" ] || exit 1
          sed -i -E 's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' "$MAIN_MK" || true

      - name: 13. Skip broken DTBs
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          [ -f "$DTS_MK" ] || exit 0
          for dtb in sdm845-v2-qvr-evt.dtb sdm845-v2-qvr-dvt.dtb sdm845-interposer-sdm670-mtp.dtb sdm845-interposer-sdm670-cdp.dtb; do
            sed -i "/$dtb/d" "$DTS_MK" 2>/dev/null || true
          done

      - name: 14. Compile Kernel
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR ARCH=arm64 CC=clang LD=ld.lld
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump STRIP=llvm-strip READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1 LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          echo "== Config check =="
          for cfg in CONFIG_KSU CONFIG_KSU_KPROBE_HOOKS CONFIG_KPROBES CONFIG_UTS_NS CONFIG_PID_NS CONFIG_KSU_SUSFS; do
            grep "^${cfg}=" $OUT_DIR/.config || echo "${cfg}=NOT SET"
          done

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          BUILD_OK=0
          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"; BUILD_OK=1
          fi
          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -eq 1 ] || exit 1

      - name: 15. Capture metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          KSU_COMMIT=$(cd KernelSU-Next 2>/dev/null && git rev-parse --short HEAD || echo "unknown")
          SUSFS_COMMIT=$(cd .susfs4ksu 2>/dev/null && git rev-parse --short HEAD || echo "unknown")

          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "$(date -u '+%Y-%m-%d %H:%M UTC')",
            "target_rom": "MIUI 12 Stock (Android 10)",
            "kernel": {
              "source": "${{ github.event.inputs.kernel_source }}",
              "branch": "${{ github.event.inputs.kernel_branch }}",
              "commit": "${KERNEL_COMMIT}",
              "version": "$(cat out/include/config/kernel.release)",
              "defconfig": "${{ github.event.inputs.defconfig }}"
            },
            "kernelsu_next": {
              "tag": "${{ github.event.inputs.ksu_tag }}",
              "commit": "${KSU_COMMIT}",
              "hook_method": "kprobe"
            },
            "susfs": {
              "enabled": "${{ github.event.inputs.enable_susfs }}",
              "branch": "${{ github.event.inputs.susfs_branch }}",
              "commit": "${SUSFS_COMMIT}"
            }
          }
          JSONEOF
          cat ../build-metadata.json | jq .

      - name: 16. Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-miui12-ksunext
          path: kernel-src/build.log
          retention-days: 7

      - name: 17. Upload Image
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          retention-days: 30

      - name: 18. Upload metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-miui12-ksunext
          path: build-metadata.json
          retention-days: 30
