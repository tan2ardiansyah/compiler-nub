name: 13. Compile Kernel - BOS Beryllium + KSU-Next + SUSFS v2.2.0

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'bos-beryllium-ksunext-susfs'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/baikalos/android_kernel_xiaomi_sdm845.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '13.0'
      defconfig:
        description: 'defconfig path'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      use_extracted_config:
        description: 'Pakai extracted config? (true/false)'
        required: true
        default: 'true'
      ksu_tag:
        description: 'KernelSU-Next tag'
        required: false
        default: 'v3.3.0-enjoy'
      susfs_kconfig_repo:
        description: 'SUSFS Kconfig source (fork 1392726643)'
        required: true
        default: 'https://gitlab.com/1392726643/susfs4ksu.git'
      susfs_kconfig_branch:
        description: 'SUSFS Kconfig branch'
        required: true
        default: 'kernel-4.9'
      susfs_patch_url:
        description: 'SUSFS v2.2.0 patch (JackA1ltman)'
        required: true
        default: 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch'

jobs:
  build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KBUILD_BUILD_USER: "Nerf."
      KBUILD_BUILD_HOST: "OldlineSSS"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates \
            libssl-dev libelf-dev cpio curl git unzip wget patch \
            python3 python-is-python3 jq \
            libncurses5-dev libncursesw5-dev

      # ============================================================
      # TOOLCHAIN: Clang r353983c + GCC 4.9 (proven untuk kernel 4.9)
      # ============================================================
      - name: Setup Clang r353983c
        run: |
          mkdir -p ~/toolchains/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android10-release/clang-r353983c.tar.gz -O /tmp/clang.tar.gz
          FILE_SIZE=$(stat -c%s /tmp/clang.tar.gz)
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            wget -q "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-10.0.0_r1/clang-r353983c.tar.gz" -O /tmp/clang.tar.gz
          fi
          tar -xzf /tmp/clang.tar.gz -C ~/toolchains/clang
          rm /tmp/clang.tar.gz

      - name: Setup GCC 4.9 aarch64
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            -b android-9.0.0_r61 ~/toolchains/gcc-aarch64

      - name: Setup GCC 4.9 arm32
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            -b android-9.0.0_r61 ~/toolchains/gcc-arm32

      - name: Clone BaikalOS kernel
        run: |
          git clone --depth=1 "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" kernel-src

      # ============================================================
      # STEP 1: Setup KSU-Next (ThRE-Team)
      # ============================================================
      - name: Setup KernelSU-Next
        run: |
          cd kernel-src
          curl -LSs "https://raw.githubusercontent.com/ThRE-Team/KernelSU-Next/main/kernel/setup.sh" \
            | bash -s "${{ github.event.inputs.ksu_tag }}"

          KSU_DIR=""
          for d in KernelSU-Next KernelSU; do
            [ -d "$d" ] && { KSU_DIR="$d"; break; }
          done
          echo "KSU_DIR=$KSU_DIR" >> "$GITHUB_ENV"
          echo "KSU folder: $KSU_DIR"
          ls -la drivers/kernelsu || echo "MISSING!"

      # ============================================================
      # STEP 2: Inject Kconfig SUSFS ke KSU-Next
      # Source: fork 1392726643 (73 commits ahead, non-GKI optimized)
      # ============================================================
      - name: Inject Kconfig SUSFS ke KSU-Next
        run: |
          cd kernel-src
          KSU_DIR="${{ env.KSU_DIR }}"

          echo "== Clone SUSFS Kconfig source =="
          git clone --depth=1 \
            -b "${{ github.event.inputs.susfs_kconfig_branch }}" \
            "${{ github.event.inputs.susfs_kconfig_repo }}" /tmp/susfs-kconfig

          PATCH1="/tmp/susfs-kconfig/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"

          if [ -f "$PATCH1" ] && [ -d "$KSU_DIR" ]; then
            # BACKUP selinux files SEBELUM patch (patch akan rusak mereka)
            cp "$KSU_DIR/kernel/selinux/selinux.c" /tmp/selinux.c.bak
            cp "$KSU_DIR/kernel/selinux/selinux.h" /tmp/selinux.h.bak
            cp "$KSU_DIR/kernel/selinux/rules.c" /tmp/rules.c.bak
            echo "[OK] SELinux files backed up"

            # Apply patch (Kconfig akan berhasil, selinux akan gagal)
            cp "$PATCH1" "$KSU_DIR/"
            cd "$KSU_DIR"
            set +e
            patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch 2>&1 | tee /tmp/patch1.log
            set -e
            rm -f 10_enable_susfs_for_ksu.patch
            cd ..

            echo ""
            echo "Patch Kconfig: Succeed=$(grep -c 'succeeded' /tmp/patch1.log) FAILED=$(grep -c 'FAILED' /tmp/patch1.log)"

            # RESTORE selinux files (patch corrupt mereka karena nama function beda)
            cp /tmp/selinux.c.bak "$KSU_DIR/kernel/selinux/selinux.c"
            cp /tmp/selinux.h.bak "$KSU_DIR/kernel/selinux/selinux.h"
            cp /tmp/rules.c.bak "$KSU_DIR/kernel/selinux/rules.c"
            echo "[OK] SELinux files restored"
          fi

          echo ""
          echo "== Verify Kconfig SUSFS =="
          grep "KSU_SUSFS" "$KSU_DIR/kernel/Kconfig" | head -5

      # ============================================================
      # STEP 3: Apply patch JackA1ltman (SUSFS v2.2.0 files + kernel mods)
      # Proven dari ReSukiSU workflow
      # ============================================================
      - name: Apply SUSFS v2.2.0 patch (JackA1ltman)
        run: |
          cd kernel-src

          echo "== Download patch =="
          curl -LSsf "${{ github.event.inputs.susfs_patch_url }}" -o /tmp/susfs.patch
          echo "Patch size: $(wc -c < /tmp/susfs.patch) bytes"

          echo ""
          echo "== Apply patch =="
          set +e
          patch -p1 --fuzz=3 --no-backup-if-mismatch --force < /tmp/susfs.patch 2>&1 | tee /tmp/patch2.log
          set -e

          echo ""
          echo "Patch kernel: Succeed=$(grep -c 'succeeded' /tmp/patch2.log) FAILED=$(grep -c 'FAILED' /tmp/patch2.log)"

          if grep -q "FAILED" /tmp/patch2.log; then
            echo ""
            echo "== FAILED hunks =="
            grep -B 1 "FAILED" /tmp/patch2.log | head -20
          fi

          find . -name "*.rej" -delete 2>/dev/null || true
          find . -name "*.orig" -delete 2>/dev/null || true

          # Copy sus_su.c dari fork (tidak ada di patch JackA1ltman)
          if [ ! -f fs/sus_su.c ] && [ -f /tmp/susfs-kconfig/kernel_patches/fs/sus_su.c ]; then
            cp /tmp/susfs-kconfig/kernel_patches/fs/sus_su.c fs/sus_su.c
            echo "[OK] sus_su.c copied dari fork"
          fi
          
          # Copy sus_su.h juga kalau ada
          if [ ! -f include/linux/sus_su.h ] && [ -f /tmp/susfs-kconfig/kernel_patches/include/linux/sus_su.h ]; then
            cp /tmp/susfs-kconfig/kernel_patches/include/linux/sus_su.h include/linux/sus_su.h
            echo "[OK] sus_su.h copied dari fork"
          fi

          echo ""
          echo "== Verify SUSFS v2.2.0 =="
          grep "SUSFS_VERSION" include/linux/susfs.h | head -3
          echo "Files:"
          ls -la fs/susfs.c fs/sus_su.c include/linux/susfs.h include/linux/susfs_def.h 2>/dev/null || true

      # Cleanup temp setelah semua step SUSFS selesai
      - name: Cleanup temp files
        if: always()
        run: rm -rf /tmp/susfs-kconfig /tmp/susfs.patch

      # ============================================================
      # STEP 4: Manual fix hunks yang gagal (proven dari ReSukiSU)
      # ============================================================
      - name: Manual fix SUSFS hunks
        run: |
          cd kernel-src

          if [ -f fs/proc_namespace.c ] && ! grep -q "susfs_def.h" fs/proc_namespace.c; then
            sed -i '/#include "proc\/internal.h"/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/proc_namespace.c
          fi

          if [ -f fs/stat.c ] && ! grep -q "int err = inode->i_op->getattr" fs/stat.c; then
            python3 << 'PYEOF'
          import re
          from pathlib import Path
          p = Path("fs/stat.c")
          text = p.read_text()
          pattern = re.compile(
              r'(\tif\s*\(inode->i_op->getattr\)\s*\n)'
              r'(\t\treturn inode->i_op->getattr\(path->mnt,\s*path->dentry,\s*stat\);)',
              re.MULTILINE
          )
          replacement = (r'\1'
              '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n\t{\n'
              '\t\tint err = inode->i_op->getattr(path->mnt, path->dentry, stat);\n'
              '\t\tif (!err)\n'
              '\t\t\tsusfs_sus_kstat_spoof_generic_fillattr(inode, stat);\n'
              '\t\treturn err;\n\t}\n#else\n' r'\2' '\n#endif')
          new_text, n = pattern.subn(replacement, text)
          if n > 0: p.write_text(new_text)
          PYEOF
          fi

          python3 << 'PYEOF'
          from pathlib import Path
          for filepath in ["fs/open.c", "fs/stat.c", "fs/proc_namespace.c", "fs/proc/task_mmu.c", "fs/proc/cmdline.c"]:
              p = Path(filepath)
              if not p.exists(): continue
              lines = p.read_text().split('\n')
              has_susfs = any('linux/susfs.h' in l for l in lines)
              has_susfs_def = any('linux/susfs_def.h' in l for l in lines)
              if has_susfs and has_susfs_def: continue
              insert_idx = -1
              for i, line in enumerate(lines):
                  if line.strip().startswith('#include'):
                      insert_idx = i; break
              if insert_idx == -1: continue
              new_includes = []
              if not has_susfs: new_includes.append('#include <linux/susfs.h>')
              if not has_susfs_def: new_includes.append('#include <linux/susfs_def.h>')
              lines[insert_idx:insert_idx] = new_includes
              p.write_text('\n'.join(lines))
          PYEOF

          if [ -f fs/proc_namespace.c ] && ! grep -q "extern bool susfs_is_current_ksu_domain" fs/proc_namespace.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/proc_namespace.c")
          lines = p.read_text().split('\n')
          new_lines = []
          inserted = False
          for line in lines:
              new_lines.append(line)
              if not inserted and '#include "internal.h"' in line:
                  new_lines.extend(['', '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT',
                      'extern bool susfs_is_current_ksu_domain(void);',
                      'extern bool susfs_hide_sus_mnts_for_non_su_procs;',
                      '#endif', ''])
                  inserted = True
          p.write_text('\n'.join(new_lines))
          PYEOF
          fi

          if [ -f fs/stat.c ] && ! grep -q "extern void susfs_sus_kstat_spoof_generic_fillattr" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          last_include = -1
          for i, line in enumerate(lines):
              if line.strip().startswith('#include'): last_include = i
          if last_include >= 0:
              lines[last_include+1:last_include+1] = ['', '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT',
                  'extern void susfs_sus_kstat_spoof_generic_fillattr(struct inode *inode, struct kstat *stat);',
                  '#endif', '']
              p.write_text('\n'.join(lines))
          PYEOF
          fi

          if [ -f fs/stat.c ] && grep -q "^EXPORT_SYMBOL(vfs_getattr_nosec);$" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          new_lines = []
          i = 0
          removed = False
          while i < len(lines):
              line = lines[i]
              new_lines.append(line)
              if (not removed and line.strip() == 'EXPORT_SYMBOL(vfs_getattr_nosec);' and i + 3 < len(lines)):
                  if (lines[i+1].strip() == '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT'
                      and 'susfs_sus_kstat_spoof_generic_fillattr' in lines[i+2].strip()
                      and lines[i+3].strip() == '#endif'):
                      i += 4; removed = True; continue
              i += 1
          if removed: p.write_text('\n'.join(new_lines))
          PYEOF
          fi

      # ============================================================
      # STEP 5: Fix SELinux SUSFS (backup → restore → inject clean)
      # ============================================================
      - name: Fix SELinux SUSFS
        env:
          KSU_DIR: ${{ env.KSU_DIR }}
        run: |
          cd kernel-src
          SELINUX_H="${KSU_DIR}/kernel/selinux/selinux.h"
          SELINUX_C="${KSU_DIR}/kernel/selinux/selinux.c"
          RULES_C="${KSU_DIR}/kernel/selinux/rules.c"

          echo "== Fix 1: selinux.h =="
          if [ -f "$SELINUX_H" ] && ! grep -q "susfs_set_init_sid" "$SELINUX_H"; then
            python3 - "$SELINUX_H" << 'PYEOF'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          if not p.exists(): exit(0)
          lines = p.read_text().split('\n')
          idx = len(lines) - 1
          for i, line in enumerate(lines):
              if 'ksu_apply_kernelsu_rules' in line or 'apply_kernelsu_rules' in line:
                  idx = i + 1; break
          decl = ['',
              '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT',
              'bool susfs_is_sid_equal(void *sec, u32 sid2);',
              'u32 susfs_get_sid_from_name(const char *secctx_name);',
              'u32 susfs_get_current_sid(void);',
              'void susfs_set_zygote_sid(void);',
              'bool susfs_is_current_zygote_domain(void);',
              'void susfs_set_ksu_sid(void);',
              'bool susfs_is_current_ksu_domain(void);',
              'void susfs_set_init_sid(void);',
              'bool susfs_is_current_init_domain(void);',
              '#endif', '']
          lines[idx:idx] = decl
          p.write_text('\n'.join(lines))
          print("[OK] selinux.h")
          PYEOF
          fi

          echo ""
          echo "== Fix 2: selinux.c =="
          if [ -f "$SELINUX_C" ] && ! grep -q "susfs_ksu_sid" "$SELINUX_C"; then
            python3 - "$SELINUX_C" << 'PYEOF'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          if not p.exists(): exit(0)
          text = p.read_text()
          marker = '#define KERNEL_SU_DOMAIN'
          devpts = '#define DEVPTS_DOMAIN'
          if marker not in text: exit(0)
          idx = text.find(marker)
          eol = text.find('\n', idx) + 1
          v = "\n".join(["", "#ifdef CONFIG_KSU_SUSFS",
              '#define KERNEL_INIT_DOMAIN "u:r:init:s0"',
              '#define KERNEL_ZYGOTE_DOMAIN "u:r:zygote:s0"',
              "u32 susfs_ksu_sid = 0;", "u32 susfs_init_sid = 0;",
              "u32 susfs_zygote_sid = 0;", "#endif", ""])
          text = text[:eol] + v + text[eol:]
          if devpts in text and 'susfs_set_sid' not in text:
              idx2 = text.find(devpts)
              f = "\n".join(["", "#ifdef CONFIG_KSU_SUSFS",
                  "static inline void susfs_set_sid(const char *n, u32 *o)",
                  "{ int e; if(!n||!o)return;",
                  "  e=security_secctx_to_secid(n,strlen(n),o); if(e)return; }",
                  "bool susfs_is_sid_equal(void *sec, u32 sid2) {",
                  "  struct task_security_struct *t=(struct task_security_struct*)sec;",
                  "  if(!t)return false; return t->sid==sid2; }",
                  "u32 susfs_get_sid_from_name(const char *n) {",
                  "  u32 o=0; int e; if(!n)return 0;",
                  "  e=security_secctx_to_secid(n,strlen(n),&o); if(e)return 0; return o; }",
                  "u32 susfs_get_current_sid(void) { return current_sid(); }",
                  "void susfs_set_zygote_sid(void) { susfs_set_sid(KERNEL_ZYGOTE_DOMAIN,&susfs_zygote_sid); }",
                  "bool susfs_is_current_zygote_domain(void) { return unlikely(current_sid()==susfs_zygote_sid); }",
                  "void susfs_set_ksu_sid(void) { susfs_set_sid(KERNEL_SU_DOMAIN,&susfs_ksu_sid); }",
                  "bool susfs_is_current_ksu_domain(void) { return unlikely(current_sid()==susfs_ksu_sid); }",
                  "void susfs_set_init_sid(void) { susfs_set_sid(KERNEL_INIT_DOMAIN,&susfs_init_sid); }",
                  "bool susfs_is_current_init_domain(void) { return unlikely(current_sid()==susfs_init_sid); }",
                  "#endif", "", ""])
              text = text[:idx2] + f + text[idx2:]
          p.write_text(text)
          print("[OK] selinux.c")
          PYEOF
          fi

          echo ""
          echo "== Fix 3: rules.c =="
          if [ -f "$RULES_C" ] && ! grep -q "susfs_set_init_sid" "$RULES_C"; then
            python3 - "$RULES_C" << 'PYEOF'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          if not p.exists(): exit(0)
          lines = p.read_text().split('\n')
          new_lines = []
          done = False
          for i, line in enumerate(lines):
              if not done and 'rcu_read_unlock()' in line.strip():
                  ctx = '\n'.join(lines[max(0,i-30):i])
                  if 'apply_kernelsu_rules' in ctx:
                      new_lines.extend(['',
                          '#ifdef CONFIG_KSU_SUSFS',
                          '\tksu_allow(db, "zygote", "labeledfs", "filesystem", "unmount");',
                          '\tsusfs_set_init_sid();',
                          '\tsusfs_set_ksu_sid();',
                          '\tsusfs_set_zygote_sid();',
                          '#endif', ''])
                      done = True
                      print("[OK] rules.c")
              new_lines.append(line)
          p.write_text('\n'.join(new_lines))
          PYEOF
          fi

          echo ""
          echo "== Verify =="
          for f in "$SELINUX_H" "$SELINUX_C" "$RULES_C"; do
            echo "  $(basename $f): $(grep -c susfs $f 2>/dev/null || echo 0) refs"
          done

      # ============================================================
      # STEP 6: Extract hook signatures dari KSU-Next source
      # ============================================================
      - name: Extract hook signatures dari KSU-Next
        run: |
          cd kernel-src
          KSU_DIR="${{ env.KSU_DIR }}"

          echo "== Cari ksu_handle_* implementations =="
          grep -rn "^int ksu_handle_\|^void ksu_handle_" "$KSU_DIR/" 2>/dev/null | head -20

          echo ""
          echo "== Generate ksu_hook.h =="
          python3 << 'PYEOF'
          import re, os
          from pathlib import Path
          ksu_dirs = ['KernelSU-Next', 'KernelSU']
          ksu_dir = next((d for d in ksu_dirs if Path(d).exists()), None)
          if not ksu_dir: print("[SKIP]"); exit(0)
          sigs = {}
          for pattern in ['*.c', '*.h']:
              for f in Path(ksu_dir).rglob(pattern):
                  try: text = f.read_text(errors='replace')
                  except: continue
                  for m in re.finditer(r'\b(?:int|void)\s+(ksu_handle_\w+)\s*\(([^)]*)\)\s*[;{]', text, re.MULTILINE):
                      name, params = m.group(1), m.group(2).strip()
                      rettype = 'int' if m.group(0).strip().startswith('int') else 'void'
                      if name == 'ksu_handle_stat':
                          if 'const char __user' in params: sigs[name] = (rettype, params)
                          elif name not in sigs: sigs[name] = (rettype, params)
                      else:
                          if name not in sigs or '{' in text[m.end()-1:m.end()]:
                              sigs[name] = (rettype, params)
          wajib = {'ksu_handle_execveat','ksu_handle_faccessat','ksu_handle_stat',
                   'ksu_handle_sys_read','ksu_handle_setresuid','ksu_handle_sys_reboot',
                   'ksu_handle_input_handle_event'}
          header = ['/* Auto-generated ksu_hook.h */', '#ifndef __KSU_HOOK_H',
              '#define __KSU_HOOK_H', '', '#include <linux/types.h>',
              '#include <linux/uidgid.h>', '', 'struct file;', 'struct filename;', '']
          for name in sorted(wajib):
              if name in sigs:
                  rt, p = sigs[name]
                  header.append(f'extern {rt} {name}({p});')
                  print(f"  + {rt} {name}({p})")
              else: print(f"  ! Missing: {name}")
          header.extend(['', '#endif'])
          Path('include/linux/ksu_hook.h').write_text('\n'.join(header))
          print("\n[OK] ksu_hook.h generated")
          PYEOF

      # ============================================================
      # STEP 7: Inject 7 manual hooks (proven dari ReSukiSU v6)
      # ============================================================
      - name: Inject 7 manual hooks
        run: |
          cd kernel-src

          inject_hook() {
            local file="$1" func_pat="$2" hook_line="$3"
            [ -f "$file" ] || return 1
            awk -v pat="$func_pat" -v hook="$hook_line" '
              $0 ~ pat { in_func=1 }
              in_func && /^\{/ && !done {
                print; print "\t/* KSU hook */"; print "\t" hook
                done=1; in_func=0; next
              }
              { print }
            ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
          }

          add_include() {
            local file="$1"
            [ -f "$file" ] || return
            if ! grep -q "linux/ksu_hook.h" "$file"; then
              sed -i '0,/^#include/s||#include <linux/ksu_hook.h>\n&|' "$file"
            fi
          }

          # 1. execveat
          add_include fs/exec.c
          if ! grep -q "ksu_handle_execveat" fs/exec.c; then
            inject_hook fs/exec.c "static int do_execveat_common" \
              "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
            [ $? -ne 0 ] && inject_hook fs/exec.c "int do_execveat_common" \
              "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
          fi

          # 2. faccessat
          add_include fs/open.c
          if ! grep -q "ksu_handle_faccessat" fs/open.c; then
            inject_hook fs/open.c "SYSCALL_DEFINE3.faccessat" \
              "ksu_handle_faccessat(&dfd, &filename, &mode, NULL);"
          fi

          # 3. stat
          add_include fs/stat.c
          if ! grep -q "ksu_handle_stat" fs/stat.c; then
            inject_hook fs/stat.c "SYSCALL_DEFINE4.newfstatat" \
              "ksu_handle_stat(&dfd, &filename, &flag);"
          fi

          # 4. sys_read
          add_include fs/read_write.c
          if ! grep -q "ksu_handle_sys_read" fs/read_write.c; then
            inject_hook fs/read_write.c "SYSCALL_DEFINE3.read" \
              "ksu_handle_sys_read(fd, &buf, &count);"
          fi

          # 5. setresuid
          add_include kernel/sys.c
          if ! grep -q "ksu_handle_setresuid" kernel/sys.c; then
            inject_hook kernel/sys.c "SYSCALL_DEFINE3.setresuid" \
              "ksu_handle_setresuid(ruid, euid, suid);"
          fi

          # 6. sys_reboot
          add_include kernel/reboot.c
          if [ -f kernel/reboot.c ] && ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            inject_hook kernel/reboot.c "SYSCALL_DEFINE4.reboot" \
              "ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);"
          fi

          # 7. input_handle_event
          add_include drivers/input/input.c
          if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
            inject_hook drivers/input/input.c "void input_handle_event" \
              "ksu_handle_input_handle_event(&type, &code, &value);"
            if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
              inject_hook drivers/input/input.c "static void input_handle_event" \
                "ksu_handle_input_handle_event(&type, &code, &value);"
            fi
          fi

          echo "== Verify 7 hooks =="
          for f in fs/exec.c fs/open.c fs/stat.c fs/read_write.c kernel/sys.c kernel/reboot.c drivers/input/input.c; do
            [ -f "$f" ] || continue
            HOOKS=$(grep -o "ksu_handle_[a-z_]*" "$f" 2>/dev/null | sort -u | tr '\n' ' ')
            echo "  $f -> ${HOOKS:-NONE}"
          done

      # ============================================================
      # STEP 8: Prepare defconfig
      # ============================================================
      - name: Prepare defconfig
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ "${{ github.event.inputs.use_extracted_config }}" = "true" ]; then
            EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/my_defconfig.txt"
            [ -f "$EXTRACTED_CFG" ] && cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
          fi

          sed -i '/^CONFIG_KSU/d;/^# CONFIG_KSU is not set/d' "$DEFCONFIG_PATH"
          sed -i '/SUSFS/d' "$DEFCONFIG_PATH"
          sed -i '/^CONFIG_CC_STACKPROTECTOR_STRONG=y/d' "$DEFCONFIG_PATH"

          {
            echo ""
            echo "CONFIG_KSU=y"
            echo "CONFIG_KPROBES=y"
            echo ""
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
            echo "CONFIG_KSU_SUSFS_SUS_SU=y"
          } >> "$DEFCONFIG_PATH"

          echo "== Config =="
          grep -E "CONFIG_KSU|SUSFS" "$DEFCONFIG_PATH" | sort

      - name: Patch arch/arm64/Makefile
        run: |
          cd kernel-src
          sed -i -E 's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' arch/arm64/Makefile 2>/dev/null || true

      - name: Skip broken DTBs
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          [ -f "$DTS_MK" ] || exit 0
          for dtb in sdm845-v2-qvr-evt.dtb sdm845-v2-qvr-dvt.dtb sdm845-interposer-sdm670-mtp.dtb sdm845-interposer-sdm670-cdp.dtb; do
            sed -i "/$dtb/d" "$DTS_MK" 2>/dev/null || true
          done

      # ============================================================
      # STEP 9: Compile (Clang r353983c + GCC 4.9, NO LLVM=1)
      # ============================================================
      - name: Compile Kernel
        run: |
          cd kernel-src
          OUT_DIR="out"

          CLANG_PATH="$HOME/toolchains/clang/bin"
          GCC_PATH="$HOME/toolchains/gcc-aarch64/bin"
          GCC_ARM32_PATH="$HOME/toolchains/gcc-arm32/bin"
          export PATH="${CLANG_PATH}:${GCC_PATH}:${GCC_ARM32_PATH}:${PATH}"

          MAKE_ARGS=(
            O=$OUT_DIR ARCH=arm64
            CC=clang
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_ARM32=arm-linux-androideabi-
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}

          scripts/config --file $OUT_DIR/.config \
            --disable CONFIG_CC_STACKPROTECTOR_STRONG \
            --disable CONFIG_RANDOMIZE_BASE \
            --disable LTO_CLANG \
            --disable CFI_CLANG

          make "${MAKE_ARGS[@]}" olddefconfig

          echo "== Config final =="
          for cfg in CONFIG_KSU CONFIG_KSU_SUSFS CONFIG_KPROBES; do
            grep "^${cfg}=" $OUT_DIR/.config || echo "WARN: ${cfg} NOT SET"
          done

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" \
            KCFLAGS="-Wno-unknown-warning-option" \
            2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "== Exit: $BUILD_EXIT =="
          BUILD_OK=0
          [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ] && { ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"; BUILD_OK=1; }
          [ -f "$OUT_DIR/arch/arm64/boot/Image" ] && [ "$BUILD_OK" -eq 0 ] && { ls -la "$OUT_DIR/arch/arm64/boot/Image"; BUILD_OK=1; }
          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -eq 1 ] || exit 1

      - name: Capture metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KSU_DIR="${{ env.KSU_DIR }}"
          KSU_COMMIT=$([ -d "$KSU_DIR" ] && cd "$KSU_DIR" && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          SUSFS_VER=$(grep "SUSFS_VERSION" include/linux/susfs.h 2>/dev/null | grep -oE '"[^"]+"' | tr -d '"' || echo "unknown")
          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "$(date -u '+%Y-%m-%d %H:%M UTC')",
            "kernel": {
              "source": "${{ github.event.inputs.kernel_source }}",
              "branch": "${{ github.event.inputs.kernel_branch }}",
              "commit": "$(git rev-parse --short HEAD)",
              "version": "$(cat out/include/config/kernel.release)"
            },
            "ksu_next": { "tag": "${{ github.event.inputs.ksu_tag }}", "commit": "${KSU_COMMIT}" },
            "susfs": { "version": "${SUSFS_VER}" },
            "toolchain": "Clang r353983c + GCC 4.9",
            "manager": "https://t.me/ksunext_ci",
            "hooks": "manual (7 hooks)"
          }
          JSONEOF
          cat ../build-metadata.json | jq .

      - name: Upload metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          if-no-files-found: ignore
