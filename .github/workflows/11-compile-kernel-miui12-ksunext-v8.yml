name: 11. Compile Kernel MIUI 12 v8 - Poco F1 + KSU-Next (AOSP Clang, mirror BaikalOS workflow)

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'miui12-beryllium-ksunext-susfs-v8'
      kernel_source:
        description: 'Kernel Source (MIUI 12 stock)'
        required: true
        default: 'https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: 'dipper-q-oss'
      defconfig:
        description: 'defconfig path'
        required: true
        default: 'beryllium_user_defconfig'
      ksu_tag:
        description: 'KernelSU-Next tag'
        required: false
        default: 'v3.2.0'
      enable_susfs:
        description: 'Apply SUSFS patch? (true/false)'
        required: true
        default: 'true'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.9'
      susfs_patch_url:
        description: 'SUSFS patch URL'
        required: true
        default: 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch'
      clang_url:
        description: 'Clang prebuilt (SAMA dengan BaikalOS workflow yg berhasil)'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

jobs:
  test-build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest    # SAMA seperti BaikalOS workflow
    env:
      KBUILD_BUILD_USER: "Nerf."
      KBUILD_BUILD_HOST: "OldlineSSS"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Input
        run: |
          echo "kernel_source: ${{ github.event.inputs.kernel_source }}"
          echo "kernel_branch: ${{ github.event.inputs.kernel_branch }}"
          echo "defconfig: ${{ github.event.inputs.defconfig }}"
          echo "ksu_tag: ${{ github.event.inputs.ksu_tag }}"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev python3 python-is-python3 patch jq
          echo "== Cek lokasi arm-linux-gnueabi-as =="
          which arm-linux-gnueabi-as || echo "TIDAK DITEMUKAN"

      - name: Setup Clang Cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: Setup Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: Clone MIUI 12 kernel source
        run: |
          git clone --depth=1 \
            "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" \
            kernel-src
          cd kernel-src
          git log -1 --oneline
          find arch/arm64/configs -iname "*beryllium*"

      - name: Setup KernelSU-Next
        run: |
          cd kernel-src
          curl -LSs "https://raw.githubusercontent.com/ThRE-Team/KernelSU-Next/main/kernel/setup.sh" | bash -s "${{ github.event.inputs.ksu_tag }}"

          echo "== Verify =="
          ls -la drivers/kernelsu || echo "TIDAK ADA symlink!"
          grep -n "kernelsu" drivers/Makefile || echo "TIDAK ADA di Makefile!"
          grep -n "kernelsu" drivers/Kconfig || echo "TIDAK ADA di Kconfig!"

      # ============================================================
      # SUSFS integration
      # ============================================================
      - name: Clone SUSFS & apply patch
        if: github.event.inputs.enable_susfs == 'true'
        run: |
          cd kernel-src
          set -e
          git clone --depth=1 -b "${{ github.event.inputs.susfs_branch }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git .susfs4ksu
          curl -LSsf "${{ github.event.inputs.susfs_patch_url }}" -o /tmp/susfs.patch
          set +e
          patch -p1 --fuzz=3 --no-backup-if-mismatch --force < /tmp/susfs.patch 2>&1 | tee /tmp/susfs.log
          set -e
          echo "Succeed: $(grep -c 'succeeded' /tmp/susfs.log)"
          echo "FAILED : $(grep -c 'FAILED' /tmp/susfs.log)"
          find . -name "*.rej" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true
          find . -name "*.orig" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true
          if [ ! -f fs/sus_su.c ] && [ -f .susfs4ksu/kernel_patches/fs/sus_su.c ]; then
            cp .susfs4ksu/kernel_patches/fs/sus_su.c fs/sus_su.c
          fi

      - name: Manual fix SUSFS hunks
        if: github.event.inputs.enable_susfs == 'true'
        run: |
          cd kernel-src
          if [ -f fs/proc_namespace.c ] && ! grep -q "susfs_def.h" fs/proc_namespace.c; then
            sed -i '/#include "proc\/internal.h"/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/proc_namespace.c
          fi
          if [ -f fs/stat.c ] && ! grep -q "int err = inode->i_op->getattr" fs/stat.c; then
            python3 << 'PYEOF'
          import re
          from pathlib import Path
          p = Path("fs/stat.c")
          text = p.read_text()
          pattern = re.compile(
              r'(\tif\s*\(inode->i_op->getattr\)\s*\n)'
              r'(\t\treturn inode->i_op->getattr\(path->mnt,\s*path->dentry,\s*stat\);)',
              re.MULTILINE
          )
          replacement = (r'\1'
              '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n\t{\n'
              '\t\tint err = inode->i_op->getattr(path->mnt, path->dentry, stat);\n'
              '\t\tif (!err)\n'
              '\t\t\tsusfs_sus_kstat_spoof_generic_fillattr(inode, stat);\n'
              '\t\treturn err;\n\t}\n#else\n' r'\2' '\n#endif')
          new_text, n = pattern.subn(replacement, text)
          if n > 0: p.write_text(new_text)
          PYEOF
          fi
          python3 << 'PYEOF'
          from pathlib import Path
          for filepath in ["fs/open.c", "fs/stat.c", "fs/proc_namespace.c", "fs/proc/task_mmu.c", "fs/proc/cmdline.c"]:
              p = Path(filepath)
              if not p.exists(): continue
              lines = p.read_text().split('\n')
              has_susfs = any('linux/susfs.h' in l for l in lines)
              has_susfs_def = any('linux/susfs_def.h' in l for l in lines)
              if has_susfs and has_susfs_def: continue
              insert_idx = -1
              for i, line in enumerate(lines):
                  if line.strip().startswith('#include'):
                      insert_idx = i; break
              if insert_idx == -1: continue
              new_includes = []
              if not has_susfs: new_includes.append('#include <linux/susfs.h>')
              if not has_susfs_def: new_includes.append('#include <linux/susfs_def.h>')
              lines[insert_idx:insert_idx] = new_includes
              p.write_text('\n'.join(lines))
          PYEOF
          if [ -f fs/proc_namespace.c ] && ! grep -q "extern bool susfs_is_current_ksu_domain" fs/proc_namespace.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/proc_namespace.c")
          lines = p.read_text().split('\n')
          new_lines = []
          inserted = False
          for line in lines:
              new_lines.append(line)
              if not inserted and '#include "internal.h"' in line:
                  new_lines.extend(['', '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT',
                      'extern bool susfs_is_current_ksu_domain(void);',
                      'extern bool susfs_hide_sus_mnts_for_non_su_procs;',
                      '#endif', ''])
                  inserted = True
          p.write_text('\n'.join(new_lines))
          PYEOF
          fi
          if [ -f fs/stat.c ] && ! grep -q "extern void susfs_sus_kstat_spoof_generic_fillattr" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          last_include = -1
          for i, line in enumerate(lines):
              if line.strip().startswith('#include'): last_include = i
          if last_include >= 0:
              lines[last_include+1:last_include+1] = ['', '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT',
                  'extern void susfs_sus_kstat_spoof_generic_fillattr(struct inode *inode, struct kstat *stat);',
                  '#endif', '']
              p.write_text('\n'.join(lines))
          PYEOF
          fi
          if [ -f fs/stat.c ] && grep -q "^EXPORT_SYMBOL(vfs_getattr_nosec);$" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          new_lines = []
          i = 0
          removed = False
          while i < len(lines):
              line = lines[i]
              new_lines.append(line)
              if (not removed and line.strip() == 'EXPORT_SYMBOL(vfs_getattr_nosec);' and i + 3 < len(lines)):
                  if (lines[i+1].strip() == '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT'
                      and 'susfs_sus_kstat_spoof_generic_fillattr' in lines[i+2].strip()
                      and lines[i+3].strip() == '#endif'):
                      i += 4; removed = True; continue
              i += 1
          if removed: p.write_text('\n'.join(new_lines))
          PYEOF
          fi

      # ============================================================
      # MIUI-specific fixes: bypass compiler check + fcommon
      # ============================================================
      - name: Fix MIUI kernel compat issues
        run: |
          cd kernel-src

          echo "== Fix -fcommon HOSTCFLAGS untuk dtc =="
          DTC_MAKEFILE="scripts/dtc/Makefile"
          if [ -f "$DTC_MAKEFILE" ] && ! grep -q "fcommon" "$DTC_MAKEFILE"; then
            sed -i '1i HOSTCFLAGS_dtc.o += -fcommon\nHOSTCFLAGS_dtc-lexer.lex.o += -fcommon\nHOSTCFLAGS_dtc-parser.tab.o += -fcommon\n' "$DTC_MAKEFILE"
            echo "[OK] Added -fcommon"
          fi

          echo ""
          echo "== Bypass compiler check (no double) =="
          MAKEFILE="Makefile"
          if ! grep -q "^prepare-compiler-check-skip:" "$MAKEFILE"; then
            if grep -q "prepare-compiler-check" "$MAKEFILE"; then
              sed -i 's|prepare-compiler-check|prepare-compiler-check-skip|g' "$MAKEFILE"
              echo "" >> "$MAKEFILE"
              echo "prepare-compiler-check-skip:" >> "$MAKEFILE"
              printf "\t@echo 'Skipping compiler check'\n" >> "$MAKEFILE"
              echo "[OK] Bypassed"
            fi
          fi

      - name: Prepare defconfig (KSU-Next + SUSFS + MIUI namespace fix)
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "ERROR: $DEFCONFIG_PATH tidak ditemukan"
            find arch/arm64/configs -iname "*beryllium*"
            exit 1
          fi

          # Bersihkan entry lama + disable stack protector strong
          sed -i '/^CONFIG_KSU/d;/^# CONFIG_KSU is not set/d;/SUSFS/d' "$DEFCONFIG_PATH"
          sed -i '/^CONFIG_CC_STACKPROTECTOR_STRONG=y/d' "$DEFCONFIG_PATH"

          # Enable UTS_NS + PID_NS (MIUI disable, KSU butuh)
          sed -i 's|^# CONFIG_UTS_NS is not set|CONFIG_UTS_NS=y|' "$DEFCONFIG_PATH"
          sed -i 's|^# CONFIG_PID_NS is not set|CONFIG_PID_NS=y|' "$DEFCONFIG_PATH"

          # Sesuai dokumentasi KSU-Next non-GKI
          {
            echo ""
            echo "# CONFIG_CC_STACKPROTECTOR_STRONG is not set"
            echo "CONFIG_CC_STACKPROTECTOR_REGULAR=y"
            echo ""
            echo "CONFIG_KSU=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo "CONFIG_KSU_KPROBE_HOOKS=y"
            echo ""
            echo "CONFIG_UTS_NS=y"
            echo "CONFIG_PID_NS=y"
          } >> "$DEFCONFIG_PATH"

          if [ "${{ github.event.inputs.enable_susfs }}" = "true" ]; then
            {
              echo ""
              echo "CONFIG_KSU_SUSFS=y"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
              echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
            } >> "$DEFCONFIG_PATH"
          fi

          {
            echo ""
            echo "CONFIG_TMPFS_XATTR=y"
            echo 'CONFIG_LOCALVERSION="-Nerf"'
          } >> "$DEFCONFIG_PATH"

          echo "== KSU/SUSFS/Namespace configs =="
          grep -E "CONFIG_KSU|SUSFS|UTS_NS|PID_NS|STACKPROTECTOR|LOCALVERSION" "$DEFCONFIG_PATH" | sort

      - name: Patch arch/arm64/Makefile (fix clang vdso32 "-EL" assembler error)
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"

          if [ ! -f "$MAIN_MK" ]; then
            echo "ERROR: $MAIN_MK tidak ditemukan!"
            exit 1
          fi

          echo "== Cari blok CLANG_PREFIX32 =="
          grep -n "CLANG_PREFIX32\|GCC_TOOLCHAIN32\|CLANG_TARGET_ARM32\|CLANG_GCC32_TC" "$MAIN_MK" || echo "TIDAK DITEMUKAN!"

          cp "$MAIN_MK" "$MAIN_MK.orig"

          sed -i -E \
            's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' \
            "$MAIN_MK"

          if ! diff -q "$MAIN_MK" "$MAIN_MK.orig" > /dev/null; then
            echo "[OK] Patch CLANG_PREFIX32 berhasil"
            grep -n "CLANG_PREFIX32" "$MAIN_MK"
          else
            echo "[PERINGATAN] Pattern tidak match"
            grep -n -B5 -A10 "CLANG_TARGET_ARM32\|CLANG_PREFIX32" "$MAIN_MK" || true
          fi

          rm -f "$MAIN_MK.orig"

      - name: Skip DTB yang tidak relevan/rusak
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"

          if [ ! -f "$DTS_MK" ]; then
            echo "PERINGATAN: $DTS_MK tidak ditemukan"
            exit 0
          fi

          BROKEN_DTBS=(
            "sdm845-v2-qvr-evt.dtb"
            "sdm845-v2-qvr-dvt.dtb"
            "sdm845-interposer-sdm670-mtp.dtb"
            "sdm845-interposer-sdm670-cdp.dtb"
          )

          for dtb in "${BROKEN_DTBS[@]}"; do
            if grep -q "$dtb" "$DTS_MK"; then
              sed -i "/$dtb/d" "$DTS_MK"
              echo "[OK] Dihapus: $dtb"
            fi
          done

      # ============================================================
      # COMPILE - PERSIS seperti BaikalOS workflow yg sukses
      # ============================================================
      - name: Compile Kernel
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          echo "== Clang version =="
          clang --version

          MAKE_ARGS=(
            O=$OUT_DIR
            ARCH=arm64
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          echo "== Cek config KSU =="
          for cfg in CONFIG_KSU CONFIG_KPROBES CONFIG_KPROBE_EVENTS CONFIG_KSU_KPROBE_HOOKS CONFIG_UTS_NS CONFIG_PID_NS; do
            grep "^${cfg}=" $OUT_DIR/.config || echo "PERINGATAN: ${cfg} tidak aktif!"
          done

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "== Exit code: $BUILD_EXIT =="

          IMAGE_OK=0
          IMAGE_GZ_DTB_OK=0
          if [ -f "$OUT_DIR/arch/arm64/boot/Image" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image"
            IMAGE_OK=1
          fi
          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"
            IMAGE_GZ_DTB_OK=1
          fi

          BUILD_OK=0
          if [ "$IMAGE_GZ_DTB_OK" -eq 1 ]; then
            echo "[OK] Image.gz-dtb sukses"
            BUILD_OK=1
          elif [ "$IMAGE_OK" -eq 1 ]; then
            echo "[SEBAGIAN OK] Image ada, Image.gz-dtb belum"
            BUILD_OK=1
          fi

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -eq 1 ] || exit 1

      - name: Capture Build Metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          KERNEL_COMMIT_FULL=$(git rev-parse HEAD)
          KSU_COMMIT=$(cd KernelSU-Next 2>/dev/null && git rev-parse --short HEAD || echo "unknown")
          SUSFS_COMMIT=$(cd .susfs4ksu 2>/dev/null && git rev-parse --short HEAD || echo "unknown")
          KERNEL_VERSION_STRING=$(cat out/include/config/kernel.release 2>/dev/null || echo unknown)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "${BUILD_DATE}",
            "target_rom": "MIUI 12 Stock",
            "kernel_source": "${{ github.event.inputs.kernel_source }}",
            "kernel_branch": "${{ github.event.inputs.kernel_branch }}",
            "kernel_commit": "${KERNEL_COMMIT}",
            "kernel_commit_full": "${KERNEL_COMMIT_FULL}",
            "ksu_tag": "${{ github.event.inputs.ksu_tag }}",
            "ksu_commit": "${KSU_COMMIT}",
            "susfs_enabled": "${{ github.event.inputs.enable_susfs }}",
            "susfs_commit": "${SUSFS_COMMIT}",
            "kernel_version_string": "${KERNEL_VERSION_STRING}",
            "defconfig": "${{ github.event.inputs.defconfig }}",
            "clang_url": "${{ github.event.inputs.clang_url }}",
            "zip_name": "${{ github.event.inputs.zip_name }}"
          }
          JSONEOF

          echo "== Metadata =="
          cat ../build-metadata.json | jq .

      - name: Upload Build Metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json
          if-no-files-found: warn

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          if-no-files-found: warn

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore

      - name: Upload Image Only
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          if-no-files-found: ignore
