name: 3. Compile Kernel - BOS Beryllium + ReSukiSU + SUSFS + Log

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'bos-beryllium-resukisu-susfs'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/baikalos/android_kernel_xiaomi_sdm845.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '13.0'
      defconfig:
        description: 'defconfig path (di kernel source)'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      use_extracted_config:
        description: 'Pakai config hasil extract boot.img asli sebagai basis? (true/false)'
        required: true
        default: 'true'
      resukisu_repo:
        description: 'ReSukiSU repo URL'
        required: true
        default: 'https://github.com/ReSukiSU/ReSukiSU'
      resukisu_branch:
        description: 'ReSukiSU branch/tag'
        required: true
        default: 'main'
      susfs_repo:
        description: 'SUSFS repo URL'
        required: true
        default: 'https://gitlab.com/simonpunk/susfs4ksu.git'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.9'
      susfs_patch_url:
        description: 'SUSFS patch URL'
        required: true
        default: 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

jobs:
  test-build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Input
        run: |
          echo "kernel_source       : ${{ github.event.inputs.kernel_source }}"
          echo "kernel_branch       : ${{ github.event.inputs.kernel_branch }}"
          echo "defconfig           : ${{ github.event.inputs.defconfig }}"
          echo "use_extracted_config: ${{ github.event.inputs.use_extracted_config }}"
          echo "resukisu_branch     : ${{ github.event.inputs.resukisu_branch }}"
          echo "susfs_branch        : ${{ github.event.inputs.susfs_branch }}"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget python3 python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev patch

      - name: Setup Clang Cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: Setup Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source (BaikalOS)
        run: |
          git clone --depth=1 \
            "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" \
            kernel-src

      - name: Setup ReSukiSU
        run: |
          cd kernel-src
          RAW_BASE="$(echo "${{ github.event.inputs.resukisu_repo }}" | sed 's|github.com|raw.githubusercontent.com|')"
          SETUP_OK=0

          echo "[Cara 1] curl setup.sh"
          if curl -LSsf "${RAW_BASE}/${{ github.event.inputs.resukisu_branch }}/kernel/setup.sh" | bash -s "${{ github.event.inputs.resukisu_branch }}"; then
            SETUP_OK=1
          fi

          if [ "$SETUP_OK" -ne 1 ]; then
            echo "[Cara 2] Clone lokal"
            git clone --depth=1 -b "${{ github.event.inputs.resukisu_branch }}" \
              "${{ github.event.inputs.resukisu_repo }}" .resukisu-src
            if [ -f .resukisu-src/kernel/setup.sh ]; then
              bash .resukisu-src/kernel/setup.sh "${{ github.event.inputs.resukisu_branch }}" && SETUP_OK=1 || true
            fi
          fi

          if [ "$SETUP_OK" -ne 1 ]; then
            echo "[Cara 3] Fallback manual"
            [ -d .resukisu-src ] || git clone --depth=1 -b "${{ github.event.inputs.resukisu_branch }}" \
              "${{ github.event.inputs.resukisu_repo }}" .resukisu-src
            mkdir -p KernelSU/kernel
            cp -a .resukisu-src/kernel/. KernelSU/kernel/ 2>/dev/null || true
            ln -sf "$(pwd)/KernelSU/kernel" drivers/kernelsu
            grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            grep -q "kernelsu" drivers/Kconfig || sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
            SETUP_OK=1
          fi

          [ "$SETUP_OK" -eq 1 ] || { echo "GAGAL setup ReSukiSU"; exit 1; }

          echo "== Verifikasi =="
          ls -la drivers/kernelsu || true
          grep -n "kernelsu" drivers/Makefile || true
          grep -n "kernelsu" drivers/Kconfig || true

          KSU_ROOT_DIR=""
          for d in KernelSU KernelSU-Next ReSukiSU; do
            [ -d "$d" ] && { KSU_ROOT_DIR="$d"; break; }
          done
          echo "KSU_ROOT_DIR=$KSU_ROOT_DIR" >> "$GITHUB_ENV"

      # ==========================================================
      # SUSFS: strategi simplify
      # ==========================================================
      # 1. Clone SUSFS repo
      # 2. Apply patch dengan --fuzz=3 --force (hunk yg bisa apply akan apply)
      # 3. Hapus .rej files (kita tidak butuh, hunks yg gagal akan di-handle
      #    lewat compile error → fix pakai sed simple)
      # 4. Copy sus_su.c (tidak dicover patch)
      # 5. JANGAN copy susfs.c / susfs.h duluan — biarkan patch yg create
      # ==========================================================
      - name: Integrate SUSFS
        run: |
          cd kernel-src
          set -e

          echo "== [1/3] Clone SUSFS repo =="
          git clone --depth=1 -b "${{ github.event.inputs.susfs_branch }}" \
            "${{ github.event.inputs.susfs_repo }}" .susfs4ksu

          echo "== [2/3] Download & apply SUSFS patch =="
          curl -LSsf "${{ github.event.inputs.susfs_patch_url }}" -o /tmp/susfs.patch
          echo "Patch size: $(wc -c < /tmp/susfs.patch) bytes"

          set +e
          patch -p1 --fuzz=3 --no-backup-if-mismatch --force < /tmp/susfs.patch 2>&1 | tee /tmp/susfs.log
          set -e

          echo ""
          echo "-- Hunks succeeded --"
          grep -c "succeeded" /tmp/susfs.log || echo "0"
          echo "-- Hunks FAILED --"
          grep -c "FAILED" /tmp/susfs.log || echo "0"
          echo ""
          echo "-- FAILED details --"
          grep "FAILED\|hunks ignored\|hunks FAILED" /tmp/susfs.log || echo "(none)"

          # Cleanup: hapus .rej dan .orig
          find . -name "*.rej" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true
          find . -name "*.orig" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true

          echo ""
          echo "== [3/3] Copy sus_su.c (tidak dicover patch) =="
          if [ ! -f fs/sus_su.c ] && [ -f .susfs4ksu/kernel_patches/fs/sus_su.c ]; then
            cp -v .susfs4ksu/kernel_patches/fs/sus_su.c fs/sus_su.c
          fi

          # Kalau susfs.c / susfs.h TIDAK ada (karena patch gagal create),
          # copy manual sebagai fallback
          if [ ! -f fs/susfs.c ] && [ -f .susfs4ksu/kernel_patches/fs/susfs.c ]; then
            cp -v .susfs4ksu/kernel_patches/fs/susfs.c fs/susfs.c
          fi
          if [ ! -f include/linux/susfs.h ] && [ -f .susfs4ksu/kernel_patches/include/linux/susfs.h ]; then
            cp -v .susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/susfs.h
          fi
          if [ ! -f include/linux/susfs_def.h ] && [ -f .susfs4ksu/kernel_patches/include/linux/susfs_def.h ]; then
            cp -v .susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/susfs_def.h
          fi

          echo ""
          echo "== SUSFS files final =="
          ls -la fs/susfs.c fs/sus_su.c include/linux/susfs.h include/linux/susfs_def.h 2>/dev/null || true

      # ==========================================================
      # Manual sed fixes untuk hunks yang gagal apply
      # ==========================================================
      # Berdasarkan dry-run log sebelumnya, ini file yang butuh manual fix:
      # - fs/proc_namespace.c: butuh #include <linux/susfs.h>
      # - fs/stat.c: butuh #include <linux/susfs.h>
      # - fs/proc/cmdline.c: butuh #include (kalau ada logic tambahan biarkan gagal)
      # - fs/Makefile: butuh entry obj-y untuk susfs.o dan sus_su.o
      # ==========================================================
      - name: Fix SUSFS missing includes (simple sed patches)
        run: |
          cd kernel-src

          # Fix 1: fs/Makefile - tambah obj-y untuk susfs.o dan sus_su.o
          if [ -f fs/Makefile ]; then
            if ! grep -q "susfs.o" fs/Makefile; then
              # Sisipkan setelah baris pertama yang punya "obj-y +="
              sed -i '0,/^obj-y[[:space:]]*+=/{s|^obj-y[[:space:]]*+=.*|&\nobj-y += susfs.o sus_su.o|}' fs/Makefile
              echo "[OK] Added susfs.o sus_su.o to fs/Makefile"
            else
              echo "[SKIP] fs/Makefile already has susfs.o"
            fi
          fi

          # Fix 2: fs/proc_namespace.c - tambah include
          if [ -f fs/proc_namespace.c ]; then
            if ! grep -q "linux/susfs" fs/proc_namespace.c; then
              sed -i '/^#include <linux\/fs\.h>/a #include <linux/susfs.h>\n#include <linux/susfs_def.h>' fs/proc_namespace.c
              echo "[OK] Added susfs includes to fs/proc_namespace.c"
            fi
          fi

          # Fix 3: fs/stat.c - tambah include
          if [ -f fs/stat.c ]; then
            if ! grep -q "linux/susfs" fs/stat.c; then
              sed -i '/^#include <linux\/fs\.h>/a #include <linux/susfs.h>\n#include <linux/susfs_def.h>' fs/stat.c
              echo "[OK] Added susfs includes to fs/stat.c"
            fi
          fi

          # Fix 4: fs/proc/cmdline.c - tambah include
          if [ -f fs/proc/cmdline.c ]; then
            if ! grep -q "linux/susfs" fs/proc/cmdline.c; then
              sed -i '/^#include <linux\/fs\.h>/a #include <linux/susfs.h>' fs/proc/cmdline.c
              echo "[OK] Added susfs include to fs/proc/cmdline.c"
            fi
          fi

          # Fix 5: fs/proc/task_mmu.c - tambah include
          if [ -f fs/proc/task_mmu.c ]; then
            if ! grep -q "linux/susfs" fs/proc/task_mmu.c; then
              sed -i '/^#include <linux\/fs\.h>/a #include <linux/susfs.h>\n#include <linux/susfs_def.h>' fs/proc/task_mmu.c
              echo "[OK] Added susfs includes to fs/proc/task_mmu.c"
            fi
          fi

          echo ""
          echo "== Verifikasi include susfs =="
          for f in fs/proc_namespace.c fs/stat.c fs/proc/cmdline.c fs/proc/task_mmu.c fs/Makefile; do
            if [ -f "$f" ]; then
              echo "-- $f --"
              grep -n "susfs" "$f" | head -5 || echo "  (no susfs reference)"
            fi
          done

      - name: Detect KSU hook header
        run: |
          cd kernel-src
          set -e

          if [ -f include/linux/ksu_hook.h ]; then
            echo "KSU_HEADER=linux/ksu_hook.h" >> "$GITHUB_ENV"
            echo "[OK] Found: include/linux/ksu_hook.h"
            exit 0
          fi

          FOUND=$(find KernelSU KernelSU-Next drivers/kernelsu .resukisu-src 2>/dev/null -type f -name 'ksu_hook.h' | head -n 1 || true)
          if [ -n "$FOUND" ]; then
            cp -f "$FOUND" include/linux/ksu_hook.h
            echo "KSU_HEADER=linux/ksu_hook.h" >> "$GITHUB_ENV"
            echo "[OK] Copied: $FOUND"
            exit 0
          fi

          ALT=$(find KernelSU KernelSU-Next drivers/kernelsu .resukisu-src 2>/dev/null -type f -name '*.h' -exec grep -l 'ksu_handle_execveat' {} \; | head -n 1 || true)
          if [ -n "$ALT" ]; then
            BNAME=$(basename "$ALT")
            cp -f "$ALT" "include/linux/$BNAME"
            echo "KSU_HEADER=linux/$BNAME" >> "$GITHUB_ENV"
            echo "[OK] Alternative: $ALT"
            exit 0
          fi

          echo "[FATAL] Header ksu_hook.h tidak ditemukan"
          exit 1

      # ==========================================================
      # Manual hooks pakai sed (bukan Python heredoc)
      # 6 hooks wajib untuk non-GKI 4.9 + ReSukiSU v4.1+
      # ==========================================================
      - name: Apply ReSukiSU manual hooks
        run: |
          cd kernel-src
          KSU_HEADER="${{ env.KSU_HEADER }}"
          echo "Using header: $KSU_HEADER"

          # Helper function untuk tambah include
          add_include() {
            local file="$1"
            if [ -f "$file" ]; then
              if ! grep -q "linux/version.h" "$file"; then
                sed -i '0,/^#include/{s|^#include|#include <linux/version.h>\n&|}' "$file"
              fi
              if ! grep -q "$KSU_HEADER" "$file"; then
                sed -i "0,/^#include/{s|^#include|#include <$KSU_HEADER>\n&|}" "$file"
              fi
            fi
          }

          # Hook 1: fs/exec.c
          add_include fs/exec.c
          if [ -f fs/exec.c ] && ! grep -q "ksu_handle_execveat" fs/exec.c; then
            # Cari do_execveat_common dan inject setelah opening brace
            sed -i '/^static int do_execveat_common/,/^{/{ /^{/a\
	/* ReSukiSU hook */\
	ksu_handle_execveat(\&fd, \&filename, \&argv, \&envp, \&flags);
            }' fs/exec.c
            echo "[OK] Hooked fs/exec.c"
          fi

          # Hook 2: fs/open.c
          add_include fs/open.c
          if [ -f fs/open.c ] && ! grep -q "ksu_handle_faccessat" fs/open.c; then
            sed -i '/^long do_faccessat/,/^{/{ /^{/a\
	/* ReSukiSU hook */\
	ksu_handle_faccessat(\&dfd, \&filename, \&mode, NULL);
            }' fs/open.c
            echo "[OK] Hooked fs/open.c"
          fi

          # Hook 3: fs/read_write.c
          add_include fs/read_write.c
          if [ -f fs/read_write.c ] && ! grep -q "ksu_handle_vfs_read" fs/read_write.c; then
            sed -i '/^ssize_t vfs_read/,/^{/{ /^{/a\
	/* ReSukiSU hook */\
	ksu_handle_vfs_read(\&file, \&buf, \&count, \&pos);
            }' fs/read_write.c
            echo "[OK] Hooked fs/read_write.c"
          fi

          # Hook 4: fs/stat.c (PENTING: pakai &flag bukan &flags)
          add_include fs/stat.c
          if [ -f fs/stat.c ] && ! grep -q "ksu_handle_stat" fs/stat.c; then
            sed -i '/^int vfs_fstatat/,/^{/{ /^{/a\
	/* ReSukiSU hook */\
	ksu_handle_stat(\&dfd, \&filename, \&flag);
            }' fs/stat.c
            echo "[OK] Hooked fs/stat.c"
          fi

          # Hook 5: drivers/input/input.c
          add_include drivers/input/input.c
          if [ -f drivers/input/input.c ] && ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
            sed -i '/^void input_handle_event/,/^{/{ /^{/a\
	/* ReSukiSU hook */\
	ksu_handle_input_handle_event(\&type, \&code, \&value);
            }' drivers/input/input.c
            # Fallback kalau function-nya static
            if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
              sed -i '/^static void input_handle_event/,/^{/{ /^{/a\
	/* ReSukiSU hook */\
	ksu_handle_input_handle_event(\&type, \&code, \&value);
              }' drivers/input/input.c
            fi
            echo "[OK] Hooked drivers/input/input.c"
          fi

          # Hook 6: kernel/sys.c (setresuid) - WAJIB ReSukiSU v4.1+
          add_include kernel/sys.c
          if [ -f kernel/sys.c ] && ! grep -q "ksu_handle_setresuid" kernel/sys.c; then
            # Cari SYSCALL_DEFINE3(setresuid,...) dan inject setelah brace
            sed -i '/^SYSCALL_DEFINE3(setresuid/,/^{/{ /^{/a\
	/* ReSukiSU hook */\
	ksu_handle_setresuid(\&ruid, \&euid, \&suid);
            }' kernel/sys.c
            echo "[OK] Hooked kernel/sys.c"
          fi

          echo ""
          echo "== Verifikasi hooks =="
          for f in fs/exec.c fs/open.c fs/read_write.c fs/stat.c drivers/input/input.c kernel/sys.c; do
            if [ -f "$f" ]; then
              HOOKS=$(grep -o "ksu_handle_[a-z_]*" "$f" 2>/dev/null | sort -u | tr '\n' ' ')
              echo "  $f -> ${HOOKS:-NONE}"
            fi
          done

      - name: Prepare defconfig
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "ERROR: $DEFCONFIG_PATH tidak ditemukan"
            find arch/arm64/configs -iname "*845*" -o -iname "*beryllium*" -o -iname "*xiaomi*" 2>/dev/null
            exit 1
          fi

          if [ "${{ github.event.inputs.use_extracted_config }}" = "true" ]; then
            EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/my_defconfig.txt"
            if [ -f "$EXTRACTED_CFG" ]; then
              echo "[INFO] Pakai extracted config"
              cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
            fi
          fi

          sed -i '/^CONFIG_KSU/d;/^# CONFIG_KSU is not set/d' "$DEFCONFIG_PATH"
          sed -i '/SUSFS/d' "$DEFCONFIG_PATH"
          sed -i '/^CONFIG_KSU_KPROBE_HOOKS/d' "$DEFCONFIG_PATH"

          cat >> "$DEFCONFIG_PATH" << 'EOFCFG'

          # === ReSukiSU ===
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y

          # === SUSFS ===
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=y

          # === Filesystem ===
          CONFIG_OVERLAY_FS=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOFCFG

          # Bersihkan indentasi dari heredoc
          sed -i 's/^          //' "$DEFCONFIG_PATH"

          echo "== KSU/SUSFS entries =="
          grep -E "CONFIG_KSU|CONFIG_KPROBES|SUSFS|OVERLAY" "$DEFCONFIG_PATH" | sort

      - name: Patch arch/arm64/Makefile (fix clang vdso32)
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"
          [ -f "$MAIN_MK" ] || exit 1

          sed -i -E 's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' "$MAIN_MK"
          grep -n "CLANG_PREFIX32" "$MAIN_MK" || true

      - name: Skip broken DTB
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          [ -f "$DTS_MK" ] || exit 0

          for dtb in sdm845-v2-qvr-evt.dtb sdm845-v2-qvr-dvt.dtb sdm845-interposer-sdm670-mtp.dtb sdm845-interposer-sdm670-cdp.dtb; do
            sed -i "/$dtb/d" "$DTS_MK"
          done

      - name: Compile Kernel
        env:
          KBUILD_BUILD_USER: "tester"
          KBUILD_BUILD_HOST: "ghactions"
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR
            ARCH=arm64
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          echo "== Config check =="
          for cfg in CONFIG_KSU CONFIG_KSU_SUSFS CONFIG_OVERLAY_FS; do
            grep "^${cfg}=" $OUT_DIR/.config || echo "${cfg}=NOT SET"
          done

          if ! grep -q '^CONFIG_KSU=y' $OUT_DIR/.config; then
            echo "FATAL: CONFIG_KSU=y tidak aktif"
            exit 1
          fi

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "== Exit: $BUILD_EXIT =="
          BUILD_OK=0

          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"
            BUILD_OK=1
          elif [ -f "$OUT_DIR/arch/arm64/boot/Image" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image"
            BUILD_OK=1
          else
            echo "[GAGAL] Tidak ada Image maupun Image.gz-dtb"
          fi

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -eq 1 ] || exit 1

      - name: Capture Build Metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          KSU_DIR="${{ env.KSU_ROOT_DIR }}"
          KSU_COMMIT="unknown"
          [ -n "$KSU_DIR" ] && [ -d "$KSU_DIR" ] && KSU_COMMIT=$(cd "$KSU_DIR" && git rev-parse --short HEAD 2>/dev/null || echo "embedded")
          SUSFS_COMMIT="unknown"
          [ -d ".susfs4ksu" ] && SUSFS_COMMIT=$(cd .susfs4ksu && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          KERNEL_VERSION_STRING=$(cat out/include/config/kernel.release 2>/dev/null || echo unknown)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "${BUILD_DATE}",
            "kernel_branch": "${{ github.event.inputs.kernel_branch }}",
            "kernel_commit": "${KERNEL_COMMIT}",
            "root_solution": "ReSukiSU + SUSFS",
            "resukisu_branch": "${{ github.event.inputs.resukisu_branch }}",
            "resukisu_commit": "${KSU_COMMIT}",
            "susfs_branch": "${{ github.event.inputs.susfs_branch }}",
            "susfs_commit": "${SUSFS_COMMIT}",
            "kernel_version": "${KERNEL_VERSION_STRING}",
            "defconfig": "${{ github.event.inputs.defconfig }}",
            "zip_name": "${{ github.event.inputs.zip_name }}"
          }
          JSONEOF
          cat ../build-metadata.json

      - name: Upload Build Metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json
          if-no-files-found: warn

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          if-no-files-found: warn

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore

      - name: Upload Image Only
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          if-no-files-found: ignore
