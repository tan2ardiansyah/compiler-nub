name: 3. Compile Kernel - BOS Beryllium + ReSukiSU + SUSFS + Log

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'bos-beryllium-resukisu-susfs'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/baikalos/android_kernel_xiaomi_sdm845.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '13.0'
      defconfig:
        description: 'defconfig path'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      use_extracted_config:
        description: 'Pakai extracted config?'
        required: true
        default: 'true'
      resukisu_repo:
        description: 'ReSukiSU repo URL'
        required: true
        default: 'https://github.com/ReSukiSU/ReSukiSU'
      resukisu_branch:
        description: 'ReSukiSU branch/tag/commit'
        required: true
        default: 'main'
      susfs_repo:
        description: 'SUSFS repo URL'
        required: true
        default: 'https://gitlab.com/simonpunk/susfs4ksu.git'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.9'
      susfs_patch_url:
        description: 'SUSFS patch URL'
        required: true
        default: 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

env:
  KBUILD_BUILD_USER: "tan2ardiansyah"
  KBUILD_BUILD_HOST: "ghactions"
  ARCH: arm64

jobs:
  build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      # ==================================================================
      # STEP 1: Setup Environment
      # ==================================================================
      - name: 1. Checkout repo
        uses: actions/checkout@v4

      - name: 2. Show build inputs
        run: |
          echo "========================================"
          echo "  BUILD CONFIGURATION"
          echo "========================================"
          echo "Zip name       : ${{ github.event.inputs.zip_name }}"
          echo "Kernel source  : ${{ github.event.inputs.kernel_source }}"
          echo "Kernel branch  : ${{ github.event.inputs.kernel_branch }}"
          echo "Defconfig      : ${{ github.event.inputs.defconfig }}"
          echo "Extracted cfg  : ${{ github.event.inputs.use_extracted_config }}"
          echo "ReSukiSU       : ${{ github.event.inputs.resukisu_branch }}"
          echo "SUSFS branch   : ${{ github.event.inputs.susfs_branch }}"
          echo "========================================"

      - name: 3. Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget python3 python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev patch jq

      - name: 4. Setup Clang cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: 5. Download Clang (jika cache miss)
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz
          echo "[OK] Clang extracted"

      - name: 6. Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      # ==================================================================
      # STEP 2: Clone Sources
      # ==================================================================
      - name: 7. Clone BaikalOS kernel source
        run: |
          git clone --depth=1 \
            "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" \
            kernel-src
          cd kernel-src
          KVER=$(make kernelversion 2>/dev/null || echo "unknown")
          echo "[OK] Kernel version: $KVER"

      # ==================================================================
      # STEP 3: Integrate ReSukiSU
      # ==================================================================
      - name: 8. Setup ReSukiSU
        run: |
          cd kernel-src
          RAW_BASE="$(echo "${{ github.event.inputs.resukisu_repo }}" | sed 's|github.com|raw.githubusercontent.com|')"
          SETUP_OK=0

          echo "[1/2] Trying curl setup.sh..."
          if curl -LSsf "${RAW_BASE}/${{ github.event.inputs.resukisu_branch }}/kernel/setup.sh" \
              | bash -s "${{ github.event.inputs.resukisu_branch }}"; then
            SETUP_OK=1
            echo "[OK] setup.sh via curl berhasil"
          fi

          if [ "$SETUP_OK" -ne 1 ]; then
            echo "[2/2] Fallback: clone repo lokal..."
            git clone --depth=1 -b "${{ github.event.inputs.resukisu_branch }}" \
              "${{ github.event.inputs.resukisu_repo }}" .resukisu-src
            [ -f .resukisu-src/kernel/setup.sh ] && \
              bash .resukisu-src/kernel/setup.sh "${{ github.event.inputs.resukisu_branch }}" && SETUP_OK=1
          fi

          [ "$SETUP_OK" -eq 1 ] || { echo "GAGAL setup ReSukiSU"; exit 1; }

          echo ""
          echo "== Verifikasi struktur =="
          ls -la drivers/kernelsu 2>/dev/null | head -5

      # ==================================================================
      # STEP 4: Integrate SUSFS
      # ==================================================================
      - name: 9. Clone SUSFS & apply patch
        run: |
          cd kernel-src
          set -e

          echo "[1/3] Clone SUSFS repo..."
          git clone --depth=1 -b "${{ github.event.inputs.susfs_branch }}" \
            "${{ github.event.inputs.susfs_repo }}" .susfs4ksu

          echo "[2/3] Download SUSFS patch..."
          curl -LSsf "${{ github.event.inputs.susfs_patch_url }}" -o /tmp/susfs.patch
          echo "  Patch size: $(wc -c < /tmp/susfs.patch) bytes"

          echo "[3/3] Apply SUSFS patch (fuzz=3 --force)..."
          set +e
          patch -p1 --fuzz=3 --no-backup-if-mismatch --force < /tmp/susfs.patch 2>&1 | tee /tmp/susfs.log
          set -e

          SUCCESS=$(grep -c 'succeeded' /tmp/susfs.log || echo 0)
          FAILED=$(grep -c 'FAILED' /tmp/susfs.log || echo 0)
          echo ""
          echo "== Hasil apply =="
          echo "  Succeeded: $SUCCESS hunks"
          echo "  Failed   : $FAILED hunks (akan di-fix manual)"

          # Cleanup rej/orig
          find . -name "*.rej" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true
          find . -name "*.orig" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true

          # Copy file yang tidak dicover patch
          if [ ! -f fs/sus_su.c ] && [ -f .susfs4ksu/kernel_patches/fs/sus_su.c ]; then
            cp .susfs4ksu/kernel_patches/fs/sus_su.c fs/sus_su.c
            echo "[OK] Copied sus_su.c"
          fi

          echo ""
          echo "== SUSFS files final =="
          ls -la fs/susfs.c fs/sus_su.c include/linux/susfs.h include/linux/susfs_def.h 2>/dev/null || true

      # ==================================================================
      # STEP 5: Manual fix untuk 3 hunk yang gagal + tambah declarations
      # ==================================================================
      - name: 10. Manual fix rejected hunks & declarations
        run: |
          cd kernel-src

          echo "============================================"
          echo " FIX 1: fs/proc_namespace.c hunk #1"
          echo "============================================"
          if [ -f fs/proc_namespace.c ] && ! grep -q "susfs_def.h" fs/proc_namespace.c; then
            sed -i '/#include "proc\/internal.h"/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/proc_namespace.c
            echo "[OK] Added susfs_def.h include"
          fi

          echo ""
          echo "============================================"
          echo " FIX 2: fs/stat.c - wrap getattr call"
          echo "============================================"
          if [ -f fs/stat.c ] && ! grep -q "int err = inode->i_op->getattr" fs/stat.c; then
            python3 << 'PYEOF'
          import re
          from pathlib import Path

          p = Path("fs/stat.c")
          text = p.read_text()

          pattern = re.compile(
              r'(\tif\s*\(inode->i_op->getattr\)\s*\n)'
              r'(\t\treturn inode->i_op->getattr\(path->mnt,\s*path->dentry,\s*stat\);)',
              re.MULTILINE
          )

          replacement = (
              r'\1'
              '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n'
              '\t{\n'
              '\t\tint err = inode->i_op->getattr(path->mnt, path->dentry, stat);\n'
              '\t\tif (!err)\n'
              '\t\t\tsusfs_sus_kstat_spoof_generic_fillattr(inode, stat);\n'
              '\t\treturn err;\n'
              '\t}\n'
              '#else\n'
              r'\2'
              '\n#endif'
          )

          new_text, n = pattern.subn(replacement, text)
          if n > 0:
              p.write_text(new_text)
              print(f"[OK] Wrapped inode->i_op->getattr ({n} match)")
          else:
              print("[SKIP] Pattern already applied or not matched")
          PYEOF
          fi

          echo ""
          echo "============================================"
          echo " FIX 3: fs/proc/task_mmu.c hunk #4"
          echo "============================================"
          echo "[SKIP] Whitespace-only diff, no action needed"

          echo ""
          echo "============================================"
          echo " FIX 4: Force include susfs.h"
          echo "============================================"
          python3 << 'PYEOF'
          from pathlib import Path

          files_need_susfs = [
              "fs/open.c",
              "fs/stat.c",
              "fs/proc_namespace.c",
              "fs/proc/task_mmu.c",
              "fs/proc/cmdline.c",
          ]

          for filepath in files_need_susfs:
              p = Path(filepath)
              if not p.exists():
                  continue

              lines = p.read_text().split('\n')
              has_susfs = any('linux/susfs.h' in l for l in lines)
              has_susfs_def = any('linux/susfs_def.h' in l for l in lines)

              if has_susfs and has_susfs_def:
                  continue

              insert_idx = -1
              for i, line in enumerate(lines):
                  if line.strip().startswith('#include'):
                      insert_idx = i
                      break

              if insert_idx == -1:
                  continue

              new_includes = []
              if not has_susfs:
                  new_includes.append('#include <linux/susfs.h>')
              if not has_susfs_def:
                  new_includes.append('#include <linux/susfs_def.h>')

              lines[insert_idx:insert_idx] = new_includes
              p.write_text('\n'.join(lines))
              print(f"[OK] {filepath}: added {len(new_includes)} include(s)")
          PYEOF

          echo ""
          echo "============================================"
          echo " FIX 5: Force extern declarations di proc_namespace.c"
          echo "============================================"
          if [ -f fs/proc_namespace.c ] && ! grep -q "extern bool susfs_is_current_ksu_domain" fs/proc_namespace.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/proc_namespace.c")
          lines = p.read_text().split('\n')
          new_lines = []
          inserted = False
          for line in lines:
              new_lines.append(line)
              if not inserted and '#include "internal.h"' in line:
                  new_lines.extend([
                      '',
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT',
                      'extern bool susfs_is_current_ksu_domain(void);',
                      'extern bool susfs_hide_sus_mnts_for_non_su_procs;',
                      '#endif',
                      '',
                  ])
                  inserted = True
                  print("[OK] Injected extern declarations")
          p.write_text('\n'.join(new_lines))
          PYEOF
          fi

          echo ""
          echo "============================================"
          echo " FIX 6: Forward declaration di fs/stat.c"
          echo "============================================"
          if [ -f fs/stat.c ] && ! grep -q "extern void susfs_sus_kstat_spoof_generic_fillattr" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')

          last_include = -1
          for i, line in enumerate(lines):
              if line.strip().startswith('#include'):
                  last_include = i

          if last_include >= 0:
              lines[last_include+1:last_include+1] = [
                  '',
                  '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT',
                  'extern void susfs_sus_kstat_spoof_generic_fillattr(struct inode *inode, struct kstat *stat);',
                  '#endif',
                  '',
              ]
              p.write_text('\n'.join(lines))
              print("[OK] Injected forward declaration")
          PYEOF
          fi

          echo ""
          echo "============================================"
          echo " FIX 7: Hapus stray call di scope global fs/stat.c"
          echo "============================================"
          if [ -f fs/stat.c ] && grep -q "^EXPORT_SYMBOL(vfs_getattr_nosec);$" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')

          new_lines = []
          i = 0
          removed = False
          while i < len(lines):
              line = lines[i]
              new_lines.append(line)

              if (not removed
                  and line.strip() == 'EXPORT_SYMBOL(vfs_getattr_nosec);'
                  and i + 3 < len(lines)):
                  next1 = lines[i+1].strip()
                  next2 = lines[i+2].strip()
                  next3 = lines[i+3].strip()

                  if (next1 == '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT'
                      and 'susfs_sus_kstat_spoof_generic_fillattr' in next2
                      and next3 == '#endif'):
                      print(f"[OK] Removed stray call at line {i+2}")
                      i += 4
                      removed = True
                      continue
              i += 1

          if removed:
              p.write_text('\n'.join(new_lines))
          PYEOF
          fi

      # ==================================================================
      # STEP 6: Generate ksu_hook.h (7 hooks tanpa vfs_read)
      # ==================================================================
      - name: 11. Generate ksu_hook.h (7 hook declarations)
        run: |
          cd kernel-src

          cat > include/linux/ksu_hook.h << 'HEADEREOF'
          /* Auto-generated for ReSukiSU manual hooks (7 hooks) */
          #ifndef __KSU_HOOK_H
          #define __KSU_HOOK_H

          #include <linux/types.h>
          #include <linux/uidgid.h>

          struct file;
          struct filename;
          struct user_arg_ptr;

          extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr,
                                          void *argv, void *envp, int *flags);
          extern int ksu_handle_faccessat(int *dfd, void *filename_user,
                                          int *mode, int *flags);
          extern int ksu_handle_stat(int *dfd, void *filename_user,
                                     int *flags);
          extern int ksu_handle_sys_read(unsigned int *fd, char __user **buf_ptr,
                                          size_t *count_ptr);
          extern int ksu_handle_input_handle_event(unsigned int *type,
                                                    unsigned int *code, int *value);
          extern int ksu_handle_setresuid(uid_t *ruid, uid_t *euid, uid_t *suid);
          extern int ksu_handle_sys_reboot(int *magic1, int *magic2,
                                           unsigned int *cmd, void __user **arg);

          #endif
          HEADEREOF

          echo "[OK] Generated ksu_hook.h dengan 7 declarations"

      # ==================================================================
      # STEP 7: Fix fs/exec.c conflicts
      # ==================================================================
      - name: 12. Fix fs/exec.c conflicts (hapus ksud.h)
        run: |
          cd kernel-src

          if [ ! -f fs/exec.c ]; then exit 0; fi

          if grep -q "linux/ksud.h" fs/exec.c; then
            sed -i '/#include <linux\/ksud\.h>/d' fs/exec.c
            echo "[OK] Removed #include <linux/ksud.h>"
          fi

          if grep -q "ksu_handle_execveat_ksud" fs/exec.c; then
            sed -i '/ksu_handle_execveat_ksud/d' fs/exec.c
            echo "[OK] Removed ksu_handle_execveat_ksud call"
          fi

      # ==================================================================
      # STEP 8: Inject 7 manual hooks
      # ==================================================================
      - name: 13. Apply 7 manual hooks
        run: |
          cd kernel-src

          inject_hook() {
            local file="$1"
            local func_pat="$2"
            local hook_line="$3"
            [ -f "$file" ] || return 1
            awk -v pat="$func_pat" -v hook="$hook_line" '
              $0 ~ pat { in_func=1 }
              in_func && /^\{/ && !done {
                print
                print "\t/* ReSukiSU hook */"
                print "\t" hook
                done=1
                in_func=0
                next
              }
              { print }
            ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
          }

          add_include() {
            local file="$1"
            [ -f "$file" ] || return
            if ! grep -q "linux/ksu_hook.h" "$file"; then
              sed -i '0,/^#include/s||#include <linux/ksu_hook.h>\n&|' "$file"
            fi
          }

          # 1. fs/exec.c → execveat
          add_include fs/exec.c
          if ! grep -q "ksu_handle_execveat" fs/exec.c; then
            inject_hook fs/exec.c "static int do_execveat_common" \
              "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
            [ ! -q "ksu_handle_execveat" fs/exec.c ] || \
              inject_hook fs/exec.c "do_execveat_common" \
                "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
          fi

          # 2. fs/open.c → faccessat
          add_include fs/open.c
          if ! grep -q "ksu_handle_faccessat" fs/open.c; then
            inject_hook fs/open.c "SYSCALL_DEFINE3.faccessat" \
              "ksu_handle_faccessat(&dfd, &filename, &mode, NULL);"
          fi

          # 3. fs/read_write.c → sys_read (bukan vfs_read, karena vfs_read tidak ada di ReSukiSU)
          add_include fs/read_write.c
          if ! grep -q "ksu_handle_sys_read" fs/read_write.c; then
            inject_hook fs/read_write.c "SYSCALL_DEFINE3.read" \
              "ksu_handle_sys_read(&fd, &buf, &count);"
          fi

          # 4. fs/stat.c → stat
          add_include fs/stat.c
          if ! grep -q "ksu_handle_stat" fs/stat.c; then
            inject_hook fs/stat.c "int vfs_fstatat" \
              "ksu_handle_stat(&dfd, &filename, &flag);"
            if ! grep -q "ksu_handle_stat" fs/stat.c; then
              inject_hook fs/stat.c "SYSCALL_DEFINE4.newfstatat" \
                "ksu_handle_stat(&dfd, &filename, &flag);"
            fi
          fi

          # 5. drivers/input/input.c → input_handle_event
          add_include drivers/input/input.c
          if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
            inject_hook drivers/input/input.c "void input_handle_event" \
              "ksu_handle_input_handle_event(&type, &code, &value);"
            if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
              inject_hook drivers/input/input.c "static void input_handle_event" \
                "ksu_handle_input_handle_event(&type, &code, &value);"
            fi
          fi

          # 6. kernel/sys.c → setresuid
          add_include kernel/sys.c
          if ! grep -q "ksu_handle_setresuid" kernel/sys.c; then
            inject_hook kernel/sys.c "SYSCALL_DEFINE3.setresuid" \
              "ksu_handle_setresuid(&ruid, &euid, &suid);"
          fi

          # 7. kernel/reboot.c → sys_reboot
          add_include kernel/reboot.c
          if [ -f kernel/reboot.c ] && ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            inject_hook kernel/reboot.c "SYSCALL_DEFINE4.reboot" \
              "ksu_handle_sys_reboot(&magic1, &magic2, &cmd, &arg);"
          fi

          echo ""
          echo "== Verifikasi 7 hooks =="
          for f in fs/exec.c fs/open.c fs/read_write.c fs/stat.c drivers/input/input.c kernel/sys.c kernel/reboot.c; do
            [ -f "$f" ] || continue
            HOOKS=$(grep -o "ksu_handle_[a-z_]*" "$f" 2>/dev/null | sort -u | tr '\n' ' ')
            echo "  $f -> ${HOOKS:-NONE}"
          done

      # ==================================================================
      # STEP 9: Prepare defconfig
      # ==================================================================
      - name: 14. Prepare defconfig
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "[FATAL] Defconfig tidak ditemukan: $DEFCONFIG_PATH"
            find arch/arm64/configs -iname "*845*" -o -iname "*beryllium*" 2>/dev/null
            exit 1
          fi

          if [ "${{ github.event.inputs.use_extracted_config }}" = "true" ]; then
            EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/my_defconfig.txt"
            if [ -f "$EXTRACTED_CFG" ]; then
              cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
              echo "[OK] Pakai extracted config dari boot.img"
            fi
          fi

          # Clean up entry KSU/SUSFS lama
          sed -i '/^CONFIG_KSU/d;/^# CONFIG_KSU is not set/d' "$DEFCONFIG_PATH"
          sed -i '/SUSFS/d' "$DEFCONFIG_PATH"
          sed -i '/^CONFIG_KSU_KPROBE_HOOKS/d' "$DEFCONFIG_PATH"

          # Append config ReSukiSU + SUSFS
          {
            echo ""
            echo "# === ReSukiSU + SUSFS Configuration ==="
            echo "CONFIG_KSU=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo ""
            echo "# SUSFS features"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
            echo ""
            echo "# Filesystem support"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_TMPFS_XATTR=y"
            echo "CONFIG_TMPFS_POSIX_ACL=y"
          } >> "$DEFCONFIG_PATH"

          echo ""
          echo "== KSU/SUSFS di defconfig =="
          grep -E "CONFIG_KSU|SUSFS|OVERLAY" "$DEFCONFIG_PATH" | sort

      # ==================================================================
      # STEP 10: Kernel-specific patches
      # ==================================================================
      - name: 15. Patch arch/arm64/Makefile (clang vdso32 fix)
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"
          [ -f "$MAIN_MK" ] || exit 1
          sed -i -E 's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' "$MAIN_MK"
          echo "[OK] Patched CLANG_PREFIX32"

      - name: 16. Skip broken DTBs (QVR/interposer)
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          [ -f "$DTS_MK" ] || exit 0
          for dtb in sdm845-v2-qvr-evt.dtb sdm845-v2-qvr-dvt.dtb \
                     sdm845-interposer-sdm670-mtp.dtb sdm845-interposer-sdm670-cdp.dtb; do
            sed -i "/$dtb/d" "$DTS_MK"
          done
          echo "[OK] Removed 4 broken DTBs"

      # ==================================================================
      # STEP 11: Compile Kernel
      # ==================================================================
      - name: 17. Compile Kernel
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR
            ARCH=arm64
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
          )

          mkdir -p $OUT_DIR

          echo "== [1/3] Generate .config from defconfig =="
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}

          echo ""
          echo "== [2/3] Run olddefconfig =="
          make "${MAKE_ARGS[@]}" olddefconfig

          echo ""
          echo "== Verifikasi CONFIG penting =="
          for cfg in CONFIG_KSU CONFIG_KSU_SUSFS CONFIG_KSU_SUSFS_SUS_KSTAT \
                     CONFIG_KSU_SUSFS_SUS_MOUNT CONFIG_OVERLAY_FS; do
            grep "^${cfg}=" $OUT_DIR/.config || echo "  $cfg = NOT SET"
          done

          if ! grep -q '^CONFIG_KSU=y' $OUT_DIR/.config; then
            echo "[FATAL] CONFIG_KSU=y tidak aktif"
            exit 1
          fi

          echo ""
          echo "== [3/3] Build kernel =="
          BUILD_START=$(date +%s)

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          BUILD_END=$(date +%s)
          BUILD_TIME=$((BUILD_END - BUILD_START))
          echo ""
          echo "Build time: $((BUILD_TIME / 60))m $((BUILD_TIME % 60))s"
          echo "Exit code : $BUILD_EXIT"

          BUILD_OK=0
          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"
            BUILD_OK=1
          elif [ -f "$OUT_DIR/arch/arm64/boot/Image" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image"
            BUILD_OK=1
          fi

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          echo "BUILD_TIME=${BUILD_TIME}" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -eq 1 ] || exit 1

      # ==================================================================
      # STEP 12: Extract versions & capture metadata
      # ==================================================================
      - name: 18. Extract ReSukiSU + SUSFS version dari build log
        if: always()
        run: |
          cd kernel-src

          RESUKISU_CODE=$(grep -oP "ReSukiSU version code:\s*\K[0-9]+" build.log | head -1 || echo "unknown")
          RESUKISU_NAME=$(grep -oP "ReSukiSU version name:\s*\K\S+" build.log | head -1 || echo "unknown")
          SUSFS_VER=$(grep -oP "SUSFS_VERSION:\s*\Kv[0-9.]+" build.log | head -1 || echo "unknown")

          echo "RESUKISU_VERSION_CODE=${RESUKISU_CODE}" >> "$GITHUB_ENV"
          echo "RESUKISU_VERSION_NAME=${RESUKISU_NAME}" >> "$GITHUB_ENV"
          echo "SUSFS_VERSION=${SUSFS_VER}" >> "$GITHUB_ENV"

          echo "========================================"
          echo "  EXTRACTED VERSIONS"
          echo "========================================"
          echo "  ReSukiSU code : ${RESUKISU_CODE}"
          echo "  ReSukiSU name : ${RESUKISU_NAME}"
          echo "  SUSFS version : ${SUSFS_VER}"
          echo "========================================"

      - name: 19. Capture Build Metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          KERNEL_COMMIT_FULL=$(git rev-parse HEAD)

          RESUKISU_COMMIT="unknown"
          if [ -d KernelSU ]; then
            RESUKISU_COMMIT=$(cd KernelSU && git rev-parse --short HEAD 2>/dev/null || echo "embedded")
          elif [ -d .resukisu-src ]; then
            RESUKISU_COMMIT=$(cd .resukisu-src && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          fi

          SUSFS_COMMIT="unknown"
          [ -d ".susfs4ksu" ] && SUSFS_COMMIT=$(cd .susfs4ksu && git rev-parse --short HEAD 2>/dev/null || echo "unknown")

          KERNEL_VERSION=$(cat out/include/config/kernel.release 2>/dev/null || echo "unknown")
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          BUILD_TIME_STR="${BUILD_TIME:-0}s"

          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "${BUILD_DATE}",
            "build_time_seconds": ${BUILD_TIME:-0},
            "kernel": {
              "source": "${{ github.event.inputs.kernel_source }}",
              "branch": "${{ github.event.inputs.kernel_branch }}",
              "commit": "${KERNEL_COMMIT}",
              "commit_full": "${KERNEL_COMMIT_FULL}",
              "version": "${KERNEL_VERSION}",
              "defconfig": "${{ github.event.inputs.defconfig }}",
              "use_extracted_config": "${{ github.event.inputs.use_extracted_config }}"
            },
            "resukisu": {
              "repo": "${{ github.event.inputs.resukisu_repo }}",
              "branch": "${{ github.event.inputs.resukisu_branch }}",
              "commit": "${RESUKISU_COMMIT}",
              "version_code": "${RESUKISU_VERSION_CODE}",
              "version_name": "${RESUKISU_VERSION_NAME}"
            },
            "susfs": {
              "repo": "${{ github.event.inputs.susfs_repo }}",
              "branch": "${{ github.event.inputs.susfs_branch }}",
              "commit": "${SUSFS_COMMIT}",
              "version": "${SUSFS_VERSION}",
              "patch_url": "${{ github.event.inputs.susfs_patch_url }}"
            },
            "toolchain": {
              "clang_url": "${{ github.event.inputs.clang_url }}"
            },
            "output": {
              "zip_name": "${{ github.event.inputs.zip_name }}"
            }
          }
          JSONEOF

          echo "== Isi build-metadata.json =="
          cat ../build-metadata.json | jq . || cat ../build-metadata.json

      # ==================================================================
      # STEP 13: Build summary (tampil di GitHub Actions UI)
      # ==================================================================
      - name: 20. Generate build summary
        if: always()
        run: |
          STATUS="❌ FAILED"
          [ "${{ env.BUILD_OK }}" = "1" ] && STATUS="✅ SUCCESS"

          BUILD_MIN=$((${BUILD_TIME:-0} / 60))
          BUILD_SEC=$((${BUILD_TIME:-0} % 60))

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🔨 Build Summary

          ## Status: $STATUS

          | Field | Value |
          |-------|-------|
          | **Build Date** | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | **Build Time** | ${BUILD_MIN}m ${BUILD_SEC}s |
          | **Device** | Poco F1 (beryllium) |
          | **Kernel Base** | BaikalOS 13.0 |
          | **Root Solution** | ReSukiSU + SUSFS |

          ## 🌱 ReSukiSU
          | Field | Value |
          |-------|-------|
          | Version Code | \`${RESUKISU_VERSION_CODE:-unknown}\` |
          | Version Name | \`${RESUKISU_VERSION_NAME:-unknown}\` |
          | Branch | \`${{ github.event.inputs.resukisu_branch }}\` |

          ## 🛡️ SUSFS
          | Field | Value |
          |-------|-------|
          | Version | \`${SUSFS_VERSION:-unknown}\` |
          | Branch | \`${{ github.event.inputs.susfs_branch }}\` |

          ## 📥 Downloads
          Download artifact di bawah untuk mendapatkan:
          - \`Image.gz-dtb\` (kernel image)
          - \`build-metadata.json\` (build info)
          - \`build.log\` (full build log)
          EOF

      # ==================================================================
      # STEP 14: Upload artifacts
      # ==================================================================
      - name: 21. Upload Build Metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json
          retention-days: 30
          if-no-files-found: warn

      - name: 22. Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          retention-days: 7
          if-no-files-found: warn

      - name: 23. Upload Image.gz-dtb (untuk flash)
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          retention-days: 30
          if-no-files-found: warn

      - name: 24. Upload Image raw (backup)
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          retention-days: 7
          if-no-files-found: ignore
