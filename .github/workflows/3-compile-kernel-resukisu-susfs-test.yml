name: 3. Compile Kernel - BOS Beryllium + ReSukiSU + SUSFS + Log

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'bos-beryllium-resukisu-susfs'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/baikalos/android_kernel_xiaomi_sdm845.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '13.0'
      defconfig:
        description: 'defconfig path (di kernel source)'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      use_extracted_config:
        description: 'Pakai config hasil extract boot.img asli sebagai basis? (true/false)'
        required: true
        default: 'true'
      resukisu_repo:
        description: 'ReSukiSU repo URL'
        required: true
        default: 'https://github.com/ReSukiSU/ReSukiSU'
      resukisu_branch:
        description: 'ReSukiSU branch/tag'
        required: true
        default: 'main'
      susfs_repo:
        description: 'SUSFS repo URL'
        required: true
        default: 'https://gitlab.com/simonpunk/susfs4ksu.git'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.9'
      susfs_patch_url:
        description: 'SUSFS patch for 4.9 (URL langsung ke .patch file)'
        required: true
        default: 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

jobs:
  test-build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    steps:

      # ==============================================================
      # STEP 1: Checkout repo ini (untuk akses extracted-config/)
      # ==============================================================
      - name: Checkout repo (untuk akses extracted-config/my_defconfig.txt)
        uses: actions/checkout@v4

      - name: Show Input
        run: |
          echo "kernel_source       : ${{ github.event.inputs.kernel_source }}"
          echo "kernel_branch       : ${{ github.event.inputs.kernel_branch }}"
          echo "defconfig           : ${{ github.event.inputs.defconfig }}"
          echo "use_extracted_config: ${{ github.event.inputs.use_extracted_config }}"
          echo "resukisu_repo       : ${{ github.event.inputs.resukisu_repo }}"
          echo "resukisu_branch     : ${{ github.event.inputs.resukisu_branch }}"
          echo "susfs_repo          : ${{ github.event.inputs.susfs_repo }}"
          echo "susfs_branch        : ${{ github.event.inputs.susfs_branch }}"
          echo "susfs_patch_url     : ${{ github.event.inputs.susfs_patch_url }}"
          echo "clang_url           : ${{ github.event.inputs.clang_url }}"

      # ==============================================================
      # STEP 2: Install dependencies
      # ==============================================================
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget python3 python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev patch
          echo "== Cek lokasi arm-linux-gnueabi-as =="
          which arm-linux-gnueabi-as || echo "TIDAK DITEMUKAN"

      # ==============================================================
      # STEP 3: Setup Clang (sama persis dengan workflow KSU-Next)
      # ==============================================================
      - name: Setup Clang Cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: Setup Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      # ==============================================================
      # STEP 4: Clone kernel source (BaikalOS)
      # ==============================================================
      - name: Clone Kernel Source (BaikalOS)
        run: |
          git clone --depth=1 "${{ github.event.inputs.kernel_source }}" -b "${{ github.event.inputs.kernel_branch }}" kernel-src

      # ==============================================================
      # STEP 5: Setup ReSukiSU (pengganti KernelSU-Next)
      # ==============================================================
      # ReSukiSU setup.sh kompatibel dengan pola KernelSU-Next:
      # curl setup.sh | bash -s <branch/tag>
      # Hasilnya: KernelSU/ di root + symlink drivers/kernelsu
      # ==============================================================
      - name: Setup ReSukiSU (pengganti KernelSU-Next)
        run: |
          cd kernel-src

          RAW_BASE="$(echo "${{ github.event.inputs.resukisu_repo }}" | sed 's|github.com|raw.githubusercontent.com|')"
          SETUP_OK=0

          # Cara 1: curl setup.sh (pola sama persis KSU-Next)
          echo "[Cara 1] curl setup.sh | bash -s ${{ github.event.inputs.resukisu_branch }}"
          if curl -LSsf "${RAW_BASE}/${{ github.event.inputs.resukisu_branch }}/kernel/setup.sh" \
              | bash -s "${{ github.event.inputs.resukisu_branch }}"; then
            echo "[OK] setup.sh via curl berhasil."
            SETUP_OK=1
          else
            echo "[INFO] Cara 1 gagal, coba cara 2..."
          fi

          # Cara 2: clone repo, jalankan setup.sh lokal
          if [ "$SETUP_OK" -ne 1 ]; then
            echo "[Cara 2] Clone ReSukiSU lalu jalankan setup.sh lokal"
            git clone --depth=1 -b "${{ github.event.inputs.resukisu_branch }}" \
              "${{ github.event.inputs.resukisu_repo }}" .resukisu-src
            if [ -f .resukisu-src/kernel/setup.sh ]; then
              bash .resukisu-src/kernel/setup.sh "${{ github.event.inputs.resukisu_branch }}" && SETUP_OK=1
            fi
          fi

          # Cara 3: fallback manual
          if [ "$SETUP_OK" -ne 1 ]; then
            echo "[Cara 3] Fallback: integrasi manual"
            [ -d .resukisu-src ] || git clone --depth=1 -b "${{ github.event.inputs.resukisu_branch }}" \
              "${{ github.event.inputs.resukisu_repo }}" .resukisu-src

            mkdir -p KernelSU/kernel
            cp -a .resukisu-src/kernel/. KernelSU/kernel/ 2>/dev/null || true
            ln -sf "$(pwd)/KernelSU/kernel" drivers/kernelsu

            if ! grep -q "kernelsu" drivers/Makefile; then
              echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            fi
            if ! grep -q "kernelsu" drivers/Kconfig; then
              sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
            fi
            SETUP_OK=1
            echo "[OK] Integrasi manual selesai."
          fi

          if [ "$SETUP_OK" -ne 1 ]; then
            echo "[GAGAL] Semua cara integrasi ReSukiSU gagal."
            exit 1
          fi

          echo ""
          echo "== Verifikasi struktur ReSukiSU =="
          ls -la drivers/kernelsu || echo "TIDAK ADA symlink drivers/kernelsu!"
          grep -n "kernelsu" drivers/Makefile || echo "TIDAK ADA entri di drivers/Makefile!"
          grep -n "kernelsu" drivers/Kconfig || echo "TIDAK ADA entri di drivers/Kconfig!"

          # Deteksi root dir KSU (untuk metadata nanti)
          KSU_ROOT_DIR=""
          for d in KernelSU KernelSU-Next ReSukiSU; do
            if [ -d "$d" ]; then KSU_ROOT_DIR="$d"; break; fi
          done
          echo "KSU_ROOT_DIR=$KSU_ROOT_DIR" >> "$GITHUB_ENV"
          echo "Detected KSU root dir: $KSU_ROOT_DIR"

      # ==============================================================
      # STEP 6: Integrate SUSFS (SEBELUM manual hooks)
      # ==============================================================
      # PENTING: SUSFS patch HARUS di-apply SEBELUM manual hooks,
      # karena SUSFS patch juga memodifikasi fs/open.c, fs/stat.c,
      # fs/namei.c, fs/namespace.c, fs/proc/*, dll.
      # Kalau manual hooks duluan, context patch SUSFS jadi beda
      # dan apply-nya rusak / partial.
      #
      # Strategy:
      # 1. Clone repo SUSFS → ambil file header/source
      # 2. Apply SATU patch saja (susfs_patch_url) secara CLEAN
      # 3. TIDAK pakai --force / --fuzz (kalau gagal = stop, bukan paksa)
      # ==============================================================
      - name: Integrate SUSFS (clean apply, sebelum manual hooks)
        run: |
          cd kernel-src
          set -e

          echo "== [1/4] Clone SUSFS repo (branch: ${{ github.event.inputs.susfs_branch }}) =="
          git clone --depth=1 -b "${{ github.event.inputs.susfs_branch }}" \
            "${{ github.event.inputs.susfs_repo }}" .susfs4ksu

          echo ""
          echo "== [2/4] Copy SUSFS source/header files ke kernel tree =="

          # Header files
          find .susfs4ksu -type f -name "susfs*.h" | while read -r hdr; do
            echo "  Copy header: $hdr -> include/linux/$(basename "$hdr")"
            cp -f "$hdr" include/linux/
          done

          # Source files (fs/susfs.c atau fs/susfs/*.c)
          if [ -d ".susfs4ksu/kernel_patches/fs" ]; then
            for item in .susfs4ksu/kernel_patches/fs/*; do
              base="$(basename "$item")"
              if [ -d "$item" ]; then
                mkdir -p "fs/$base"
                cp -rvf "$item"/* "fs/$base/"
              elif [ -f "$item" ]; then
                cp -vf "$item" fs/
              fi
            done
          fi
          if [ -d ".susfs4ksu/fs/susfs" ]; then
            mkdir -p fs/susfs
            cp -rvf .susfs4ksu/fs/susfs/* fs/susfs/
          fi

          echo ""
          echo "== [3/4] Download SUSFS patch =="
          curl -LSsf "${{ github.event.inputs.susfs_patch_url }}" -o /tmp/susfs.patch
          echo "  Size: $(wc -c < /tmp/susfs.patch) bytes"
          echo "  Lines: $(wc -l < /tmp/susfs.patch)"

          echo ""
          echo "== [4/4] Apply SUSFS patch (MUST be clean) =="
          if git apply --check /tmp/susfs.patch 2>&1; then
            git apply /tmp/susfs.patch
            echo "[OK] SUSFS patch applied cleanly via git apply."
          elif git apply --check --3way /tmp/susfs.patch 2>&1; then
            git apply --3way /tmp/susfs.patch
            echo "[OK] SUSFS patch applied via git apply --3way."
          elif patch -p1 --dry-run --forward < /tmp/susfs.patch > /dev/null 2>&1; then
            patch -p1 --forward --no-backup-if-mismatch < /tmp/susfs.patch
            echo "[OK] SUSFS patch applied cleanly via patch -p1."
          else
            echo ""
            echo "============================================================"
            echo "[FATAL] SUSFS patch TIDAK apply clean."
            echo ""
            echo "Ini berarti patch ${{ github.event.inputs.susfs_patch_url }}"
            echo "TIDAK cocok dengan source BaikalOS 13.0 kernel 4.9 ini."
            echo ""
            echo "JANGAN pakai --force/--fuzz karena itu bikin source rusak"
            echo "dan error meledak ke puluhan file."
            echo ""
            echo "Solusi:"
            echo "  1. Ganti susfs_patch_url ke patch yang benar-benar cocok"
            echo "  2. Atau buat patch manual untuk tree ini"
            echo "============================================================"
            echo ""
            echo "== Detail error dari git apply --check =="
            git apply --check /tmp/susfs.patch 2>&1 || true
            echo ""
            echo "== Detail error dari patch --dry-run =="
            patch -p1 --dry-run --forward < /tmp/susfs.patch 2>&1 || true
            exit 1
          fi

          echo ""
          echo "== SUSFS files sekarang di kernel tree =="
          find . -type f -name "*susfs*" -not -path "./.susfs4ksu/*" | sort

      # ==============================================================
      # STEP 7: Detect KSU hook header
      # ==============================================================
      # PENTING: Untuk manual inline hook, yang benar adalah ksu_hook.h
      # BUKAN ksu.h (yang isinya beda dan bikin error KERNEL_VERSION)
      # ==============================================================
      - name: Detect KSU hook header
        run: |
          cd kernel-src
          set -e

          # Prioritas: cari ksu_hook.h dulu
          if [ -f include/linux/ksu_hook.h ]; then
            echo "KSU_HEADER=linux/ksu_hook.h" >> "$GITHUB_ENV"
            echo "[OK] Detected: include/linux/ksu_hook.h (sudah ada)"
            exit 0
          fi

          # Cari di KernelSU driver tree
          FOUND="$(find KernelSU KernelSU-Next drivers/kernelsu .resukisu-src 2>/dev/null \
                   -type f -name 'ksu_hook.h' | head -n 1 || true)"

          if [ -n "$FOUND" ]; then
            mkdir -p include/linux
            cp -f "$FOUND" include/linux/ksu_hook.h
            echo "KSU_HEADER=linux/ksu_hook.h" >> "$GITHUB_ENV"
            echo "[OK] Copied: $FOUND -> include/linux/ksu_hook.h"
            exit 0
          fi

          # Kalau ksu_hook.h benar-benar tidak ada, cek apakah ada
          # header alternatif yang isinya berisi deklarasi ksu_handle_*
          echo "[WARN] ksu_hook.h tidak ditemukan, cari alternatif..."
          ALT="$(find KernelSU KernelSU-Next drivers/kernelsu .resukisu-src 2>/dev/null \
                 -type f -name '*.h' -exec grep -l 'ksu_handle_execveat' {} \; | head -n 1 || true)"

          if [ -n "$ALT" ]; then
            mkdir -p include/linux
            BASENAME="$(basename "$ALT")"
            cp -f "$ALT" "include/linux/$BASENAME"
            echo "KSU_HEADER=linux/$BASENAME" >> "$GITHUB_ENV"
            echo "[OK] Found alternative: $ALT -> include/linux/$BASENAME"
            exit 0
          fi

          echo ""
          echo "[FATAL] Tidak ada header yang berisi deklarasi ksu_handle_*"
          echo "Daftar header di KernelSU tree:"
          find KernelSU KernelSU-Next drivers/kernelsu .resukisu-src 2>/dev/null -name "*.h" | head -20
          exit 1

      # ==============================================================
      # STEP 8: Apply ReSukiSU manual hooks (SETELAH SUSFS)
      # ==============================================================
      # 6 hooks wajib untuk non-GKI kernel 4.9:
      #   1. fs/exec.c        -> ksu_handle_execveat
      #   2. fs/open.c        -> ksu_handle_faccessat
      #   3. fs/read_write.c  -> ksu_handle_vfs_read
      #   4. fs/stat.c        -> ksu_handle_stat
      #   5. drivers/input/input.c -> ksu_handle_input_handle_event
      #   6. kernel/sys.c     -> ksu_handle_setresuid  ← BARU, wajib ReSukiSU v4.1+
      #
      # Ref: https://resukisu.github.io/guide/manual-integrate.html
      # Error sebelumnya: "You lost ksu_handle_setresuid hook"
      #
      # Catatan penting:
      # - Pakai ksu_hook.h, BUKAN ksu.h
      # - Tambah #include <linux/version.h> supaya KERNEL_VERSION() terdefinisi
      # - fs/stat.c: variabel di kernel 4.9 BaikalOS namanya "flag" bukan "flags"
      # ==============================================================
      - name: Apply ReSukiSU manual hooks (6 hooks, SETELAH SUSFS)
        run: |
          cd kernel-src
          export KSU_HEADER="${{ env.KSU_HEADER }}"

          # Pertama, baca isi header untuk tahu function signature yang benar
          echo "== Isi KSU hook header =="
          if [ -f "include/$KSU_HEADER" ]; then
            grep "ksu_handle_" "include/$KSU_HEADER" || echo "(tidak ada ksu_handle_ di header)"
          fi
          echo ""

          python3 << 'HOOKPY'
          import os, re, sys
          from pathlib import Path

          header = os.environ.get("KSU_HEADER", "linux/ksu_hook.h")
          print(f"Using header: {header}")
          print()

          def add_includes(text, hdr):
              """Tambah #include <linux/version.h> dan #include <header>.
              version.h dibutuhkan supaya KERNEL_VERSION() macro terdefinisi."""
              needed = [
                  "#include <linux/version.h>",
                  f"#include <{hdr}>",
              ]
              for inc in needed:
                  if inc not in text:
                      # Cari posisi #include terakhir, sisipkan setelahnya
                      matches = list(re.finditer(r'^[ \t]*#include\s+[<"][^>"]+[>"]', text, re.M))
                      if matches:
                          pos = matches[-1].end()
                          text = text[:pos] + "\n" + inc + text[pos:]
                      else:
                          text = inc + "\n" + text
              return text

          def find_func_brace(text, patterns):
              """Cari opening brace '{' dari function.
              Return posisi setelah '{' (dan newline jika ada)."""
              for pat in patterns:
                  m = re.search(pat, text, re.S | re.M)
                  if not m:
                      continue
                  # Dari match, cari '{' pertama
                  brace = text.find("{", m.start())
                  if brace == -1:
                      continue
                  pos = brace + 1
                  # Skip whitespace setelah '{'
                  while pos < len(text) and text[pos] in (" ", "\t"):
                      pos += 1
                  if pos < len(text) and text[pos] == "\n":
                      pos += 1
                  return pos, pat
              return -1, None

          # ===========================================================
          # Definisi 6 hooks
          # ===========================================================
          # Format: (file, [regex patterns], hook_code, idempotency_marker)
          #
          # PERHATIAN pada variabel names:
          # - fs/stat.c kernel 4.9 BaikalOS: parameter namanya "flag" (singular)
          #   bukan "flags" (plural). Error sebelumnya:
          #   "use of undeclared identifier 'flags'; did you mean 'flag'?"
          # ===========================================================
          hooks = [
              # Hook 1: fs/exec.c
              (
                  "fs/exec.c",
                  [
                      r"static\s+int\s+do_execveat_common\s*\(",
                      r"static\s+int\s+__do_execve_file\s*\(",
                      r"int\s+do_execve\s*\(",
                  ],
                  "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);",
                  "ksu_handle_execveat(",
              ),
              # Hook 2: fs/open.c
              (
                  "fs/open.c",
                  [
                      r"long\s+do_faccessat\s*\(",
                      r"SYSCALL_DEFINE\d\s*\(\s*faccessat",
                  ],
                  "ksu_handle_faccessat(&dfd, &filename, &mode, NULL);",
                  "ksu_handle_faccessat(",
              ),
              # Hook 3: fs/read_write.c
              (
                  "fs/read_write.c",
                  [
                      r"ssize_t\s+vfs_read\s*\(",
                  ],
                  "ksu_handle_vfs_read(&file, &buf, &count, &pos);",
                  "ksu_handle_vfs_read(",
              ),
              # Hook 4: fs/stat.c
              # PENTING: "flag" bukan "flags" untuk kernel 4.9 BaikalOS
              (
                  "fs/stat.c",
                  [
                      r"int\s+vfs_fstatat\s*\(",
                      r"int\s+vfs_statx\s*\(",
                      r"SYSCALL_DEFINE\d\s*\(\s*newfstatat",
                  ],
                  "ksu_handle_stat(&dfd, &filename, &flag);",
                  "ksu_handle_stat(",
              ),
              # Hook 5: drivers/input/input.c
              (
                  "drivers/input/input.c",
                  [
                      r"static\s+void\s+input_handle_event\s*\(",
                      r"void\s+input_handle_event\s*\(",
                  ],
                  "ksu_handle_input_handle_event(&type, &code, &value);",
                  "ksu_handle_input_handle_event(",
              ),
              # Hook 6: kernel/sys.c — ksu_handle_setresuid
              # INI YANG SEBELUMNYA HILANG dan bikin error:
              # "You lost ksu_handle_setresuid hook in your kernel"
              (
                  "kernel/sys.c",
                  [
                      r"SYSCALL_DEFINE3\s*\(\s*setresuid\s*,",
                      r"__sys_setresuid\s*\(",
                  ],
                  "ksu_handle_setresuid(&ruid, &euid, &suid);",
                  "ksu_handle_setresuid(",
              ),
          ]

          results = []
          for filepath, patterns, hook_code, marker in hooks:
              p = Path(filepath)

              if not p.exists():
                  results.append((filepath, "SKIP", "file not found"))
                  continue

              text = p.read_text(encoding="utf-8", errors="replace")

              # Cek idempotency — jangan inject dobel
              if marker in text:
                  results.append((filepath, "OK", "already hooked (idempotent)"))
                  continue

              # Tambah includes
              text = add_includes(text, header)

              # Cari function dan inject hook setelah opening brace
              pos, matched = find_func_brace(text, patterns)
              if pos == -1:
                  # Tulis file (mungkin sudah ada include yang ditambahkan)
                  p.write_text(text, encoding="utf-8")
                  results.append((filepath, "WARN", "function pattern not matched"))
                  continue

              # Inject hook
              hook_block = f"\t/* ReSukiSU hook */\n\t{hook_code}\n"
              text = text[:pos] + hook_block + text[pos:]

              p.write_text(text, encoding="utf-8")
              short_pat = matched[:70] + "..." if len(matched) > 70 else matched
              results.append((filepath, "OK", f"hooked via: {short_pat}"))

          # Print summary
          print("=" * 65)
          print("MANUAL HOOK SUMMARY (6 hooks)")
          print("=" * 65)
          all_ok = True
          for fp, status, detail in results:
              icon = {"OK": "✓", "WARN": "⚠", "SKIP": "⊘"}.get(status, "?")
              print(f"  {icon} [{status:4s}] {fp}")
              print(f"          {detail}")
              if status not in ("OK",):
                  all_ok = False

          print()
          if all_ok:
              print("Semua 6 hook berhasil di-inject.")
          else:
              print("PERINGATAN: Beberapa hook gagal.")
              print("Build mungkin tetap jalan tapi ReSukiSU tidak berfungsi penuh.")
              print("Cek build log untuk error ksu_handle_* yang undefined.")
          print()
          HOOKPY

          echo ""
          echo "== Verifikasi: grep semua ksu_handle_ di source =="
          for f in fs/exec.c fs/open.c fs/read_write.c fs/stat.c drivers/input/input.c kernel/sys.c; do
            if [ -f "$f" ]; then
              COUNT=$(grep -c "ksu_handle_" "$f" 2>/dev/null || echo "0")
              FUNCS=$(grep -o "ksu_handle_[a-z_]*" "$f" 2>/dev/null | sort -u | tr '\n' ' ')
              echo "  $f: $COUNT call(s) -> $FUNCS"
            else
              echo "  $f: FILE NOT FOUND"
            fi
          done

      # ==============================================================
      # STEP 9: Prepare defconfig
      # ==============================================================
      - name: Prepare defconfig (extracted config + ReSukiSU + SUSFS flags)
        run: |
          cd kernel-src

          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "ERROR: defconfig tidak ditemukan di $DEFCONFIG_PATH"
            find arch/arm64/configs -iname "*845*" -o -iname "*beryllium*" -o -iname "*xiaomi*" 2>/dev/null
            exit 1
          fi

          # Timpa dengan extracted config dari boot.img (kalau diminta)
          if [ "${{ github.event.inputs.use_extracted_config }}" = "true" ]; then
            EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/my_defconfig.txt"
            if [ -f "$EXTRACTED_CFG" ]; then
              echo "[INFO] Memakai config hasil extract boot.img asli sebagai basis (menimpa $DEFCONFIG_PATH)."
              cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
            else
              echo "[PERINGATAN] use_extracted_config=true tapi file $EXTRACTED_CFG tidak ditemukan di repo."
              echo "Lanjut pakai defconfig asli dari source kernel sebagai fallback."
            fi
          fi

          # Bersihkan entry KSU/SUSFS lama yang mungkin ada
          sed -i '/^CONFIG_KSU/d; /^# CONFIG_KSU is not set/d' "$DEFCONFIG_PATH"
          sed -i '/SUSFS/d' "$DEFCONFIG_PATH"
          sed -i '/^CONFIG_KSU_KPROBE_HOOKS/d' "$DEFCONFIG_PATH"

          # Tambahkan config ReSukiSU + SUSFS
          # CATATAN:
          # - TIDAK pakai CONFIG_KSU_KPROBE_HOOKS=y karena kernel 4.9 non-GKI
          #   pakai manual hooks (sudah di-inject di step sebelumnya)
          # - CONFIG_KPROBES tetap aktif karena ada bagian KSU internal
          #   yang mungkin butuh
          {
            echo ""
            echo "# === ReSukiSU ==="
            echo "CONFIG_KSU=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo ""
            echo "# === SUSFS ==="
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
            echo "CONFIG_KSU_SUSFS_SUS_SU=y"
            echo ""
            echo "# === Filesystem support (dibutuhkan KSU & SUSFS) ==="
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_TMPFS_XATTR=y"
            echo "CONFIG_TMPFS_POSIX_ACL=y"
          } >> "$DEFCONFIG_PATH"

          echo "[OK] Defconfig berhasil dipatch."
          echo ""
          echo "== KSU/SUSFS entries =="
          grep -E "CONFIG_KSU|CONFIG_KPROBES|SUSFS|OVERLAY" "$DEFCONFIG_PATH" | sort

      # ==============================================================
      # STEP 10: Patch vdso32 (sama persis workflow KSU-Next)
      # ==============================================================
      - name: Patch arch/arm64/Makefile (fix clang vdso32 "-EL" assembler error)
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"

          if [ ! -f "$MAIN_MK" ]; then
            echo "ERROR: $MAIN_MK tidak ditemukan!"
            exit 1
          fi

          grep -n "CLANG_PREFIX32\|GCC_TOOLCHAIN32\|CLANG_TARGET_ARM32\|CLANG_GCC32_TC" "$MAIN_MK" || echo "TIDAK DITEMUKAN sama sekali!"

          cp "$MAIN_MK" "$MAIN_MK.orig"

          sed -i -E \
            's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' \
            "$MAIN_MK"

          if ! diff -q "$MAIN_MK" "$MAIN_MK.orig" > /dev/null; then
            echo "[OK] Patch CLANG_PREFIX32 berhasil diterapkan."
            grep -n "CLANG_PREFIX32" "$MAIN_MK"
          else
            echo "[PERINGATAN] Pattern CLANG_PREFIX32 tidak match/tidak berubah."
            grep -n -B5 -A10 "CLANG_TARGET_ARM32\|CLANG_PREFIX32" "$MAIN_MK" || true
          fi

          rm -f "$MAIN_MK.orig"

      # ==============================================================
      # STEP 11: Skip broken DTB (sama persis workflow KSU-Next)
      # ==============================================================
      - name: Skip DTB yang tidak relevan/rusak (QVR headset, interposer SDM670)
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"

          if [ ! -f "$DTS_MK" ]; then
            echo "PERINGATAN: $DTS_MK tidak ditemukan, skip step ini."
            exit 0
          fi

          BROKEN_DTBS=(
            "sdm845-v2-qvr-evt.dtb"
            "sdm845-v2-qvr-dvt.dtb"
            "sdm845-interposer-sdm670-mtp.dtb"
            "sdm845-interposer-sdm670-cdp.dtb"
          )

          cp "$DTS_MK" "$DTS_MK.orig"

          for dtb in "${BROKEN_DTBS[@]}"; do
            if grep -q "$dtb" "$DTS_MK"; then
              sed -i "/$dtb/d" "$DTS_MK"
              echo "[OK] Baris untuk $dtb dihapus dari $DTS_MK."
            else
              echo "[INFO] $dtb tidak ditemukan di $DTS_MK."
            fi
          done

          diff "$DTS_MK.orig" "$DTS_MK" || true
          rm -f "$DTS_MK.orig"

      # ==============================================================
      # STEP 12: Compile kernel
      # ==============================================================
      - name: Compile Kernel (test build, tidak untuk flash)
        env:
          KBUILD_BUILD_USER: "tester"
          KBUILD_BUILD_HOST: "ghactions"
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR
            ARCH=arm64
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          echo ""
          echo "== Cek config KSU + SUSFS di .config hasil olddefconfig =="
          for cfg in \
            CONFIG_KSU \
            CONFIG_KPROBES \
            CONFIG_KPROBE_EVENTS \
            CONFIG_KSU_SUSFS \
            CONFIG_KSU_SUSFS_SUS_PATH \
            CONFIG_KSU_SUSFS_SUS_MOUNT \
            CONFIG_KSU_SUSFS_SUS_KSTAT \
            CONFIG_KSU_SUSFS_SUS_OVERLAYFS \
            CONFIG_KSU_SUSFS_TRY_UMOUNT \
            CONFIG_KSU_SUSFS_SPOOF_UNAME \
            CONFIG_KSU_SUSFS_ENABLE_LOG \
            CONFIG_KSU_SUSFS_OPEN_REDIRECT \
            CONFIG_KSU_SUSFS_SUS_SU \
            CONFIG_OVERLAY_FS; do
            VAL=$(grep "^${cfg}=" $OUT_DIR/.config 2>/dev/null || echo "NOT SET")
            echo "  $cfg = $VAL"
          done

          echo ""
          if ! grep -q '^CONFIG_KSU=y' $OUT_DIR/.config; then
            echo "FATAL: CONFIG_KSU=y tidak aktif di .config final!"
            echo "Berarti Kconfig dari driver ReSukiSU tidak ter-load."
            exit 1
          fi

          # -k (keep going): jangan berhenti total kalau satu target dtb gagal
          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "== Exit code make: $BUILD_EXIT =="
          echo "== Cek apakah Image / Image.gz-dtb berhasil =="
          IMAGE_OK=0
          IMAGE_GZ_DTB_OK=0

          if [ -f "$OUT_DIR/arch/arm64/boot/Image" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image"
            IMAGE_OK=1
          else
            echo "Image TIDAK ADA"
          fi

          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"
            IMAGE_GZ_DTB_OK=1
          else
            echo "Image.gz-dtb TIDAK ADA"
          fi

          if [ "$IMAGE_GZ_DTB_OK" -eq 1 ]; then
            echo "[OK] Image.gz-dtb berhasil (kernel + dtb beryllium)."
            BUILD_OK=1
          elif [ "$IMAGE_OK" -eq 1 ]; then
            echo "[SEBAGIAN OK] Image berhasil, tapi Image.gz-dtb belum."
            BUILD_OK=1
          else
            echo "[GAGAL] Baik Image maupun Image.gz-dtb tidak ditemukan."
            BUILD_OK=0
          fi

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          if [ "$BUILD_OK" -ne 1 ]; then
            exit 1
          fi

      # ==============================================================
      # STEP 13: Build metadata
      # ==============================================================
      - name: Capture Build Metadata (untuk changelog otomatis)
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src

          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          KERNEL_COMMIT_FULL=$(git rev-parse HEAD)

          KSU_DIR="${{ env.KSU_ROOT_DIR }}"
          KSU_COMMIT="unknown"
          if [ -n "$KSU_DIR" ] && [ -d "$KSU_DIR" ]; then
            KSU_COMMIT=$(cd "$KSU_DIR" && git rev-parse --short HEAD 2>/dev/null || echo "embedded")
          fi

          SUSFS_COMMIT="unknown"
          if [ -d ".susfs4ksu" ]; then
            SUSFS_COMMIT=$(cd .susfs4ksu && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          fi

          KERNEL_VERSION_STRING=$(cat out/include/config/kernel.release 2>/dev/null || echo unknown)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "${BUILD_DATE}",
            "kernel_source": "${{ github.event.inputs.kernel_source }}",
            "kernel_branch": "${{ github.event.inputs.kernel_branch }}",
            "kernel_commit": "${KERNEL_COMMIT}",
            "kernel_commit_full": "${KERNEL_COMMIT_FULL}",
            "root_solution": "ReSukiSU + SUSFS",
            "resukisu_repo": "${{ github.event.inputs.resukisu_repo }}",
            "resukisu_branch": "${{ github.event.inputs.resukisu_branch }}",
            "resukisu_commit": "${KSU_COMMIT}",
            "susfs_repo": "${{ github.event.inputs.susfs_repo }}",
            "susfs_branch": "${{ github.event.inputs.susfs_branch }}",
            "susfs_commit": "${SUSFS_COMMIT}",
            "susfs_patch_url": "${{ github.event.inputs.susfs_patch_url }}",
            "kernel_version_string": "${KERNEL_VERSION_STRING}",
            "defconfig": "${{ github.event.inputs.defconfig }}",
            "use_extracted_config": "${{ github.event.inputs.use_extracted_config }}",
            "clang_url": "${{ github.event.inputs.clang_url }}",
            "zip_name": "${{ github.event.inputs.zip_name }}"
          }
          JSONEOF

          echo "== Isi build-metadata.json =="
          cat ../build-metadata.json

      # ==============================================================
      # STEP 14-17: Upload artifacts (sama persis pola KSU-Next)
      # ==============================================================
      - name: Upload Build Metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json
          if-no-files-found: warn

      - name: Upload Build Log (selalu, untuk debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          if-no-files-found: warn

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore

      - name: Upload Image Only
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          if-no-files-found: ignore
