name: 3. Compile Kernel - BOS Beryllium + ReSukiSU + SUSFS + Log

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'bos-beryllium-resukisu-susfs'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/baikalos/android_kernel_xiaomi_sdm845.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '13.0'
      defconfig:
        description: 'defconfig path'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      use_extracted_config:
        description: 'Pakai extracted config?'
        required: true
        default: 'true'
      resukisu_repo:
        description: 'ReSukiSU repo URL'
        required: true
        default: 'https://github.com/ReSukiSU/ReSukiSU'
      resukisu_branch:
        description: 'ReSukiSU branch'
        required: true
        default: 'main'
      susfs_repo:
        description: 'SUSFS repo URL'
        required: true
        default: 'https://gitlab.com/simonpunk/susfs4ksu.git'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.9'
      susfs_patch_url:
        description: 'SUSFS patch URL'
        required: true
        default: 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz'

jobs:
  test-build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget python3 python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev patch

      - name: Setup Clang Cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: Setup Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source (BaikalOS)
        run: |
          git clone --depth=1 \
            "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" \
            kernel-src

      - name: Setup ReSukiSU
        run: |
          cd kernel-src
          RAW_BASE="$(echo "${{ github.event.inputs.resukisu_repo }}" | sed 's|github.com|raw.githubusercontent.com|')"
          SETUP_OK=0

          if curl -LSsf "${RAW_BASE}/${{ github.event.inputs.resukisu_branch }}/kernel/setup.sh" | bash -s "${{ github.event.inputs.resukisu_branch }}"; then
            SETUP_OK=1
          fi

          if [ "$SETUP_OK" -ne 1 ]; then
            git clone --depth=1 -b "${{ github.event.inputs.resukisu_branch }}" \
              "${{ github.event.inputs.resukisu_repo }}" .resukisu-src
            [ -f .resukisu-src/kernel/setup.sh ] && \
              bash .resukisu-src/kernel/setup.sh "${{ github.event.inputs.resukisu_branch }}" && SETUP_OK=1 || true
          fi

          [ "$SETUP_OK" -eq 1 ] || { echo "GAGAL setup ReSukiSU"; exit 1; }

          echo "== Verifikasi =="
          ls -la drivers/kernelsu || true
          find include/linux -name "ksu*" -o -name "ksud*" 2>/dev/null | sort

      # ==========================================================
      # Apply SUSFS patch (56/62 hunks succeed, 6 gagal → kita handle)
      # ==========================================================
      - name: Integrate SUSFS (apply patch)
        run: |
          cd kernel-src
          set -e

          git clone --depth=1 -b "${{ github.event.inputs.susfs_branch }}" \
            "${{ github.event.inputs.susfs_repo }}" .susfs4ksu

          curl -LSsf "${{ github.event.inputs.susfs_patch_url }}" -o /tmp/susfs.patch

          set +e
          patch -p1 --fuzz=3 --no-backup-if-mismatch --force < /tmp/susfs.patch 2>&1 | tee /tmp/susfs.log
          set -e

          echo "Succeed: $(grep -c 'succeeded' /tmp/susfs.log)"
          echo "FAILED : $(grep -c 'FAILED' /tmp/susfs.log)"
          grep "FAILED" /tmp/susfs.log || echo "(none)"

          find . -name "*.rej" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true
          find . -name "*.orig" -not -path "./.susfs4ksu/*" -delete 2>/dev/null || true

          # sus_su.c tidak di-create oleh patch, harus di-copy manual
          if [ ! -f fs/sus_su.c ] && [ -f .susfs4ksu/kernel_patches/fs/sus_su.c ]; then
            cp -v .susfs4ksu/kernel_patches/fs/sus_su.c fs/sus_su.c
          fi

          echo "== Files SUSFS =="
          ls -la fs/susfs.c fs/sus_su.c include/linux/susfs.h include/linux/susfs_def.h 2>/dev/null || true

      # ==========================================================
      # Fix 3 hunk yang gagal DENGAN AKURAT (bukan stub)
      # ==========================================================
      - name: Fix 3 rejected hunks (accurate manual patch)
        run: |
          cd kernel-src

          echo "==========================================="
          echo "Fix 1: fs/proc_namespace.c hunk #1"
          echo "==========================================="
          if [ -f fs/proc_namespace.c ]; then
            if ! grep -q "susfs_def.h" fs/proc_namespace.c; then
              sed -i '/#include "proc\/internal.h"/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/proc_namespace.c
              echo "[OK] Added #include <linux/susfs_def.h>"
            fi
          fi

          echo ""
          echo "==========================================="
          echo "Fix 2: fs/stat.c - signature kernel 4.9 BaikalOS"
          echo "==========================================="
          if [ -f fs/stat.c ] && ! grep -q "int err = inode->i_op->getattr" fs/stat.c; then
            python3 << 'PYEOF'
          import re
          from pathlib import Path

          p = Path("fs/stat.c")
          text = p.read_text()

          pattern = re.compile(
              r'(\tif\s*\(inode->i_op->getattr\)\s*\n)'
              r'(\t\treturn inode->i_op->getattr\(path->mnt,\s*path->dentry,\s*stat\);)',
              re.MULTILINE
          )

          replacement = (
              r'\1'
              '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n'
              '\t{\n'
              '\t\tint err = inode->i_op->getattr(path->mnt, path->dentry, stat);\n'
              '\t\tif (!err)\n'
              '\t\t\tsusfs_sus_kstat_spoof_generic_fillattr(inode, stat);\n'
              '\t\treturn err;\n'
              '\t}\n'
              '#else\n'
              r'\2'
              '\n#endif'
          )

          new_text, n = pattern.subn(replacement, text)
          if n > 0:
              p.write_text(new_text)
              print(f"[OK] Wrapped inode->i_op->getattr ({n} match)")
          else:
              print("[FAIL] Pattern not matched")
          PYEOF
          fi

          echo ""
          echo "==========================================="
          echo "Fix 3: fs/proc/task_mmu.c hunk #4"
          echo "==========================================="
          echo "[SKIP] Whitespace difference only"

          echo ""
          echo "==========================================="
          echo "Fix 4: FORCE include susfs.h ke file yg butuh"
          echo "==========================================="
          python3 << 'PYEOF'
          from pathlib import Path

          files_need_susfs = [
              "fs/open.c",
              "fs/stat.c",
              "fs/proc_namespace.c",
              "fs/proc/task_mmu.c",
              "fs/proc/cmdline.c",
          ]

          for filepath in files_need_susfs:
              p = Path(filepath)
              if not p.exists():
                  print(f"[SKIP] {filepath} not found")
                  continue

              lines = p.read_text().split('\n')

              has_susfs = any('linux/susfs.h' in l for l in lines)
              has_susfs_def = any('linux/susfs_def.h' in l for l in lines)

              if has_susfs and has_susfs_def:
                  print(f"[SKIP] {filepath} already has both susfs includes")
                  continue

              insert_idx = -1
              for i, line in enumerate(lines):
                  if line.strip().startswith('#include'):
                      insert_idx = i
                      break

              if insert_idx == -1:
                  print(f"[FAIL] {filepath}: no #include found")
                  continue

              new_includes = []
              if not has_susfs:
                  new_includes.append('#include <linux/susfs.h>')
              if not has_susfs_def:
                  new_includes.append('#include <linux/susfs_def.h>')

              lines[insert_idx:insert_idx] = new_includes
              p.write_text('\n'.join(lines))
              print(f"[OK] {filepath}: added {new_includes}")
          PYEOF

          echo ""
          echo "== Verifikasi include susfs =="
          for f in fs/open.c fs/stat.c fs/proc_namespace.c fs/proc/task_mmu.c; do
            if [ -f "$f" ]; then
              INC=$(grep -n "linux/susfs" "$f" | head -3 | tr '\n' ' ')
              echo "  $f -> ${INC:-NONE}"
            fi
          done

          echo ""
          echo "==========================================="
          echo "Fix 5: Force extern declarations di fs/proc_namespace.c"
          echo "==========================================="
          if [ -f fs/proc_namespace.c ] && ! grep -q "extern bool susfs_is_current_ksu_domain" fs/proc_namespace.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/proc_namespace.c")
          lines = p.read_text().split('\n')
          new_lines = []
          inserted = False
          for line in lines:
              new_lines.append(line)
              if not inserted and '#include "internal.h"' in line:
                  new_lines.append('')
                  new_lines.append('#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT')
                  new_lines.append('extern bool susfs_is_current_ksu_domain(void);')
                  new_lines.append('extern bool susfs_hide_sus_mnts_for_non_su_procs;')
                  new_lines.append('#endif')
                  new_lines.append('')
                  inserted = True
                  print("[OK] Injected extern declarations")
          p.write_text('\n'.join(new_lines))
          if not inserted:
              print("[WARN] internal.h include not found")
          PYEOF
          fi

          echo ""
          echo "== Verifikasi extern di fs/proc_namespace.c =="
          grep -n "extern\|susfs" fs/proc_namespace.c | head -15

          echo ""
          echo "==========================================="
          echo "Fix 6: Force forward declaration di fs/stat.c"
          echo "==========================================="
          # susfs.h mungkin declare function sebagai void,
          # tapi call di fs/stat.c line 82 tidak menemukan declaration
          # karena include-nya ter-block conditional atau typo.
          # Solusi: inject forward declaration extern langsung
          if [ -f fs/stat.c ] && ! grep -q "extern void susfs_sus_kstat_spoof_generic_fillattr" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')

          # Cari #include terakhir
          last_include = -1
          for i, line in enumerate(lines):
              if line.strip().startswith('#include'):
                  last_include = i

          if last_include == -1:
              print("[FAIL] No #include found")
          else:
              decl_block = [
                  '',
                  '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT',
                  'extern void susfs_sus_kstat_spoof_generic_fillattr(struct inode *inode, struct kstat *stat);',
                  '#endif',
                  '',
              ]
              lines[last_include+1:last_include+1] = decl_block
              p.write_text('\n'.join(lines))
              print("[OK] Injected forward declaration untuk susfs_sus_kstat_spoof_generic_fillattr")
          PYEOF
          fi

          echo ""
          echo "== Verifikasi extern di fs/stat.c =="
          grep -n "extern\|susfs_sus_kstat" fs/stat.c | head -10

          echo ""
          echo "==========================================="
          echo "Fix 7: Hapus stray call di scope global fs/stat.c"
          echo "==========================================="
          # Patch SUSFS inject call di posisi salah (di luar function)
          # setelah EXPORT_SYMBOL(vfs_getattr_nosec)
          # Line 82 punya standalone call yang bikin error 'type specifier missing'
          # Kita hapus 3 baris tersebut karena wrapping yg benar sudah ada di dalam function
          if [ -f fs/stat.c ] && grep -q "^EXPORT_SYMBOL(vfs_getattr_nosec);$" fs/stat.c; then
            python3 << 'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')

          # Cari EXPORT_SYMBOL(vfs_getattr_nosec);
          # Setelah baris itu, kalau ada #ifdef CONFIG_KSU_SUSFS_SUS_KSTAT
          # + call susfs_sus_kstat_spoof + #endif → hapus 3 baris
          new_lines = []
          i = 0
          removed = False
          while i < len(lines):
              line = lines[i]
              new_lines.append(line)

              if (not removed
                  and line.strip() == 'EXPORT_SYMBOL(vfs_getattr_nosec);'
                  and i + 3 < len(lines)):

                  # Cek 3 baris berikutnya
                  next1 = lines[i+1].strip()
                  next2 = lines[i+2].strip()
                  next3 = lines[i+3].strip()

                  if (next1 == '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT'
                      and 'susfs_sus_kstat_spoof_generic_fillattr' in next2
                      and next3 == '#endif'):
                      # Skip 3 baris
                      print(f"[OK] Removed stray call at line {i+2}")
                      print(f"     Line {i+2}: {lines[i+1]}")
                      print(f"     Line {i+3}: {lines[i+2]}")
                      print(f"     Line {i+4}: {lines[i+3]}")
                      i += 4
                      removed = True
                      continue

              i += 1

          if not removed:
              print("[SKIP] Stray call pattern not found")

          p.write_text('\n'.join(new_lines))
          PYEOF
          fi

          echo ""
          echo "== Verifikasi fs/stat.c line 75-90 setelah Fix 7 =="
          sed -n '75,90p' fs/stat.c

      # ==========================================================
      # Buat ksu_hook.h dengan deklarasi 5 hooks (bukan stub)
      # ==========================================================
      # Implementasi hook ada di drivers/kernelsu (ReSukiSU)
      # Kita cuma butuh deklarasi supaya call site di fs/*.c bisa compile
      # ==========================================================
      - name: Generate ksu_hook.h (8 hook declarations)
        run: |
          cd kernel-src

          cat > include/linux/ksu_hook.h << 'HEADEREOF'
          /* Auto-generated for ReSukiSU manual hooks (8 hooks) */
          #ifndef __KSU_HOOK_H
          #define __KSU_HOOK_H

          #include <linux/types.h>
          #include <linux/uidgid.h>

          struct file;
          struct filename;
          struct user_arg_ptr;

          extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr,
                                          void *argv, void *envp, int *flags);
          extern int ksu_handle_faccessat(int *dfd, void *filename_user,
                                          int *mode, int *flags);
          extern int ksu_handle_stat(int *dfd, void *filename_user,
                                     int *flags);
          extern int ksu_handle_vfs_read(struct file **file_ptr, char __user **buf_ptr,
                                         size_t *count_ptr, loff_t **pos);
          extern int ksu_handle_sys_read(unsigned int *fd, char __user **buf_ptr,
                                          size_t *count_ptr);
          extern int ksu_handle_input_handle_event(unsigned int *type,
                                                    unsigned int *code, int *value);
          extern int ksu_handle_setresuid(uid_t *ruid, uid_t *euid, uid_t *suid);
          extern int ksu_handle_sys_reboot(int *magic1, int *magic2,
                                           unsigned int *cmd, void __user **arg);

          #endif
          HEADEREOF

          echo "[OK] Generated ksu_hook.h dengan 8 declarations"

      # ==========================================================
      # Fix fs/exec.c: hapus struct user_arg_ptr duplikat
      # ==========================================================
      - name: Fix fs/exec.c conflicts
        run: |
          cd kernel-src

          if [ ! -f fs/exec.c ]; then exit 0; fi

          echo "== Cek keadaan awal fs/exec.c =="
          grep -n "linux/ksud.h\|linux/ksu_hook.h\|user_arg_ptr {\|ksu_handle" fs/exec.c | head -15

          # Kalau setup.sh sudah include ksud.h, hapus include-nya
          # supaya tidak konflik dengan definisi struct user_arg_ptr lokal
          if grep -q "linux/ksud.h" fs/exec.c; then
            echo "[INFO] Removing #include <linux/ksud.h> (konflik dengan definisi lokal)"
            sed -i '/#include <linux\/ksud\.h>/d' fs/exec.c
          fi

          # Kalau setup.sh sudah inject panggilan ksu_handle_execveat_ksud,
          # hapus juga (kita akan pakai versi manual ksu_handle_execveat biasa)
          if grep -q "ksu_handle_execveat_ksud" fs/exec.c; then
            echo "[INFO] Removing ksu_handle_execveat_ksud call"
            sed -i '/ksu_handle_execveat_ksud/d' fs/exec.c
          fi

          echo ""
          echo "== fs/exec.c setelah fix =="
          grep -n "linux/ksud.h\|linux/ksu_hook.h\|user_arg_ptr {\|ksu_handle" fs/exec.c | head -15

      # ==========================================================
      # Inject 5 manual hooks (execveat sudah oleh setup.sh)
      # ==========================================================
      - name: Apply 8 manual hooks
        run: |
          cd kernel-src

          inject_hook() {
            local file="$1"
            local func_pat="$2"
            local hook_line="$3"
            [ -f "$file" ] || return 1
            awk -v pat="$func_pat" -v hook="$hook_line" '
              $0 ~ pat { in_func=1 }
              in_func && /^\{/ && !done {
                print
                print "\t/* ReSukiSU hook */"
                print "\t" hook
                done=1
                in_func=0
                next
              }
              { print }
            ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
          }

          add_include() {
            local file="$1"
            [ -f "$file" ] || return
            if ! grep -q "linux/ksu_hook.h" "$file"; then
              sed -i '0,/^#include/s||#include <linux/ksu_hook.h>\n&|' "$file"
            fi
          }

          # 0. fs/exec.c → execveat
          add_include fs/exec.c
          if ! grep -q "ksu_handle_execveat" fs/exec.c; then
            inject_hook fs/exec.c "static int do_execveat_common" \
              "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
            if ! grep -q "ksu_handle_execveat" fs/exec.c; then
              inject_hook fs/exec.c "do_execveat_common" \
                "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
            fi
            echo "[OK] fs/exec.c execveat"
          fi

          # 1. fs/open.c → faccessat
          add_include fs/open.c
          if ! grep -q "ksu_handle_faccessat" fs/open.c; then
            inject_hook fs/open.c \
              "SYSCALL_DEFINE3.faccessat" \
              "ksu_handle_faccessat(&dfd, &filename, &mode, NULL);"
            echo "[OK] fs/open.c faccessat"
          fi

          # 2. fs/read_write.c → vfs_read
          add_include fs/read_write.c
          if ! grep -q "ksu_handle_vfs_read" fs/read_write.c; then
            inject_hook fs/read_write.c "ssize_t vfs_read" \
              "ksu_handle_vfs_read(&file, &buf, &count, &pos);"
            echo "[OK] fs/read_write.c vfs_read"
          fi

          # 3. fs/read_write.c → sys_read
          if ! grep -q "ksu_handle_sys_read" fs/read_write.c; then
            inject_hook fs/read_write.c "SYSCALL_DEFINE3.read" \
              "ksu_handle_sys_read(&fd, &buf, &count);"
            echo "[OK] fs/read_write.c sys_read"
          fi

          # 4. fs/stat.c → stat
          add_include fs/stat.c
          if ! grep -q "ksu_handle_stat" fs/stat.c; then
            inject_hook fs/stat.c "int vfs_fstatat" \
              "ksu_handle_stat(&dfd, &filename, &flag);"
            if ! grep -q "ksu_handle_stat" fs/stat.c; then
              inject_hook fs/stat.c "SYSCALL_DEFINE4.newfstatat" \
                "ksu_handle_stat(&dfd, &filename, &flag);"
            fi
            echo "[OK] fs/stat.c"
          fi

          # 5. drivers/input/input.c → input_handle_event
          add_include drivers/input/input.c
          if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
            inject_hook drivers/input/input.c "void input_handle_event" \
              "ksu_handle_input_handle_event(&type, &code, &value);"
            if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
              inject_hook drivers/input/input.c "static void input_handle_event" \
                "ksu_handle_input_handle_event(&type, &code, &value);"
            fi
            echo "[OK] drivers/input/input.c"
          fi

          # 6. kernel/sys.c → setresuid
          add_include kernel/sys.c
          if ! grep -q "ksu_handle_setresuid" kernel/sys.c; then
            inject_hook kernel/sys.c "SYSCALL_DEFINE3.setresuid" \
              "ksu_handle_setresuid(&ruid, &euid, &suid);"
            echo "[OK] kernel/sys.c"
          fi

          # 7. kernel/reboot.c → sys_reboot (BARU, hook ke-8)
          add_include kernel/reboot.c
          if [ -f kernel/reboot.c ] && ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            inject_hook kernel/reboot.c "SYSCALL_DEFINE4.reboot" \
              "ksu_handle_sys_reboot(&magic1, &magic2, &cmd, &arg);"
            echo "[OK] kernel/reboot.c sys_reboot"
          fi

          echo ""
          echo "== Verifikasi hooks =="
          for f in fs/exec.c fs/open.c fs/read_write.c fs/stat.c drivers/input/input.c kernel/sys.c kernel/reboot.c; do
            [ -f "$f" ] || continue
            HOOKS=$(grep -o "ksu_handle_[a-z_]*" "$f" 2>/dev/null | sort -u | tr '\n' ' ')
            echo "  $f -> ${HOOKS:-NONE}"
          done

      - name: Prepare defconfig
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          if [ ! -f "$DEFCONFIG_PATH" ]; then
            find arch/arm64/configs -iname "*845*" -o -iname "*beryllium*" -o -iname "*xiaomi*" 2>/dev/null
            exit 1
          fi

          if [ "${{ github.event.inputs.use_extracted_config }}" = "true" ]; then
            EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/my_defconfig.txt"
            [ -f "$EXTRACTED_CFG" ] && cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
          fi

          sed -i '/^CONFIG_KSU/d;/^# CONFIG_KSU is not set/d' "$DEFCONFIG_PATH"
          sed -i '/SUSFS/d' "$DEFCONFIG_PATH"
          sed -i '/^CONFIG_KSU_KPROBE_HOOKS/d' "$DEFCONFIG_PATH"

          echo "" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KPROBES=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_OVERLAY_FS=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_TMPFS_XATTR=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> "$DEFCONFIG_PATH"

          echo "== KSU/SUSFS =="
          grep -E "CONFIG_KSU|SUSFS|OVERLAY" "$DEFCONFIG_PATH" | sort

      - name: Patch arch/arm64/Makefile (fix clang vdso32)
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"
          [ -f "$MAIN_MK" ] || exit 1
          sed -i -E 's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' "$MAIN_MK"

      - name: Skip broken DTB
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          [ -f "$DTS_MK" ] || exit 0
          for dtb in sdm845-v2-qvr-evt.dtb sdm845-v2-qvr-dvt.dtb sdm845-interposer-sdm670-mtp.dtb sdm845-interposer-sdm670-cdp.dtb; do
            sed -i "/$dtb/d" "$DTS_MK"
          done

      - name: Debug - cek fs/stat.c line 70-90
        run: |
          cd kernel-src
          echo "== fs/stat.c line 60-100 =="
          sed -n '60,100p' fs/stat.c
          echo ""
          echo "== Declaration susfs_sus_kstat_spoof_generic_fillattr =="
          grep -rn "susfs_sus_kstat_spoof_generic_fillattr" include/linux/ fs/stat.c 2>/dev/null | head -10
          echo ""
          echo "== Include di fs/stat.c =="
          grep -n "#include" fs/stat.c | head -20

      - name: Compile Kernel
        env:
          KBUILD_BUILD_USER: "tester"
          KBUILD_BUILD_HOST: "ghactions"
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR
            ARCH=arm64
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          for cfg in CONFIG_KSU CONFIG_KSU_SUSFS CONFIG_KSU_SUSFS_SUS_KSTAT CONFIG_KSU_SUSFS_SUS_MOUNT CONFIG_OVERLAY_FS; do
            grep "^${cfg}=" $OUT_DIR/.config || echo "${cfg}=NOT SET"
          done

          grep -q '^CONFIG_KSU=y' $OUT_DIR/.config || { echo "CONFIG_KSU tidak aktif"; exit 1; }

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "Exit: $BUILD_EXIT"
          BUILD_OK=0
          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"; BUILD_OK=1
          elif [ -f "$OUT_DIR/arch/arm64/boot/Image" ]; then
            ls -la "$OUT_DIR/arch/arm64/boot/Image"; BUILD_OK=1
          fi

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -eq 1 ] || exit 1

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          if-no-files-found: warn

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore

      - name: Upload Image Only
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          if-no-files-found: ignore
