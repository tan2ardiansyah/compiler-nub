name: 12. Compile Kernel - BOS Beryllium + KSU-Next + SUSFS (Percobaan)

# Pola: BaikalOS 13.0 + KSU-Next (v3.3.0-enjoy dari ThRE-Team, terbukti compile di kernel 4.9)
# + SUSFS kernel-4.9 dengan cara yang benar (copy file dulu, baru patch).
# Referensi fix: https://github.com/KernelSU-Next/KernelSU-Next/issues/426
# Copy fs/* dan include/linux/* dulu sebelum patch, karena patch tidak bisa membuat file baru.

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'test-bos-ksunext-susfs'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/baikalos/android_kernel_xiaomi_sdm845.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '13.0'
      defconfig:
        description: 'defconfig path'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      ksu_tag:
        description: 'KernelSU-Next tag/branch dari ThRE-Team'
        required: false
        default: 'v3.3.0-enjoy'
      susfs_branch:
        description: 'SUSFS branch dari simonpunk/susfs4ksu'
        required: false
        default: 'kernel-4.9'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://github.com/tan2ardiansyah/compiler-nub/releases/download/clang-toolchain/clang-r487747c.tar.gz'

jobs:
  test-build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Input
        run: |
          echo "kernel_source : ${{ github.event.inputs.kernel_source }}"
          echo "kernel_branch : ${{ github.event.inputs.kernel_branch }}"
          echo "ksu_tag       : ${{ github.event.inputs.ksu_tag }}"
          echo "susfs_branch  : ${{ github.event.inputs.susfs_branch }}"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget patch \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev

      - name: Setup Clang Cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: Setup Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source (BaikalOS)
        run: |
          git clone --depth=1 "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" kernel-src

      - name: Setup KernelSU-Next (ThRE-Team, v3.3.0-enjoy)
        run: |
          cd kernel-src
          curl -LSs "https://raw.githubusercontent.com/ThRE-Team/KernelSU-Next/main/kernel/setup.sh" \
            | bash -s "${{ github.event.inputs.ksu_tag }}"
          echo "== Cek symlink KSU =="
          ls -la drivers/kernelsu || echo "TIDAK ADA symlink drivers/kernelsu!"
          grep -n "kernelsu" drivers/Makefile | head -3 || echo "TIDAK ADA entri Makefile!"
          grep -n "kernelsu" drivers/Kconfig | head -3 || echo "TIDAK ADA entri Kconfig!"

      - name: Setup SUSFS (kernel-4.9) - copy file dulu, baru patch
        run: |
          cd kernel-src

          # Clone susfs4ksu branch kernel-4.9
          git clone --depth=1 \
            -b "${{ github.event.inputs.susfs_branch }}" \
            "https://gitlab.com/simonpunk/susfs4ksu.git" susfs4ksu-src

          echo "== Struktur kernel_patches/ =="
          ls -la susfs4ksu-src/kernel_patches/
          ls -la susfs4ksu-src/kernel_patches/fs/ 2>/dev/null || echo "(tidak ada subfolder fs/)"
          ls -la susfs4ksu-src/kernel_patches/include/linux/ 2>/dev/null || echo "(tidak ada subfolder include/linux/)"
          ls -la susfs4ksu-src/kernel_patches/KernelSU/ 2>/dev/null || echo "(tidak ada subfolder KernelSU/)"

          # KUNCI FIX: copy file susfs ke kernel source SEBELUM menjalankan patch.
          # patch -p1 tidak bisa membuat file baru dari nol — dia hanya memodifikasi file
          # yang sudah ada. File susfs.c dan susfs.h harus di-copy manual terlebih dahulu.
          # Referensi: https://github.com/KernelSU-Next/KernelSU-Next/issues/426
          echo "== STEP 1: Copy file SUSFS ke kernel source =="
          if [ -d "susfs4ksu-src/kernel_patches/fs" ]; then
            cp -v susfs4ksu-src/kernel_patches/fs/* fs/
            echo "[OK] File fs/ berhasil di-copy."
          else
            echo "[PERINGATAN] Folder kernel_patches/fs/ tidak ditemukan!"
          fi

          if [ -d "susfs4ksu-src/kernel_patches/include/linux" ]; then
            cp -v susfs4ksu-src/kernel_patches/include/linux/* include/linux/
            echo "[OK] File include/linux/ berhasil di-copy."
          else
            echo "[PERINGATAN] Folder kernel_patches/include/linux/ tidak ditemukan!"
          fi

          # Verifikasi file kritis sudah ada
          echo "== Verifikasi susfs.c dan susfs.h =="
          ls -la fs/susfs.c include/linux/susfs.h 2>/dev/null || \
            echo "[PERINGATAN] susfs.c atau susfs.h tidak ditemukan setelah copy!"

          # STEP 2: Patch 1 — enable SUSFS di dalam folder KernelSU
          echo "== STEP 2: Patch 1 ke KernelSU/ =="
          PATCH1="susfs4ksu-src/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
          if [ -f "$PATCH1" ]; then
            cp "$PATCH1" KernelSU/
            cd KernelSU
            patch -p1 --forward < 10_enable_susfs_for_ksu.patch \
              && echo "[OK] Patch 1 berhasil." \
              || echo "[PERINGATAN] Patch 1 ada hunk yang gagal (mungkin sudah include)."
            cd ..
          else
            echo "[INFO] Patch 1 tidak ditemukan, mungkin tidak dibutuhkan untuk versi ini."
          fi

          # STEP 3: Patch 2 — patch kernel source (memodifikasi file yang sudah ada)
          # File baru (susfs.c, susfs.h) sudah di-copy di STEP 1, jadi patch ini
          # hanya akan memodifikasi file existing (fs/proc_namespace.c, fs/open.c, dll)
          echo "== STEP 3: Patch 2 ke kernel source =="
          PATCH2=$(ls susfs4ksu-src/kernel_patches/50_add_susfs_in_kernel*.patch 2>/dev/null | head -1)
          if [ -n "$PATCH2" ]; then
            cp "$PATCH2" .
            PATCH2_NAME=$(basename "$PATCH2")
            echo "Menerapkan: $PATCH2_NAME"
            patch -p1 --forward < "$PATCH2_NAME" \
              && echo "[OK] Patch 2 berhasil sepenuhnya." \
              || {
                echo "[PERINGATAN] Patch 2 ada hunk yang gagal."
                find . -name "*.rej" | head -10
                for rej in $(find . -name "*.rej" 2>/dev/null | head -5); do
                  echo "--- Isi $rej ---"
                  cat "$rej"
                done
              }
          else
            echo "[PERINGATAN] File 50_add_susfs_in_kernel*.patch tidak ditemukan!"
            echo "File yang ada di kernel_patches/:"
            ls -la susfs4ksu-src/kernel_patches/
          fi

          # STEP 4: Verifikasi akhir
          echo "== STEP 4: Verifikasi akhir =="
          [ -f "fs/susfs.c" ] && echo "[OK] fs/susfs.c ada." || echo "[GAGAL] fs/susfs.c tidak ada!"
          [ -f "include/linux/susfs.h" ] && echo "[OK] include/linux/susfs.h ada." || echo "[GAGAL] include/linux/susfs.h tidak ada!"
          grep "susfs" fs/Makefile && echo "[OK] susfs ada di fs/Makefile" || echo "[PERINGATAN] susfs tidak ada di fs/Makefile"

      - name: Siapkan defconfig
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/my_defconfig.txt"
          if [ -f "$EXTRACTED_CFG" ]; then
            echo "[INFO] Memakai config extract BaikalOS sebagai basis."
            cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
          else
            echo "[PERINGATAN] my_defconfig.txt tidak ditemukan, pakai defconfig asli source."
          fi

          # Config KSU-Next + SUSFS
          # CATATAN PENTING: tidak pakai CONFIG_KPROBES untuk mode manual hook.
          # KSU-Next v3.3.0-enjoy dengan SUSFS menggunakan manual hook untuk kompatibilitas SUSFS.
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
          } >> "$DEFCONFIG_PATH"
          echo "[OK] Defconfig dipatch dengan config KSU-Next + SUSFS."

      - name: Patch arch/arm64/Makefile (fix clang vdso32)
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"
          cp "$MAIN_MK" "$MAIN_MK.orig"
          sed -i -E \
            's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' \
            "$MAIN_MK"
          diff -q "$MAIN_MK" "$MAIN_MK.orig" > /dev/null \
            && echo "[INFO] Patch vdso32 tidak diperlukan (sudah ada atau pattern beda)." \
            || echo "[OK] Patch vdso32 berhasil."
          rm -f "$MAIN_MK.orig"

      - name: Skip DTB yang tidak relevan/rusak
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          [ ! -f "$DTS_MK" ] && exit 0
          for dtb in "sdm845-v2-qvr-evt.dtb" "sdm845-v2-qvr-dvt.dtb" \
                     "sdm845-interposer-sdm670-mtp.dtb" "sdm845-interposer-sdm670-cdp.dtb"; do
            grep -q "$dtb" "$DTS_MK" && sed -i "/$dtb/d" "$DTS_MK" && echo "[OK] $dtb dihapus."
          done

      - name: Compile Kernel
        env:
          KBUILD_BUILD_USER: "tan"
          KBUILD_BUILD_HOST: "ardiansyah"
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR ARCH=arm64
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump
            STRIP=llvm-strip READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1 LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          echo "== Cek config KSU/SUSFS di .config final =="
          for cfg in CONFIG_KSU CONFIG_KSU_SUSFS; do
            grep "^${cfg}=" $OUT_DIR/.config || echo "PERINGATAN: ${cfg} tidak aktif!"
          done

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "== Exit code make: $BUILD_EXIT =="
          IMAGE_OK=0; IMAGE_GZ_DTB_OK=0
          [ -f "$OUT_DIR/arch/arm64/boot/Image" ] && { ls -la "$OUT_DIR/arch/arm64/boot/Image"; IMAGE_OK=1; }
          [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ] && { ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"; IMAGE_GZ_DTB_OK=1; }

          BUILD_OK=0
          [ "$IMAGE_GZ_DTB_OK" -eq 1 ] && { echo "[OK] Image.gz-dtb berhasil!"; BUILD_OK=1; } || \
          [ "$IMAGE_OK" -eq 1 ] && { echo "[SEBAGIAN OK] Image berhasil, Image.gz-dtb belum ada."; BUILD_OK=1; } || \
          echo "[GAGAL] Build benar-benar gagal."

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -ne 1 ] && exit 1 || true

      - name: Capture Build Metadata
        if: env.BUILD_OK == '1'
        run: |
          cd kernel-src
          KERNEL_COMMIT=$(git rev-parse --short HEAD)
          KSU_COMMIT=$(cd KernelSU-Next && git rev-parse --short HEAD)
          KERNEL_VERSION_STRING=$(cat out/include/config/kernel.release 2>/dev/null || echo unknown)
          cat > ../build-metadata.json << JSONEOF
          {
            "build_date": "$(date -u '+%Y-%m-%d %H:%M UTC')",
            "kernel_source": "${{ github.event.inputs.kernel_source }}",
            "kernel_branch": "${{ github.event.inputs.kernel_branch }}",
            "kernel_commit": "${KERNEL_COMMIT}",
            "kernel_commit_full": "$(git rev-parse HEAD)",
            "kernel_version_string": "${KERNEL_VERSION_STRING}",
            "ksu_tag": "${{ github.event.inputs.ksu_tag }}",
            "ksu_commit": "${KSU_COMMIT}",
            "susfs_branch": "${{ github.event.inputs.susfs_branch }}",
            "zip_name": "${{ github.event.inputs.zip_name }}"
          }
          JSONEOF
          cat ../build-metadata.json

      - name: Upload Build Metadata
        if: env.BUILD_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.json
          if-no-files-found: warn

      - name: Upload Build Log (selalu)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          if-no-files-found: warn

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore

      - name: Upload Image Only
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-raw
          path: kernel-src/out/arch/arm64/boot/Image
          if-no-files-found: ignore
